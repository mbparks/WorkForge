<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Work Forge</title>
<style>
:root{color-scheme:light;--bg:#f6f1e6;--panel:#fffaf0;--ink:#1f2933;--muted:#667085;--line:#ded2bd;--brand:#b45309;--brand2:#0f766e;--danger:#b91c1c;--ok:#15803d;--warn:#b7791f;--shadow:0 18px 45px rgba(80,50,20,.12);--radius:18px}
:root[data-theme="dark"]{color-scheme:dark;--bg:#111827;--panel:#1f2937;--ink:#f8fafc;--muted:#cbd5e1;--line:#334155;--brand:#f59e0b;--brand2:#5eead4;--danger:#f87171;--ok:#86efac;--warn:#fbbf24;--shadow:0 18px 50px rgba(0,0,0,.35)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(245,158,11,.18),transparent 34rem),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}button,input,select,textarea{font:inherit}button{border:0;border-radius:999px;padding:.7rem 1rem;background:var(--ink);color:var(--panel);font-weight:800;cursor:pointer}button:hover{filter:brightness(1.06)}button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}button.soft{background:rgba(180,83,9,.12);color:var(--brand);border:1px solid rgba(180,83,9,.2)}button.danger{background:var(--danger);color:white}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{padding:22px;border-right:1px solid var(--line);background:rgba(255,255,255,.28);backdrop-filter:blur(12px);position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}.mark{width:46px;height:46px;border-radius:15px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:white;font-weight:1000;box-shadow:var(--shadow)}h1,h2,h3,h4{margin:0}.brand h1{font-size:1.2rem}.brand small{color:var(--muted);font-weight:800}.nav{display:grid;gap:8px;margin-top:18px}.nav button{justify-content:flex-start;text-align:left;border-radius:14px;background:transparent;color:var(--ink);border:1px solid transparent}.nav button.active{background:var(--panel);border-color:var(--line);box-shadow:var(--shadow)}.main{padding:22px;overflow:auto}.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px;position:sticky;top:0;background:linear-gradient(var(--bg),rgba(0,0,0,0));z-index:3;padding-bottom:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card-h{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}.card-b{padding:18px}.span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-5{grid-column:span 5}.span-6{grid-column:span 6}.span-7{grid-column:span 7}.span-8{grid-column:span 8}.span-12{grid-column:span 12}.metric{font-size:2rem;font-weight:1000}.muted{color:var(--muted)}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);background:rgba(255,255,255,.08);border-radius:14px;padding:12px;cursor:pointer}.row:hover{border-color:var(--brand)}.row.active{outline:2px solid var(--brand)}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:.25rem .55rem;font-size:.78rem;font-weight:900;border:1px solid var(--line);color:var(--muted)}.stamp{display:inline-block;border:2px solid currentColor;border-radius:8px;padding:.25rem .55rem;font-size:.75rem;font-weight:1000;letter-spacing:.08em;text-transform:uppercase;transform:rotate(-1deg)}.Draft{color:var(--muted)}.Ready{color:#2563eb}.InProgress{color:var(--warn)}.Hold{color:var(--danger)}.Complete{color:var(--ok)}label{display:grid;gap:6px;font-size:.85rem;font-weight:900;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:.75rem;background:rgba(255,255,255,.5);color:var(--ink)}:root[data-theme="dark"] input,:root[data-theme="dark"] select,:root[data-theme="dark"] textarea{background:#0f172a}textarea{min-height:110px;resize:vertical}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.step{border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;background:rgba(255,255,255,.08)}.step h4{display:flex;justify-content:space-between;gap:10px}.qr svg{display:block;width:88px;height:88px}.label-card{display:grid;grid-template-columns:96px 1fr;gap:12px;align-items:center;border:1px dashed var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.08);break-inside:avoid}.label-code{font:700 .72rem ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);overflow-wrap:anywhere}.empty{border:1px dashed var(--line);border-radius:18px;padding:24px;text-align:center;color:var(--muted)}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.mini{font-size:.8rem;padding:.45rem .7rem}.print-only{display:none}@media(max-width:940px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid{grid-template-columns:1fr}.span-3,.span-4,.span-5,.span-6,.span-7,.span-8,.span-12{grid-column:1}.topbar{position:relative}.formgrid{grid-template-columns:1fr}}
@media print{body{background:white;color:#111}.side,.topbar,.no-print{display:none!important}.app{display:block}.main{padding:0}.card{box-shadow:none;border:0}.print-only{display:block}.grid{display:block}.card-h{border-bottom:2px solid #111}.label-card{page-break-inside:avoid;color:#111}.stamp{color:#111}}
</style>
</head>
<body>
<div class="app">
<aside class="side">
  <div class="brand"><div class="mark">WF</div><div><h1>Work Forge</h1><small>Field Instrument 064 · <span id="ver"></span></small></div></div>
  <p class="muted">Procedures, shop travelers, labels, QR sheets, asset stickers, and work packets in one field-ready app.</p>
  <div class="nav" id="nav"></div>
</aside>
<main class="main">
  <div class="topbar no-print">
    <div><h2 id="pageTitle">Dashboard</h2><p class="muted" id="saveState">Autosaved locally</p></div>
    <div class="actions">
      <button class="soft" onclick="loadSamples()">Load Sample Data</button>
      <button class="ghost" onclick="exportProject()">Export JSON</button>
      <button class="ghost" onclick="document.getElementById('importFile').click()">Import JSON</button>
      <button class="ghost" onclick="toggleTheme()" id="themeBtn">Dark Mode</button>
    </div>
  </div>
  <input id="importFile" type="file" accept="application/json,.json" style="display:none" onchange="importProject(event)">
  <section id="view"></section>
</main>
</div>
<script>
(()=>{
const VERSION='v1.0';
const KEY='workforge.project.v1';
const THEME='workforge.theme';
const PAGES={dashboard:'Dashboard',jobs:'Jobs / Travelers',procedures:'Procedures',labels:'Label Forge',assets:'Assets',items:'Parts & Tools',archive:'Archive',settings:'Settings'};
let page='dashboard';
let selected={job:null,procedure:null,label:null,asset:null,item:null};
let project=loadProject();
document.getElementById('ver').textContent=VERSION;
document.documentElement.dataset.theme=localStorage.getItem(THEME)||'light';
window.toggleTheme=()=>{const n=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=n;localStorage.setItem(THEME,n);render()};
window.loadSamples=()=>{if(confirm('Replace the current local project with sample Work Forge data?')){project=sampleProject();save();render()}};
window.exportProject=exportProject;window.importProject=importProject;window.setPage=setPage;window.selectItem=selectItem;window.patch=patch;window.addJob=addJob;window.addProcedure=addProcedure;window.addStep=addStep;window.removeStep=removeStep;window.addLabel=addLabel;window.addAsset=addAsset;window.addItem=addItem;window.printTraveler=printTraveler;window.printLabels=printLabels;window.archiveJob=archiveJob;window.clearStorage=clearStorage;window.deleteSelected=deleteSelected;
render();
function sampleProject(){const today=new Date().toISOString().slice(0,10);return{app:'Work Forge',version:VERSION,updated:today,procedures:[{id:'PROC-BEARING-001',title:'Replace Small Fan Bearing',type:'Repair',status:'Released',revision:'A',overview:'Controlled procedure for replacing a bearing on small belt-driven exhaust fans.',prereq:'Fan isolated. Lockout applied. Correct bearing verified.',tools:'Bearing puller, snap-ring pliers, soft-jaw vise, calipers, grease pencil',materials:'6204-2RS bearing, shop towels, light machine oil',warnings:'Confirm zero energy before removing guards. Do not strike the shaft directly.',steps:[{title:'Verify asset and bearing',instruction:'Confirm asset tag, bearing type, and replacement part before disassembly.',verification:'Part number matches traveler and bearing turns freely.',warning:'Do not proceed with an unknown bearing.',evidence:'Photo optional'},{title:'Remove guard and belt',instruction:'Remove belt guard, mark belt direction, and remove belt tension.',verification:'Guard and belt removed without damage.',warning:'Keep fasteners with the guard.',evidence:'Note condition'},{title:'Pull bearing',instruction:'Use bearing puller to remove bearing from shaft. Support shaft during removal.',verification:'Bearing removed and shaft shows no scoring.',warning:'Do not hammer shaft.',evidence:'Photo required'},{title:'Install replacement',instruction:'Press replacement bearing squarely onto shaft using the inner race support.',verification:'Bearing seats fully and spins smoothly.',warning:'Do not load the outer race during pressing.',evidence:'Measurement required'},{title:'Reassemble and test',instruction:'Reinstall belt and guard. Run fan briefly and listen for abnormal noise.',verification:'No abnormal vibration, heat, or noise after test run.',warning:'Keep hands clear of belt path.',evidence:'Pass/fail note'}]},{id:'PROC-CABLE-002',title:'Build Sensor Test Cable',type:'Assembly',status:'Draft',revision:'B',overview:'Assembly packet for a labeled four-conductor sensor test cable.',prereq:'Confirm pinout and cable length.',tools:'Wire strippers, ferrule crimper, heat gun, continuity tester',materials:'4-conductor cable, ferrules, heat shrink, cable labels',warnings:'Verify pinout before applying heat shrink.',steps:[{title:'Cut and strip cable',instruction:'Cut cable to length and strip jacket without nicking conductors.',verification:'Conductors intact and jacket removed cleanly.',warning:'Damaged conductors require restart.',evidence:'Measurement'},{title:'Terminate ends',instruction:'Crimp ferrules and land conductors according to pinout.',verification:'Pull-test each ferrule.',warning:'Do not mix shield and signal common.',evidence:'Photo optional'},{title:'Continuity test',instruction:'Test every conductor end-to-end and verify no shorts.',verification:'Continuity matrix passes.',warning:'Do not release failed cable.',evidence:'Test readings'}]}],assets:[{id:'AST-EF2',tag:'EF-2',name:'Roof Exhaust Fan EF-2',location:'Cumberland Hall / Roof',owner:'Facilities',notes:'Belt-driven exhaust fan serving classroom wing.'},{id:'AST-BENCH1',tag:'BENCH-1',name:'Electronics Bench 1',location:'Green Shoe Garage',owner:'Shop',notes:'General test bench with bench supply and signal tools.'}],items:[{id:'ITM-PULLER',name:'Bearing Puller Kit',kind:'Tool',sku:'TOOL-018',location:'Tool Wall A',howTo:'https://mbparks.com',notes:'Use for small motor and fan bearings.'},{id:'ITM-6204',name:'6204-2RS Bearing',kind:'Part',sku:'BRG-6204-2RS',location:'Parts Bin B-04',howTo:'',notes:'Common sealed bearing.'},{id:'ITM-LABEL',name:'Cable Label Sheet',kind:'Consumable',sku:'LBL-CABLE-001',location:'Printer Shelf',howTo:'',notes:'Print with label forge.'}],jobs:[{id:'WF-2026-0001',title:'Replace bearing on EF-2',type:'Repair',status:'In Progress',priority:'Normal',assetId:'AST-EF2',procedureId:'PROC-BEARING-001',assigned:'M.B. Parks',due:today,notes:'Noise reported after lunch. Use traveler labels on cover sheet and replacement bearing package.',done:{0:true,1:true},exceptions:'Belt guard screws are mismatched. Replace during reassembly.'},{id:'WF-2026-0002',title:'Build sensor test cable set',type:'Assembly',status:'Ready',priority:'Low',assetId:'AST-BENCH1',procedureId:'PROC-CABLE-002',assigned:'Shop',due:today,notes:'Make two labeled cables for bench testing.',done:{},exceptions:''}],labels:[{id:'LBL-JOB-0001',type:'Job Traveler',title:'WF-2026-0001',subtitle:'Replace bearing on EF-2',payload:'workforge://job/WF-2026-0001',target:'job:WF-2026-0001',size:'Medium',notes:'Traveler cover label'},{id:'LBL-AST-EF2',type:'Asset Sticker',title:'EF-2',subtitle:'Cumberland Hall / Roof',payload:'workforge://asset/AST-EF2',target:'asset:AST-EF2',size:'Small',notes:'Asset QR sticker'},{id:'LBL-CABLE-DEMO',type:'Cable Label',title:'SENSOR TEST CABLE',subtitle:'Source: Bench 1 · Destination: DUT',payload:'workforge://label/LBL-CABLE-DEMO',target:'label',size:'Cable',notes:'Wrap-around cable label'}],archive:[]}}
function loadProject(){try{const raw=localStorage.getItem(KEY);if(raw)return normalize(JSON.parse(raw))}catch(e){}return sampleProject()}
function normalize(p){p.version=VERSION;p.procedures??=[];p.assets??=[];p.items??=[];p.jobs??=[];p.labels??=[];p.archive??=[];return p}
function save(){project.updated=new Date().toISOString();localStorage.setItem(KEY,JSON.stringify(project));const s=document.getElementById('saveState');if(s)s.textContent='Autosaved '+new Date().toLocaleTimeString()}
function render(){document.getElementById('themeBtn').textContent=document.documentElement.dataset.theme==='dark'?'Light Mode':'Dark Mode';document.getElementById('nav').innerHTML=Object.entries(PAGES).map(([k,v])=>`<button class="${page===k?'active':''}" onclick="setPage('${k}')">${v}</button>`).join('');document.getElementById('pageTitle').textContent=PAGES[page];document.getElementById('view').innerHTML=views[page]();}
function setPage(p){page=p;render()}
function selectItem(type,id){selected[type]=id;render()}
const views={dashboard(){const active=project.jobs.filter(j=>!['Complete','Archived'].includes(j.status)).length;const ready=project.jobs.filter(j=>j.status==='Ready').length;const hold=project.jobs.filter(j=>j.status==='Hold').length;return `<div class="grid"><metric-card class="span-3"></metric-card>${metric('Active Jobs',active)}${metric('Ready Travelers',ready)}${metric('Procedures',project.procedures.length)}${metric('Labels',project.labels.length)}<div class="card span-8"><div class="card-h"><h3>Active Work</h3><button class="soft" onclick="addJob()">New Job</button></div><div class="card-b list">${project.jobs.length?project.jobs.map(jobRow).join(''):'<div class="empty">No jobs yet.</div>'}</div></div><div class="card span-4"><div class="card-h"><h3>Readiness</h3></div><div class="card-b"><p><b>${hold}</b> traveler(s) on hold.</p><p class="muted">Use Work Forge as a loop: compose procedure, issue traveler, print labels, complete work, archive record.</p><div class="toolbar"><button class="ghost" onclick="setPage('procedures')">Procedures</button><button class="ghost" onclick="setPage('labels')">Labels</button></div></div></div></div>`},
jobs(){const job=project.jobs.find(j=>j.id===selected.job)||project.jobs[0];if(job)selected.job=job.id;return `<div class="grid"><div class="card span-5"><div class="card-h"><h3>Travelers</h3><button class="soft" onclick="addJob()">New Job</button></div><div class="card-b list">${project.jobs.map(jobRow).join('')||'<div class="empty">No active travelers.</div>'}</div></div><div class="card span-7"><div class="card-h"><h3>${job?esc(job.title):'No Traveler Selected'}</h3>${job?`<span class="stamp ${statusClass(job.status)}">${esc(job.status)}</span>`:''}</div><div class="card-b">${job?jobEditor(job):'<div class="empty">Create a job traveler to begin.</div>'}</div></div></div>`},
procedures(){const proc=project.procedures.find(p=>p.id===selected.procedure)||project.procedures[0];if(proc)selected.procedure=proc.id;return `<div class="grid"><div class="card span-5"><div class="card-h"><h3>Procedure Library</h3><button class="soft" onclick="addProcedure()">New Procedure</button></div><div class="card-b list">${project.procedures.map(p=>`<div class="row ${selected.procedure===p.id?'active':''}" onclick="selectItem('procedure','${p.id}')"><div><b>${esc(p.title)}</b><div class="muted">${esc(p.id)} · Rev ${esc(p.revision||'A')}</div></div><span class="pill">${esc(p.status||'Draft')}</span></div>`).join('')}</div></div><div class="card span-7"><div class="card-h"><h3>${proc?esc(proc.title):'No Procedure'}</h3>${proc?`<button class="ghost" onclick="addJob('${proc.id}')">Create Traveler</button>`:''}</div><div class="card-b">${proc?procedureEditor(proc):'<div class="empty">Create a procedure template.</div>'}</div></div></div>`},
labels(){const label=project.labels.find(l=>l.id===selected.label)||project.labels[0];if(label)selected.label=label.id;return `<div class="grid"><div class="card span-5"><div class="card-h"><h3>Print Queue</h3><div class="toolbar"><button class="soft" onclick="addLabel()">New Label</button><button class="ghost" onclick="printLabels()">Print Sheet</button></div></div><div class="card-b list">${project.labels.map(l=>`<div class="row ${selected.label===l.id?'active':''}" onclick="selectItem('label','${l.id}')"><div><b>${esc(l.title)}</b><div class="muted">${esc(l.type)} · ${esc(l.size)}</div></div><div class="qr">${qrSvg(l.payload,54)}</div></div>`).join('')}</div></div><div class="card span-7"><div class="card-h"><h3>Label Designer</h3></div><div class="card-b">${label?labelEditor(label):'<div class="empty">Create a label.</div>'}</div></div></div>`},
assets(){return collectionView('asset','Assets',project.assets,addAsset,assetEditor,a=>`${a.tag} · ${a.location}`)},
items(){return collectionView('item','Parts & Tools',project.items,addItem,itemEditor,i=>`${i.kind} · ${i.sku} · ${i.location}`)},
archive(){return `<div class="card"><div class="card-h"><h3>Archived Work</h3><span class="pill">${project.archive.length} records</span></div><div class="card-b list">${project.archive.map(a=>`<div class="row"><div><b>${esc(a.title)}</b><div class="muted">${esc(a.id)} · archived ${new Date(a.archivedAt).toLocaleString()}</div></div><span class="stamp Complete">Complete</span></div>`).join('')||'<div class="empty">Completed travelers will appear here.</div>'}</div></div>`},
settings(){return `<div class="grid"><div class="card span-6"><div class="card-h"><h3>Project Save</h3><span class="pill">${VERSION}</span></div><div class="card-b"><p>Work Forge saves locally in this browser and exports portable JSON files.</p><div class="toolbar"><button onclick="exportProject()">Export JSON</button><button class="ghost" onclick="document.getElementById('importFile').click()">Import JSON</button><button class="danger" onclick="clearStorage()">Clear Local Storage</button></div></div></div><div class="card span-6"><div class="card-h"><h3>Project Summary</h3></div><div class="card-b"><p><b>${project.jobs.length}</b> jobs, <b>${project.procedures.length}</b> procedures, <b>${project.labels.length}</b> labels, <b>${project.assets.length}</b> assets, <b>${project.items.length}</b> parts/tools.</p><p class="muted">Last updated: ${project.updated?new Date(project.updated).toLocaleString():'not saved yet'}</p></div></div></div>`}}
function metric(name,value){return `<div class="card span-3"><div class="card-b"><div class="metric">${value}</div><div class="muted">${name}</div></div></div>`}
function jobRow(j){return `<div class="row ${selected.job===j.id?'active':''}" onclick="selectItem('job','${j.id}')"><div><b>${esc(j.title)}</b><div class="muted">${esc(j.id)} · ${esc(j.type)} · ${assetName(j.assetId)}</div></div><span class="stamp ${statusClass(j.status)}">${esc(j.status)}</span></div>`}
function jobEditor(j){const proc=project.procedures.find(p=>p.id===j.procedureId);return `<div class="formgrid">${field('Title','title',j.title,'job')}${field('Job ID','id',j.id,'job')}${select('Type','type',j.type,['Repair','Fabrication','Assembly','Inspection','Calibration','Maintenance'],'job')}${select('Status','status',j.status,['Draft','Ready','In Progress','Hold','Complete'],'job')}${select('Priority','priority',j.priority,['Low','Normal','Urgent','Outage'],'job')}${field('Assigned To','assigned',j.assigned,'job')}${select('Asset','assetId',j.assetId,project.assets.map(a=>[a.id,`${a.tag} — ${a.name}`]),'job')}${select('Procedure','procedureId',j.procedureId,project.procedures.map(p=>[p.id,p.title]),'job')}${field('Due Date','due',j.due,'job','date')}<label style="grid-column:1/-1">Notes<textarea oninput="patch('job','notes',this.value)">${esc(j.notes||'')}</textarea></label><label style="grid-column:1/-1">Exceptions / Deviations<textarea oninput="patch('job','exceptions',this.value)">${esc(j.exceptions||'')}</textarea></label></div><h3 style="margin:18px 0 10px">Traveler Steps</h3>${proc?proc.steps.map((s,i)=>`<div class="step"><h4><span>${i+1}. ${esc(s.title)}</span><label style="display:flex;align-items:center;gap:8px"><input style="width:auto" type="checkbox" ${j.done?.[i]?'checked':''} onchange="patch('job','done.${i}',this.checked)"> Done</label></h4><p>${esc(s.instruction)}</p><p><b>Verify:</b> ${esc(s.verification||'')}</p>${s.warning?`<p><b>Warning:</b> ${esc(s.warning)}</p>`:''}</div>`).join(''):'<div class="empty">Select a procedure to populate steps.</div>'}<div class="toolbar"><button onclick="printTraveler('${j.id}')">Print Traveler</button><button class="ghost" onclick="archiveJob('${j.id}')">Complete + Archive</button><button class="danger" onclick="deleteSelected('job')">Delete</button></div>`}
function procedureEditor(p){return `<div class="formgrid">${field('Title','title',p.title,'procedure')}${field('Procedure ID','id',p.id,'procedure')}${select('Type','type',p.type,['Repair','Fabrication','Assembly','Inspection','Calibration','Maintenance'],'procedure')}${select('Status','status',p.status,['Draft','Released','Superseded'],'procedure')}${field('Revision','revision',p.revision,'procedure')}<label style="grid-column:1/-1">Overview<textarea oninput="patch('procedure','overview',this.value)">${esc(p.overview||'')}</textarea></label><label>Prerequisites<textarea oninput="patch('procedure','prereq',this.value)">${esc(p.prereq||'')}</textarea></label><label>Tools<textarea oninput="patch('procedure','tools',this.value)">${esc(p.tools||'')}</textarea></label><label>Materials<textarea oninput="patch('procedure','materials',this.value)">${esc(p.materials||'')}</textarea></label><label>Warnings<textarea oninput="patch('procedure','warnings',this.value)">${esc(p.warnings||'')}</textarea></label></div><div class="card-h" style="padding-left:0;padding-right:0"><h3>Controlled Steps</h3><button class="soft" onclick="addStep('${p.id}')">Add Step</button></div>${p.steps.map((s,i)=>`<div class="step"><h4><span>${i+1}. <input value="${esc(s.title)}" oninput="patch('procedure','steps.${i}.title',this.value)"></span><button class="ghost mini" onclick="removeStep('${p.id}',${i})">Remove</button></h4><div class="formgrid"><label>Instruction<textarea oninput="patch('procedure','steps.${i}.instruction',this.value)">${esc(s.instruction||'')}</textarea></label><label>Verification<textarea oninput="patch('procedure','steps.${i}.verification',this.value)">${esc(s.verification||'')}</textarea></label><label>Warning<textarea oninput="patch('procedure','steps.${i}.warning',this.value)">${esc(s.warning||'')}</textarea></label><label>Evidence Required<textarea oninput="patch('procedure','steps.${i}.evidence',this.value)">${esc(s.evidence||'')}</textarea></label></div></div>`).join('')}<div class="toolbar"><button class="danger" onclick="deleteSelected('procedure')">Delete Procedure</button></div>`}
function labelEditor(l){return `<div class="formgrid">${field('Title','title',l.title,'label')}${field('Label ID','id',l.id,'label')}${select('Type','type',l.type,['Job Traveler','Asset Sticker','Tool Tag','Cable Label','Part Bin Label','Inspection Sticker','Warning Label','Step QR','Batch Label','Custom'],'label')}${select('Size','size',l.size,['Small','Medium','Large','Cable','Sheet'],'label')}${field('Subtitle','subtitle',l.subtitle,'label')}<label>Payload / QR Link<input value="${esc(l.payload||'')}" oninput="patch('label','payload',this.value)"></label><label style="grid-column:1/-1">Notes<textarea oninput="patch('label','notes',this.value)">${esc(l.notes||'')}</textarea></label></div><h3 style="margin:18px 0 10px">Preview</h3>${labelCard(l)}<div class="toolbar" style="margin-top:14px"><button onclick="printLabels()">Print Label Sheet</button><button class="danger" onclick="deleteSelected('label')">Delete Label</button></div>`}
function collectionView(kind,title,arr,adder,editor,sub){const id=selected[kind]||arr[0]?.id;selected[kind]=id;const obj=arr.find(x=>x.id===id);return `<div class="grid"><div class="card span-5"><div class="card-h"><h3>${title}</h3><button class="soft" onclick="${kind==='asset'?'addAsset':'addItem'}()">New</button></div><div class="card-b list">${arr.map(x=>`<div class="row ${selected[kind]===x.id?'active':''}" onclick="selectItem('${kind}','${x.id}')"><div><b>${esc(x.name||x.tag)}</b><div class="muted">${esc(sub(x))}</div></div></div>`).join('')||'<div class="empty">Nothing here yet.</div>'}</div></div><div class="card span-7"><div class="card-h"><h3>${obj?esc(obj.name||obj.tag):'No Selection'}</h3></div><div class="card-b">${obj?editor(obj):'<div class="empty">Create a record.</div>'}</div></div></div>`}
function assetEditor(a){return `<div class="formgrid">${field('Tag','tag',a.tag,'asset')}${field('Name','name',a.name,'asset')}${field('Location','location',a.location,'asset')}${field('Owner','owner',a.owner,'asset')}<label style="grid-column:1/-1">Notes<textarea oninput="patch('asset','notes',this.value)">${esc(a.notes||'')}</textarea></label></div><h3 style="margin:18px 0 10px">Asset Sticker</h3>${labelCard({title:a.tag,subtitle:a.location,payload:'workforge://asset/'+a.id,type:'Asset Sticker'})}<div class="toolbar" style="margin-top:14px"><button class="danger" onclick="deleteSelected('asset')">Delete Asset</button></div>`}
function itemEditor(i){return `<div class="formgrid">${field('Name','name',i.name,'item')}${field('Item ID','id',i.id,'item')}${select('Kind','kind',i.kind,['Tool','Part','Consumable','Fixture','Test Equipment'],'item')}${field('SKU','sku',i.sku,'item')}${field('Location','location',i.location,'item')}${field('How To URL','howTo',i.howTo,'item')}<label style="grid-column:1/-1">Notes<textarea oninput="patch('item','notes',this.value)">${esc(i.notes||'')}</textarea></label></div><h3 style="margin:18px 0 10px">Tool / Part Tag</h3>${labelCard({title:i.name,subtitle:[i.sku,i.location].filter(Boolean).join(' · '),payload:i.howTo||('workforge://item/'+i.id),type:'Tool Tag'})}<div class="toolbar" style="margin-top:14px"><button class="danger" onclick="deleteSelected('item')">Delete Item</button></div>`}
function field(label,key,val,type,input='text'){return `<label>${label}<input type="${input}" value="${esc(val||'')}" oninput="patch('${type}','${key}',this.value)"></label>`}
function select(label,key,val,opts,type){return `<label>${label}<select onchange="patch('${type}','${key}',this.value)">${opts.map(o=>{const v=Array.isArray(o)?o[0]:o,t=Array.isArray(o)?o[1]:o;return `<option value="${esc(v)}" ${v===val?'selected':''}>${esc(t)}</option>`}).join('')}</select></label>`}
function patch(type,path,value){const obj=current(type);if(!obj)return;setPath(obj,path,value);save();if(!path.includes('done.'))render()}
function current(type){const map={job:project.jobs,procedure:project.procedures,label:project.labels,asset:project.assets,item:project.items};return map[type]?.find(x=>x.id===selected[type])}
function setPath(obj,path,value){const parts=path.split('.');let ref=obj;for(let i=0;i<parts.length-1;i++){ref[parts[i]]??={};ref=ref[parts[i]]}ref[parts.at(-1)]=value}
function addJob(procId){const id='WF-'+new Date().getFullYear()+'-'+String(project.jobs.length+project.archive.length+1).padStart(4,'0');project.jobs.unshift({id,title:'Untitled Work Traveler',type:'Repair',status:'Draft',priority:'Normal',assetId:project.assets[0]?.id||'',procedureId:procId||project.procedures[0]?.id||'',assigned:'',due:new Date().toISOString().slice(0,10),notes:'',done:{},exceptions:''});selected.job=id;page='jobs';save();render()}
function addProcedure(){const id='PROC-'+String(project.procedures.length+1).padStart(3,'0');project.procedures.unshift({id,title:'New Procedure',type:'Assembly',status:'Draft',revision:'A',overview:'',prereq:'',tools:'',materials:'',warnings:'',steps:[{title:'New step',instruction:'Describe the work.',verification:'Describe how to verify it.',warning:'',evidence:''}]});selected.procedure=id;page='procedures';save();render()}
function addStep(id){const p=project.procedures.find(x=>x.id===id);p.steps.push({title:'New step',instruction:'',verification:'',warning:'',evidence:''});save();render()}
function removeStep(id,i){const p=project.procedures.find(x=>x.id===id);p.steps.splice(i,1);save();render()}
function addLabel(){const id='LBL-'+String(project.labels.length+1).padStart(4,'0');project.labels.unshift({id,type:'Custom',title:'New Label',subtitle:'',payload:'workforge://label/'+id,target:'',size:'Medium',notes:''});selected.label=id;page='labels';save();render()}
function addAsset(){const id='AST-'+String(project.assets.length+1).padStart(3,'0');project.assets.unshift({id,tag:id,name:'New Asset',location:'',owner:'',notes:''});selected.asset=id;page='assets';save();render()}
function addItem(){const id='ITM-'+String(project.items.length+1).padStart(3,'0');project.items.unshift({id,name:'New Item',kind:'Tool',sku:'',location:'',howTo:'',notes:''});selected.item=id;page='items';save();render()}
function archiveJob(id){const i=project.jobs.findIndex(j=>j.id===id);if(i<0)return;const job=project.jobs[i];if(!confirm('Complete and archive '+job.id+'?'))return;project.archive.unshift({...job,status:'Complete',archivedAt:new Date().toISOString()});project.jobs.splice(i,1);selected.job=project.jobs[0]?.id||null;save();render()}
function deleteSelected(type){const lists={job:'jobs',procedure:'procedures',label:'labels',asset:'assets',item:'items'};const list=project[lists[type]],id=selected[type];if(!id||!confirm('Delete '+id+'?'))return;const i=list.findIndex(x=>x.id===id);if(i>=0)list.splice(i,1);selected[type]=list[0]?.id||null;save();render()}
function assetName(id){const a=project.assets.find(x=>x.id===id);return a?esc(a.tag||a.name):'No asset'}
function statusClass(s){return String(s||'Draft').replace(/\s+/g,'')}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function labelCard(l){return `<div class="label-card"><div class="qr">${qrSvg(l.payload||l.id,88)}</div><div><h4>${esc(l.title||'Untitled')}</h4><p class="muted">${esc(l.subtitle||l.type||'')}</p><div class="label-code">${esc(l.payload||l.id)}</div></div></div>`}
function exportProject(){const blob=new Blob([JSON.stringify(project,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='workforge-project.json';a.click();URL.revokeObjectURL(a.href)}
function importProject(ev){const file=ev.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{project=normalize(JSON.parse(r.result));save();render()}catch(e){alert('Could not import JSON: '+e.message)}};r.readAsText(file);ev.target.value=''}
function clearStorage(){if(confirm('Clear Work Forge local storage? Export first if you need a backup.')){localStorage.removeItem(KEY);project=sampleProject();save();render()}}
function printTraveler(id){const j=project.jobs.find(x=>x.id===id);const p=project.procedures.find(x=>x.id===j.procedureId);const html=`<html><head><title>${esc(j.id)}</title><style>${printCss()}</style></head><body><section class="cover"><div><span class="stamp">${esc(j.status)}</span><h1>${esc(j.title)}</h1><p>${esc(j.id)} · ${esc(j.type)} · ${assetName(j.assetId)}</p></div>${labelCard({title:j.id,subtitle:'Traveler QR',payload:'workforge://job/'+j.id})}</section><h2>Procedure</h2><p><b>${esc(p?.title||'No procedure')}</b></p><p>${esc(p?.overview||'')}</p><h2>Prerequisites, Tools, Materials</h2><table><tr><th>Prerequisites</th><td>${esc(p?.prereq||'')}</td></tr><tr><th>Tools</th><td>${esc(p?.tools||'')}</td></tr><tr><th>Materials</th><td>${esc(p?.materials||'')}</td></tr><tr><th>Warnings</th><td>${esc(p?.warnings||'')}</td></tr></table><h2>Steps</h2>${(p?.steps||[]).map((s,i)=>`<div class="step"><h3>${i+1}. ${esc(s.title)} ${j.done?.[i]?'☑':'☐'}</h3><p>${esc(s.instruction)}</p><p><b>Verification:</b> ${esc(s.verification||'')}</p><p><b>Evidence:</b> ${esc(s.evidence||'')}</p></div>`).join('')}<h2>Notes and Exceptions</h2><p>${esc(j.notes||'')}</p><p>${esc(j.exceptions||'')}</p><script>print()<\/script></body></html>`;const w=open('','_blank');w.document.write(html);w.document.close()}
function printLabels(){const html=`<html><head><title>Work Forge Labels</title><style>${printCss()}</style></head><body><h1>Work Forge Label Sheet</h1><div class="sheet">${project.labels.map(labelCard).join('')}</div><script>print()<\/script></body></html>`;const w=open('','_blank');w.document.write(html);w.document.close()}
function printCss(){return `body{font-family:Arial,sans-serif;color:#111;margin:24px}.cover{display:grid;grid-template-columns:1fr 260px;gap:20px;border:2px solid #111;padding:18px;margin-bottom:20px}.stamp{border:2px solid #111;border-radius:6px;padding:4px 9px;font-weight:900;text-transform:uppercase}.label-card{display:grid;grid-template-columns:92px 1fr;gap:10px;align-items:center;border:1px dashed #777;border-radius:8px;padding:10px;break-inside:avoid}.label-code{font-family:monospace;font-size:10px;overflow-wrap:anywhere;color:#555}.sheet{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.step{border:1px solid #999;padding:10px;margin:10px 0;break-inside:avoid}table{width:100%;border-collapse:collapse}th,td{border:1px solid #999;text-align:left;padding:8px;vertical-align:top}.qr svg{width:88px;height:88px}`}
function qrSvg(text,size=88){try{const m=makeQrMatrix(String(text||'workforge'));const n=m.length,b=2,c=size/(n+b*2);let rs='';for(let y=0;y<n;y++)for(let x=0;x<n;x++)if(m[y][x])rs+=`<rect x="${((x+b)*c).toFixed(2)}" y="${((y+b)*c).toFixed(2)}" width="${c.toFixed(2)}" height="${c.toFixed(2)}"/>`;return `<svg viewBox="0 0 ${size} ${size}" role="img" aria-label="QR code" xmlns="http://www.w3.org/2000/svg"><rect width="${size}" height="${size}" fill="#fff"/><g fill="#111">${rs}</g></svg>`}catch(e){return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><rect width="${size}" height="${size}" fill="#fff"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="#111" font-size="10">QR</text></svg>`}}
function makeQrMatrix(text){const enc=new TextEncoder();let bytes=Array.from(enc.encode(text));const specs=[{v:1,data:19,ecc:7,align:[]},{v:2,data:34,ecc:10,align:[6,18]},{v:3,data:55,ecc:15,align:[6,22]},{v:4,data:80,ecc:20,align:[6,26]}];let spec=specs.find(s=>4+8+bytes.length*8+4<=s.data*8)||specs[3];if(bytes.length>spec.data-3)bytes=bytes.slice(0,spec.data-3);const bits=[];pushBits(bits,4,4);pushBits(bits,bytes.length,8);bytes.forEach(b=>pushBits(bits,b,8));const cap=spec.data*8;pushBits(bits,0,Math.min(4,cap-bits.length));while(bits.length%8)bits.push(0);const data=[];for(let i=0;i<bits.length;i+=8)data.push(bits.slice(i,i+8).reduce((a,b)=>(a<<1)|b,0));for(let pad=0;data.length<spec.data;pad++)data.push(pad%2?0x11:0xec);const code=data.concat(rsCompute(data,spec.ecc));const n=21+(spec.v-1)*4,m=Array.from({length:n},()=>Array(n).fill(false)),r=Array.from({length:n},()=>Array(n).fill(false));const set=(x,y,v,res=true)=>{if(x>=0&&y>=0&&x<n&&y<n){m[y][x]=!!v;if(res)r[y][x]=true}};const finder=(x,y)=>{for(let dy=-1;dy<=7;dy++)for(let dx=-1;dx<=7;dx++){const xx=x+dx,yy=y+dy;if(xx<0||yy<0||xx>=n||yy>=n)continue;const on=dx>=0&&dx<=6&&dy>=0&&dy<=6&&(dx===0||dx===6||dy===0||dy===6||(dx>=2&&dx<=4&&dy>=2&&dy<=4));set(xx,yy,on,true)}};finder(0,0);finder(n-7,0);finder(0,n-7);for(let i=8;i<n-8;i++){set(i,6,i%2===0,true);set(6,i,i%2===0,true)}for(const cy of spec.align)for(const cx of spec.align){if(r[cy]?.[cx])continue;for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++)set(cx+dx,cy+dy,Math.max(Math.abs(dx),Math.abs(dy))!==1,true)}set(8,4*spec.v+9,true,true);reserveFormat(r,n);const dataBits=[];code.forEach(b=>pushBits(dataBits,b,8));let bit=0,up=true;for(let x=n-1;x>=1;x-=2){if(x===6)x--;for(let yy=0;yy<n;yy++){const y=up?n-1-yy:yy;for(let dx=0;dx<2;dx++){const xx=x-dx;if(!r[y][xx])set(xx,y,bit<dataBits.length?dataBits[bit++]:false,false)}}up=!up}for(let y=0;y<n;y++)for(let x=0;x<n;x++)if(!r[y][x]&&((x+y)%2===0))m[y][x]=!m[y][x];drawFormat(m,r,n,0);return m}
function pushBits(a,v,l){for(let i=l-1;i>=0;i--)a.push((v>>>i)&1)}function reserveFormat(r,n){for(let i=0;i<9;i++){if(i!==6){r[8][i]=true;r[i][8]=true}}for(let i=0;i<8;i++)r[8][n-1-i]=true;for(let i=0;i<7;i++)r[n-1-i][8]=true}function drawFormat(m,r,n,mask){const data=(1<<3)|mask;let rem=data<<10;for(let i=14;i>=10;i--)if((rem>>>i)&1)rem^=0x537<<(i-10);const bits=((data<<10)|rem)^0x5412;const bit=i=>((bits>>>i)&1)===1;const set=(x,y,i)=>{m[y][x]=bit(i);r[y][x]=true};for(let i=0;i<=5;i++)set(8,i,i);set(8,7,6);set(8,8,7);set(7,8,8);for(let i=9;i<15;i++)set(14-i,8,i);for(let i=0;i<8;i++)set(n-1-i,8,i);for(let i=8;i<15;i++)set(8,n-15+i,i)}
function rsCompute(data,degree){initGf();let gen=[1];for(let i=0;i<degree;i++)gen=polyMul(gen,[1,GF_EXP[i]]);const rem=Array(degree).fill(0);for(const b of data){const factor=b^rem.shift();rem.push(0);for(let i=0;i<degree;i++)rem[i]^=gfMul(gen[i+1],factor)}return rem}let GF_EXP=null,GF_LOG=null;function initGf(){if(GF_EXP)return;GF_EXP=Array(512).fill(0);GF_LOG=Array(256).fill(0);let x=1;for(let i=0;i<255;i++){GF_EXP[i]=x;GF_LOG[x]=i;x<<=1;if(x&0x100)x^=0x11d}for(let i=255;i<512;i++)GF_EXP[i]=GF_EXP[i-255]}function gfMul(a,b){return a&&b?GF_EXP[GF_LOG[a]+GF_LOG[b]]:0}function polyMul(p,q){const out=Array(p.length+q.length-1).fill(0);for(let i=0;i<p.length;i++)for(let j=0;j<q.length;j++)out[i+j]^=gfMul(p[i],q[j]);return out}
})();
