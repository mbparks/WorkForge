(j.steps)?j.steps:[];j.parts=Array.isArray(j.parts)?j.parts:[];j.tools=Array.isArray(j.tools)?j.tools:[];j.status=j.status||'Draft';j.due=j.due||D();j.exceptions=j.exceptions||'';j.closeout=j.closeout||''});x.labels.forEach(l=>{l.type=l.type||'Custom';l.payload=l.payload||('workforge://label/'+l.id);l.size=l.size||'2x1';l.copies=Number(l.copies||1)});x.queue=x.queue.filter(id=>x.labels.some(l=>l.id==id));x.schema=SCHEMA;return x}function nid(k){let p={job:'WF-'+new Date().getFullYear()+'-',proc:'PROC-',label:'LBL-',asset:'AST-',item:'ITM-',act:'CA-',sig:'SO-'}[k],n=db.c[k]||1;db.c[k]=n+1;return p+String(n).padStart(k=='job'?4:3,'0')}function load(){try{return norm(JSON.parse(localStorage.getItem(KEY))||sample())}catch{return norm(sample())}}function save(){db.version=VER;localStorage.setItem(KEY,JSON.stringify(db));$('save').textContent='Autosaved '+new Date().toLocaleTimeString()}function log(a,r=''){db.log.unshift({at:new Date().toISOString(),event:a,ref:r});db.log=db.log.slice(0,80)}function pct(j){return j.steps.length?Math.round(j.steps.filter(s=>s.done).length*100/j.steps.length):0}function fail(j){return j.steps.filter(s=>s.result=='Fail').length}function acts(j){return db.actions.filter(a=>a.source==j.id&&a.status!='Closed').length}function sigs(j){return db.signoffs.filter(s=>s.source==j.id&&s.status!='Signed').length}function closeout(j){if(fail(j))return'Blocked: Failed Step';if(acts(j))return'Corrective Action Open';if(sigs(j))return'Signoff Required';if(pct(j)<100)return'Gate Open';if(!j.closeout)return'Closeout Note Needed';return'Ready to Archive'}function issues(){let a=[],s={};['jobs','procedures','assets','items','labels','actions','signoffs'].forEach(k=>db[k].forEach(o=>{if(!o.id)a.push(['Error',k,'Missing ID']);else if(s[o.id])a.push(['Error',k,'Duplicate ID '+o.id]);else s[o.id]=1}));return a}function m(t,v){return`<div class=card><div class=metric>${v}</div><b>${t}</b></div>`}function tbl(h,r){return`<table><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr>${r.map(a=>`<tr>${a.map(x=>`<td>${E(x)}</td>`).join('')}</tr>`).join('')}</table>`}function card(t,b,x){return`<div class=card><div class=top><h3>${t}</h3><div class=tools>${b}</div></div>${x}</div>`}function row(j,i){return`<div class=row onclick=selectJob(${i})><div><b>${E(j.title)}</b><div class=muted>${j.id} · ${j.status} · ${closeout(j)}</div></div><span class=pill>${pct(j)}%</span></div>`}function selectJob(i){sel=i;go('Jobs')}function go(p){page=p;draw()}function draw(){$('ver').textContent=VER;$('title').textContent=page;$('nav').innerHTML=P.map((p,i)=>`<button class="${page==p?'on':''}" data-i=${i}>${E(p)}</button>`).join('');document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(P[+b.dataset.i]));$('view').innerHTML=views[page]()}let views={Dashboard:()=>`<div class=grid>${m('Active Jobs',db.jobs.length)}${m('Packets',db.jobs.length+db.archive.length)}${m('Label Queue',db.queue.length)}${m('Pending Signoffs',db.signoffs.filter(s=>s.status!='Signed').length)}</div>${db.jobs.map(row).join('')}`,'Traveler Packets':()=>packetView(),Jobs:()=>jobView(db.jobs[sel]||db.jobs[0]),Procedures:()=>card('Procedures',`<button class=soft onclick=newProc()>New Procedure</button>`,db.procedures.map((p,i)=>`<div class=step><b>${E(p.title)}</b><br>${E(p.id)} · ${E(p.status)} <button class=ghost onclick='travelerFromProc(${i})'>Create Traveler</button></div>`).join('')),Labels:()=>card('Labels',`<button class=soft onclick=newLabel()>New Label</button><button class=ghost onclick=batchLabels()>Batch Labels</button><button class=ghost onclick=dedupeLabels()>Dedupe</button><button class=ghost onclick=queueAllLabels()>Queue All</button><button class=ghost onclick=csvLabels()>Labels CSV</button>`,db.labels.map((l,i)=>labelCard(l,i)).join('')||'<p class=muted>No labels.</p>'),'Label Queue':()=>card('Label Queue',`<button class=soft onclick=printLabels()>Print Label Sheet</button><button class=ghost onclick=clearQueue()>Clear Queue</button><button class=ghost on chived records.</p>'),Settings:()=>card('Settings',`<button onclick=exportJSON()>Export JSON</button><button class=ghost onclick=imp.click()>Import JSON</button><button class=ghost onclick=diag()>Run Diagnostics</button><button class=bad onclick=clearStore()>Clear Local Storage</button>`,`<p><b>${VER}</b></p><p>Schema ${SCHEMA}</p><p id=diag class=muted>Diagnostics not run.</p>`)};function qr(p){let h=0,c='';for(let ch of p)h=(h*31+ch.charCodeAt(0))>>>0;for(let i=0;i<64;i++){h=(h*1664525+1013904223)>>>0;c+=`<i class=${h&1?'b':''}></i>`}return`<div class=qr title="${E(p)}">${c}</div>`}function labelCard(l,i){return`<div class='step label ${l.size=='1x1'?'small':''}'>${qr(l.payload)}<div><b>${E(l.title)}</b><br>${E(l.type)} · ${E(l.size)} · copies ${E(l.copies)}<br><span class=muted>${E(l.payload)}</span><div class=tools><button class=ghost onclick='queueLabel(${i})'>Queue</button><button class=ghost onclick='setLabelSize(${i})'>Size</button><button class=ghost onclick='copyLabel(${i})'>Copy</button></div></div></div>`}function queueLabel(i){let id=db.labels[i].id;if(!db.queue.includes(id))db.queue.push(id);save();draw()}function queueAllLabels(){db.labels.forEach(l=>{if(!db.queue.includes(l.id))db.queue.push(l.id)});save();go('Label Queue')}function queueView(){let labs=db.queue.map(id=>db.labels.find(l=>l.id==id)).filter(Boolean);return labs.length?`<div class=sheet>${labs.map(l=>labelCard(l,db.labels.indexOf(l))).join('')}</div>`:'<p class=muted>No labels queued.</p>'}function printLabels(){let labs=db.queue.map(id=>db.labels.find(l=>l.id==id)).filter(Boolean);if(!labs.length)return alert('No labels queued.');let w=open('','_blank');if(!w)return alert('Allow pop-ups to print labels.');w.document.write(`<!doctype html><title>Work Forge Labels</title><style>body{font:12px system-ui;margin:16px;color:#111}.sheet{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.label{border:1px solid #aaa;padding:8px;break-inside:avoid;display:grid;grid-template-columns:88px 1  Initials: ${E(s.initials||'_____')}<div class=line></div></div>`).join('')}</section><section><h3>Parts & Tools</h3><p><b>Parts:</b> ${E((j.parts||[]).join(', ')||'Not listed')}</p><p><b>Tools:</b> ${E((j.tools||[]).join(', ')||'Not listed')}</p></section><section><h3>Corrective Actions</h3>${A.length?tbl(['ID','Title','Owner','Due','Status'],A.map(a=>[a.id,a.title,a.owner,a.due,a.status])):'<p>None recorded.</p>'}</section><section><h3>Signoff Block</h3>${S.length?tbl(['Role','Reviewer','Status','Date'],S.map(s=>[s.role,s.reviewer,s.status,s.date])):'<p>No signoffs assigned.</p>'}<p>Technician:</p><div class=line></div><p>Reviewer:</p><div class=line></div></section><section><h3>Labels / QR Payloads</h3>${L.length?tbl(['Title','Type','Payload'],L.map(l=>[l.title,l.type,l.payload])):'<p>No labels generated for this traveler.</p>'}</section><section><h3>Closeout Summary</h3><p>${E(j.closeout||'Closeout notes not entered.')}</p></section></div>`}function printPacket(j){let w=open('','_blank');if(!w)return alert('Allow pop-ups to print packets.');w.document.write(`<!doctype html><title>${E(j.id)} Packet</title><style>body{font:13px system-ui;margin:24px;color:#111}.step{border:1px solid #bbb;padding:8px;margin:8px 0;break-inside:avoid}table{width:100%;border-collapse:collapse}td,th{border:1px solid #bbb;padding:6px}.line{border-bottom:1px solid #111;height:28px}section{border-top:1px solid #bbb;margin-top:16px;padding-top:10px}</style>${packetHTML(j)}`);w.document.close();w.print&&w.print();log('Traveler packet printed',j.id);save()}function jobView(j){return card(j.title,`<button onclick=status('Ready')>Ready</button><button onclick=status('In Progress')>Start</button><button onclick=status('Hold')>Hold</button><button class=soft onclick=archiveJob()>Archive</button><button class=ghost onclick='printPacket(db.jobs[sel])'>Print Packet</button><button class=ghost onclick=actionForJob()>Add Action</button><button class=ghost onclick=signoffForJob()>Add Signoff</button><button class=ghost onclick=labelForJob()>Label</button>`,`<p><span class='pill ${closeout(j)=='Ready to Archive'?'ok':'need'}'>${closeout(j)}</span></p><label>Title<input value='${E(j.title)}' oninput='j.title=this.value;save()'></label><label>Parts, comma separated<input value='${E((j.parts||[]).join(', '))}' oninput='j.parts=this.value.split(/, */).filter(Boolean);save()'></label><label>Tools, comma separated<input value='${E((j.tools||[]).join(', '))}' oninput='j.tools=this.value.split(/, */).filter(Boolean);save()'></label><label>Exception<textarea oninput='j.exceptions=this.value;save()'>${E(j.exceptions)}</textarea></label><label>Closeout Notes<textarea oninput='j.closeout=this.value;save()'>${E(j.closeout)}</textarea></label>${j.steps.map((s,i)=>`<div class=step><b>${i+1}. ${E(s.t)}</b><label><input type=checkbox ${s.done?'checked':''} onchange='s.done=this.checked;save();draw()'> Done</label><select onchange='s.result=this.value;save();draw()'>${['Not Checked','Pass','Fail','N/A'].map(x=>`<option ${s.result==x?'selected':''}>${x}</option>`).join('')}</select><input placeholder=Initials value='${E(s.initials)}' oninput='s.initials=this.value;save()'></div>`).join('')}`)}function addLabel(title,type,payload,size='2x1'){let old=db.labels.find(l=>l.payload==payload&&l.type==type);if(old)return old.id;let id=nid('label');db.labels.unshift({id,title,type,payload,size,copies:1});return id}function status(s){db.jobs[sel].status=s;log('Status changed',db.jobs[sel].id);save();draw()}function archiveJob(){let j=db.jobs[sel];if(closeout(j)!='Ready to Archive'&&!confirm('Closeout gate open. Archive anyway?'))return;j.status='Complete';db.archive.unshift(j);db.jobs.splice(sel,1);sel=0;save();draw()}function restore(i){db.jobs.unshift(db.archive.splice(i,1)[0]);go('Jobs');save();draw()}function newJob(){db.jobs.unshift({id:nid('job'),title:'Untitled Work Traveler',status:'Draft',due:D(),assigned:'',parts:[],tools:[],exceptions:'',closeout:'',steps:[{t:'New step',done:false,result:'Not Checked',initials:''}]});sel=0;go('Jobs');save();draw()}function newProc(){db.procedures.unshift({id:nid('proc'),title:'New Procedure',status:'Draft',steps:['New step']});save();draw()}function travelerFromProc(i){let p=db.procedures[i];newJob();db.jobs[0].title=p.title;db.jobs[0].proc=p.id;db.jobs[0].steps=(p.steps||[]).map(t=>({t,done:false,result:'Not Checked',initials:''}));save();draw()}function newLabel(){addLabel('New Label','Custom','workforge://label/'+Date.now());save();draw()}function labelForJob(){let j=db.jobs[sel];addLabel(j.id,'Job Traveler','workforge://job/'+j.id);go('Labels');save();draw()}function batchLabels(){db.jobs.forEach(j=>addLabel(j.id,'Job Traveler','workforge://job/'+j.id));db.assets.forEach(a=>addLabel(a.tag,'Asset Sticker','workforge://asset/'+a.id));db.items.forEach(i=>addLabel(i.name,i.kind=='Part'?'Part Bin':'Tool Tag','workforge://item/'+i.id));save();draw()}function newAsset(){db.assets.unshift({id:nid('asset'),tag:'NEW',name:'New Asset',loc:''});save();draw()}function newItem(){db.items.unshift({id:nid('item'),name:'New Item',kind:'Tool',qty:1});save();draw()}function assetLabel(i){let a=db.assets[i];addLabel(a.tag,'Asset Sticker','workforge://asset/'+a.id);go('Labels');save();draw()}function itemLabel(i){let it=db.items[i];addLabel(it.name,it.kind=='Part'?'Part Bin':'Tool Tag','workforge://item/'+it.id);go('Labels');save();draw()}function newAction(){db.actions.unshift({id:nid('act'),source:'Manual',title:'New corrective action',owner:'',due:D(),status:'Open'});save();draw()}function actionForJob(){let j=db.jobs[sel];db.actions.unshift({id:nid('act'),source:j.id,title:'Follow up: '+j.title,owner:j.assigned||'',due:D(),status:'Open'});go('Actions');save();draw()}function closeAction(i){db.actions[i].status='Closed';log('Action closed',db.actions[i].id);save();draw()}function newSignoff(){db.signoffs.unshift({id:nid('sig'),source:'Manual',role:'Review',reviewer:'',status:'Pending',date:''});save();draw()}function signoffForJob(){let j=db.jobs[sel];db.signoffs.unshift({id:nid('sig'),source:j.id,role:'Work Review',reviewer:j.assigned||'',status:'Pending',date:''});go('Signoffs');save();draw()}function signOff(i){db.signoffs[i].status='Signed';db.signoffs[i].date=D();log('Signoff signed',db.signoffs[i].id);save();draw()}function csv(n,r){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([r.map(x=>x.join(',')).join(String.fromCharCode(10))],{type:'text/csv'}));a.download=n;a.click()}function csvStatus(){csv('workforge-status.csv',[['ID','Title','Status','Closeout'],...db.jobs.map(j=>[j.id,j.title,j.status,closeout(j)])])}function csvActions(){csv('workforge-actions.csv',[['Status','ID','Source','Title','Owner','Due'],...db.actions.map(a=>[a.status,a.id,a.source,a.title,a.owner,a.due])])}function csvSignoffs(){csv('workforge-signoffs.csv',[['Status','ID','Source','Role','Reviewer','Date'],...db.signoffs.map(s=>[s.status,s.id,s.source,s.role,s.reviewer,s.date])])}function csvLabels(){csv('workforge-labels.csv',[['ID','Title','Type','Size','Copies','Payload'],...db.labels.map(l=>[l.id,l.title,l.type,l.size,l.copies,l.payload])])}function csvPackets(){csv('workforge-packet-index.csv',[['ID','Title','Status','Due','Closeout','Actions','Signoffs'],...db.jobs.map(j=>[j.id,j.title,j.status,j.due,closeout(j),acts(j),sigs(j)])])}function exportJSON(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='workforge-backup-'+D()+'.json';a.click()}function importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{db=norm(JSON.parse(r.result));log('JSON imported','schema '+SCHEMA);save();draw()};r.readAsText(f)}function loadSample(){if(confirm('Replace current local data?')){db=norm(sample());save();draw()}}function clearStore(){if(confirm('Clear local storage?')){localStorage.removeItem(KEY);db=norm(sample());save();draw()}}function diag(){$('diag').innerHTML='<span class=pill>PASS</span> '+P.length+' views, '+issues().length+' integrity issues, schema '+db.schema+'.'}db=load();draw();
</script>
