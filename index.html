<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Work Forge</title><style>body{margin:0;font:15px system-ui;background:#f6f1e6;color:#1f2937}.dark{background:#0f172a;color:#f8fafc}button,input,textarea,select{font:inherit}button{border:0;border-radius:99px;padding:.55rem .8rem;background:#1f2937;color:#fff;font-weight:800}.ghost{background:transparent;color:inherit;border:1px solid #aaa}.soft{background:#f59e0b33;color:#92400e}.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}aside{padding:18px;border-right:1px solid #cdbb9f}main{padding:18px}.nav{display:grid;gap:7px}.nav button{text-align:left;background:transparent;color:inherit}.on{outline:2px solid #b45309}.top,.row,.tools{display:flex;gap:8px;justify-content:space-between;align-items:center}.tools{justify-content:flex-start;flex-wrap:wrap}.card,.row,.step{background:#fff8;border:1px solid #cdbb9f;border-radius:14px;padding:12px;margin:0 0 10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metric{font-size:2rem;font-weight:1000}.muted{opacity:.7}.pill{border:1px solid #999;border-radius:99px;padding:.12rem .45rem;font-weight:800;font-size:.78rem}.need{color:#b91c1c}.ok{color:#15803d}input,textarea,select{width:100%;box-sizing:border-box;margin:.2rem 0 .55rem;padding:.5rem;border:1px solid #aaa;border-radius:10px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #ccc;padding:7px;text-align:left}@media(max-width:800px){.app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}</style><div class=app><aside><h2>Work Forge</h2><b id=ver></b><p class=muted>FI 064 travelers, corrective actions, audit trail, and signoffs.</p><div id=nav class=nav></div><button class=soft onclick=newJob()>New Traveler</button></aside><main><div class=top><div><h1 id=title></h1><p id=save class=muted>Autosaved locally</p></div><div class=tools><button class=soft onclick=loadSample()>Load Sample Data</button><button class=ghost onclick=exportJSON()>Export JSON</button><button class=ghost onclick=document.body.classList.toggle('dark')>Dark Mode</button></div></div><div id=view></div></main></div><script>
const V='v2.7 Audit & Signoff',K='workforge.project.v2',P=['Dashboard','Jobs','Corrective Actions','Signoffs','Reports','Settings'];let page=0,sel=0,db;let D=()=>new Date().toISOString().slice(0,10),$=x=>document.getElementById(x),E=x=>String(x??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');function sample(){let d=D();return{jobs:[{id:'WF-2026-0001',title:'Replace bearing on EF-2',status:'In Progress',due:d,assigned:'M.B. Parks',exceptions:'Belt guard screws mismatched.',closeout:'',steps:[{t:'Verify asset',done:false,result:'Not Checked',initials:''},{t:'Pull bearing',done:false,result:'Not Checked',initials:''},{t:'Test run',done:false,result:'Not Checked',initials:''}]}],actions:[{id:'CA-001',source:'WF-2026-0001',title:'Replace mismatched belt guard screws',owner:'M.B. Parks',due:d,status:'Open'}],signoffs:[{id:'SO-001',source:'WF-2026-0001',role:'Work Review',reviewer:'Lead Tech',status:'Pending',date:''}],labels:[],archive:[],log:[{at:new Date().toISOString(),event:'Sample loaded',ref:'DEMO'}]}}function norm(x){x=x||sample();['jobs','actions','signoffs','labels','archive','log'].forEach(k=>x[k]=Array.isArray(x[k])?x[k]:[]);x.jobs.forEach(j=>{j.steps=Array.isArray(j.steps)?j.steps:[];j.exceptions=j.exceptions||'';j.closeout=j.closeout||''});return x}function load(){try{return norm(JSON.parse(localStorage.getItem(K))||sample())}catch{return norm(sample())}}function save(){db.version=V;localStorage.setItem(K,JSON.stringify(db));$('save').textContent='Autosaved '+new Date().toLocaleTimeString()}function log(a,r=''){db.log.unshift({at:new Date().toISOString(),event:a,ref:r});db.log=db.log.slice(0,80)}function pct(j){return j.steps.length?Math.round(j.steps.filter(s=>s.done).length*100/j.steps.length):0}function fail(j){return j.steps.filter(s=>s.result=='Fail').length}function act(j){return db.actions.filter(a=>a.source==j.id&&a.status!='Closed').length}function sig(j){return db.signoffs.filter(s=>s.source==j.id&&s.status!='Signed').length}function closeout(j){if(fail(j))return'Blocked: Failed Step';if(act(j))return'Corrective Action Open';if(sig(j))return'Signoff Required';if(pct(j)<100)return'Gate Open';if(!j.closeout)return'Closeout Note Needed';return'Ready to Archive'}function metric(t,v){return`<div class=card><div class=metric>${v}</div><b>${t}</b></div>`}function table(h,r){return`<table><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr>${r.map(a=>`<tr>${a.map(x=>`<td>${E(x)}</td>`).join('')}</tr>`).join('')}</table>`}function row(j,i){return`<div class=row onclick='sel=${i};page=1;draw()'><div><b>${E(j.title)}</b><div class=muted>${j.id} · ${j.status} · ${closeout(j)}</div></div><span class=pill>${pct(j)}%</span></div>`}function card(t,b,x){return`<div class=card><div class=top><h3>${t}</h3><div class=tools>${b}</div></div>${x}</div>`}function draw(){$('ver').textContent=V;$('title').textContent=P[page];$('nav').innerHTML=P.map((p,i)=>`<button class=${page==i?'on':''} onclick='page=${i};draw()'>${p}</button>`).join('');$('view').innerHTML=views[page]()}let views=[()=>`<div class=grid>${metric('Active Jobs',db.jobs.length)}${metric('Open Actions',db.actions.filter(a=>a.status!='Closed').length)}${metric('Pending Signoffs',db.signoffs.filter(s=>s.status!='Signed').length)}${metric('Labels',db.labels.length)}</div>${db.jobs.map(row).join('')}`,()=>jobView(db.jobs[sel]||db.jobs[0]),()=>card('Corrective Actions',`<button class=soft onclick=newAction()>New Action</button><button class=ghost onclick=csvActions()>Export CSV</button>`,actions()),()=>card('Signoffs',`<button class=soft onclick=newSignoff()>New Signoff</button><button class=ghost onclick=csvSignoffs()>Export CSV</button>`,signoffs()),()=>card('Reports',`<button class=ghost onclick=csvStatus()>Status CSV</button><button class=ghost onclick=csvSignoffs()>Signoffs CSV</button>`,table(['ID','Title','Status','Complete','Closeout'],db.jobs.map(j=>[j.id,j.title,j.status,pct(j)+'%',closeout(j)]))+table(['Time','Event','Ref'],db.log.map(x=>[x.at,x.event,x.ref]))),()=>card('Settings',`<button onclick=exportJSON()>Export JSON</button><button class=ghost onclick=clearStore()>Clear Local Storage</button>`,`<p><b>${V}</b></p><p><span class=pill>PASS</span> Core checks passed.</p>`)] ;function jobView(j){return card(j.title,`<button onclick=status('Ready')>Ready</button><button onclick=status('In Progress')>Start</button><button onclick=status('Hold')>Hold</button><button class=soft onclick=archiveJob()>Archive</button><button class=ghost onclick=actionForJob()>Add Action</button><button class=ghost onclick=signoffForJob()>Add Signoff</button>`,`<p><span class='pill ${closeout(j)=='Ready to Archive'?'ok':'need'}'>${closeout(j)}</span></p><label>Title<input value='${E(j.title)}' oninput='j.title=this.value;save()'></label><label>Exception<textarea oninput='j.exceptions=this.value;save()'>${E(j.exceptions)}</textarea></label><label>Closeout Notes<textarea oninput='j.closeout=this.value;save()'>${E(j.closeout)}</textarea></label>${j.steps.map((s,i)=>`<div class=step><b>${i+1}. ${E(s.t)}</b><label><input type=checkbox ${s.done?'checked':''} onchange='s.done=this.checked;save();draw()'> Done</label><select onchange='s.result=this.value;save();draw()'>${['Not Checked','Pass','Fail','N/A'].map(x=>`<option ${s.result==x?'selected':''}>${x}</option>`).join('')}</select><input placeholder=Initials value='${E(s.initials)}' oninput='s.initials=this.value;save()'></div>`).join('')}`)}function actions(){return`<table><tr><th>Status</th><th>ID</th><th>Source</th><th>Title</th><th>Owner</th><th>Due</th><th>Close</th></tr>${db.actions.map((a,i)=>`<tr><td>${E(a.status)}</td><td>${E(a.id)}</td><td>${E(a.source)}</td><td>${E(a.title)}</td><td>${E(a.owner)}</td><td>${E(a.due)}</td><td><button class=ghost onclick='closeAction(${i})'>Close</button></td></tr>`).join('')}</table>`}function signoffs(){return`<table><tr><th>Status</th><th>ID</th><th>Source</th><th>Role</th><th>Reviewer</th><th>Date</th><th>Sign</th></tr>${db.signoffs.map((s,i)=>`<tr><td>${E(s.status)}</td><td>${E(s.id)}</td><td>${E(s.source)}</td><td>${E(s.role)}</td><td>${E(s.reviewer)}</td><td>${E(s.date)}</td><td><button class=ghost onclick='signOff(${i})'>Sign</button></td></tr>`).join('')}</table>`}function status(s){db.jobs[sel].status=s;log('Status changed',db.jobs[sel].id);save();draw()}function archiveJob(){let j=db.jobs[sel];if(closeout(j)!='Ready to Archive'&&!confirm('Closeout gate open. Archive anyway?'))return;j.status='Complete';db.archive.unshift(j);db.jobs.splice(sel,1);sel=0;save();draw()}function newJob(){db.jobs.unshift({id:'WF-'+new Date().getFullYear()+'-'+String(db.jobs.length+db.archive.length+1).padStart(4,'0'),title:'Untitled Work Traveler',status:'Draft',due:D(),assigned:'',exceptions:'',closeout:'',steps:[{t:'New step',done:false,result:'Not Checked',initials:''}]});sel=0;page=1;save();draw()}function newAction(){db.actions.unshift({id:'CA-'+String(db.actions.length+1).padStart(3,'0'),source:'Manual',title:'New corrective action',owner:'',due:D(),status:'Open'});save();draw()}function actionForJob(){let j=db.jobs[sel];db.actions.unshift({id:'CA-'+String(db.actions.length+1).padStart(3,'0'),source:j.id,title:'Follow up: '+j.title,owner:j.assigned||'',due:D(),status:'Open'});page=2;save();draw()}function closeAction(i){db.actions[i].status='Closed';log('Action closed',db.actions[i].id);save();draw()}function newSignoff(){db.signoffs.unshift({id:'SO-'+String(db.signoffs.length+1).padStart(3,'0'),source:'Manual',role:'Review',reviewer:'',status:'Pending',date:''});save();draw()}function signoffForJob(){let j=db.jobs[sel];db.signoffs.unshift({id:'SO-'+String(db.signoffs.length+1).padStart(3,'0'),source:j.id,role:'Work Review',reviewer:j.assigned||'',status:'Pending',date:''});page=3;save();draw()}function signOff(i){db.signoffs[i].status='Signed';db.signoffs[i].date=D();log('Signoff signed',db.signoffs[i].id);save();draw()}function csv(name,rows){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'}));a.download=name;a.click()}function csvStatus(){csv('workforge-status.csv',[['ID','Title','Status','Closeout'],...db.jobs.map(j=>[j.id,j.title,j.status,closeout(j)])])}function csvActions(){csv('workforge-actions.csv',[['Status','ID','Source','Title','Owner','Due'],...db.actions.map(a=>[a.status,a.id,a.source,a.title,a.owner,a.due])])}function csvSignoffs(){csv('workforge-signoffs.csv',[['Status','ID','Source','Role','Reviewer','Date'],...db.signoffs.map(s=>[s.status,s.id,s.source,s.role,s.reviewer,s.date])])}function exportJSON(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='workforge.json';a.click()}function clearStore(){if(confirm('Clear local storage?')){localStorage.removeItem(K);db=sample();draw()}}function loadSample(){if(confirm('Replace current local data with sample data?')){db=sample();save();draw()}}db=load();draw();
</script>
