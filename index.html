<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Work Forge</title>
  <style>
    :root{
      color-scheme: light;
      --bg:#f6f1e6;
      --bg2:#efe3cc;
      --panel:#fffaf0;
      --panel2:#fef3c7;
      --ink:#1f2933;
      --muted:#667085;
      --line:#ded2bd;
      --brand:#b45309;
      --brand-ink:#7c2d12;
      --teal:#0f766e;
      --blue:#2563eb;
      --danger:#b91c1c;
      --ok:#15803d;
      --warn:#b7791f;
      --shadow:0 18px 45px rgba(80,50,20,.12);
      --radius:18px;
    }
    :root[data-theme="dark"]{
      color-scheme: dark;
      --bg:#0f172a;
      --bg2:#111827;
      --panel:#1f2937;
      --panel2:#312e1b;
      --ink:#f8fafc;
      --muted:#cbd5e1;
      --line:#334155;
      --brand:#f59e0b;
      --brand-ink:#fcd34d;
      --teal:#5eead4;
      --blue:#93c5fd;
      --danger:#f87171;
      --ok:#86efac;
      --warn:#fbbf24;
      --shadow:0 18px 50px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      background:radial-gradient(circle at top left,rgba(245,158,11,.18),transparent 34rem),linear-gradient(135deg,var(--bg),var(--bg2));
      color:var(--ink);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    button,input,select,textarea{font:inherit}
    button{
      border:0;
      border-radius:999px;
      padding:.68rem .95rem;
      background:var(--ink);
      color:var(--panel);
      font-weight:850;
      cursor:pointer;
      transition:.15s transform,.15s filter,.15s border-color;
    }
    button:hover{filter:brightness(1.05);transform:translateY(-1px)}
    button:disabled{opacity:.5;cursor:not-allowed;transform:none}
    button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
    button.soft{background:rgba(180,83,9,.13);color:var(--brand);border:1px solid rgba(180,83,9,.25)}
    button.teal{background:rgba(15,118,110,.14);color:var(--teal);border:1px solid rgba(15,118,110,.25)}
    button.danger{background:var(--danger);color:white}
    button.small,.small{font-size:.82rem;padding:.45rem .68rem}
    .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .side{
      padding:22px;
      border-right:1px solid var(--line);
      background:rgba(255,255,255,.25);
      backdrop-filter:blur(12px);
      position:sticky;
      top:0;
      height:100vh;
      overflow:auto;
    }
    :root[data-theme="dark"] .side{background:rgba(15,23,42,.55)}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}
    .mark{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--teal));display:grid;place-items:center;color:white;font-weight:1000;box-shadow:var(--shadow)}
    h1,h2,h3,h4{margin:0;line-height:1.15}
    h1{font-size:1.28rem}.brand small{color:var(--muted);font-weight:800}
    .nav{display:grid;gap:8px;margin-top:18px}
    .nav button{justify-content:flex-start;text-align:left;border-radius:14px;background:transparent;color:var(--ink);border:1px solid transparent;width:100%}
    .nav button.active{background:var(--panel);border-color:var(--line);box-shadow:var(--shadow)}
    .side-foot{margin-top:22px;border-top:1px solid var(--line);padding-top:16px;display:grid;gap:8px}
    .main{padding:22px;overflow:auto}
    .topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px;position:sticky;top:0;background:linear-gradient(var(--bg),rgba(0,0,0,0));z-index:5;padding-bottom:12px}
    :root[data-theme="dark"] .topbar{background:linear-gradient(var(--bg),rgba(0,0,0,0))}
    .actions,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .card-h{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}
    .card-b{padding:18px}
    .span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-5{grid-column:span 5}.span-6{grid-column:span 6}.span-7{grid-column:span 7}.span-8{grid-column:span 8}.span-9{grid-column:span 9}.span-12{grid-column:span 12}
    .metric{font-size:2.1rem;font-weight:1000;letter-spacing:-.03em}.muted{color:var(--muted)}
    .list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);background:rgba(255,255,255,.08);border-radius:14px;padding:12px;cursor:pointer}
    .row:hover{border-color:var(--brand)}.row.active{outline:2px solid var(--brand)}
    .row-title{font-weight:900}.row-sub{color:var(--muted);font-size:.86rem;margin-top:2px}.row-meta{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:.25rem .55rem;font-size:.76rem;font-weight:900;border:1px solid var(--line);color:var(--muted);white-space:nowrap}
    .pill.brand{color:var(--brand);border-color:rgba(180,83,9,.35);background:rgba(180,83,9,.1)}
    .pill.ok{color:var(--ok)}.pill.warn{color:var(--warn)}.pill.danger{color:var(--danger)}.pill.blue{color:var(--blue)}
    .stamp{display:inline-block;border:2px solid currentColor;border-radius:8px;padding:.25rem .55rem;font-size:.75rem;font-weight:1000;letter-spacing:.08em;text-transform:uppercase;transform:rotate(-1deg)}
    .Draft{color:var(--muted)}.Ready{color:var(--blue)}.InProgress{color:var(--warn)}.Hold{color:var(--danger)}.Complete,.Released{color:var(--ok)}.Archived,.Superseded{color:var(--muted)}
    label{display:grid;gap:6px;font-size:.84rem;font-weight:900;color:var(--muted)}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:.72rem;background:rgba(255,255,255,.55);color:var(--ink)}
    :root[data-theme="dark"] input,:root[data-theme="dark"] select,:root[data-theme="dark"] textarea{background:#0f172a}
    textarea{min-height:108px;resize:vertical}.short-textarea{min-height:68px}
    .formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.formgrid .wide{grid-column:1/-1}
    .filterbar{display:grid;grid-template-columns:1.3fr repeat(3,minmax(130px,.55fr));gap:10px;margin-bottom:12px}
    .step{border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;background:rgba(255,255,255,.08)}
    .step h4{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
    .step-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.step-grid .wide{grid-column:1/-1}
    .check-row{display:flex;align-items:center;gap:10px;color:var(--ink);font-weight:850}.check-row input{width:auto}.check-row label{display:flex}
    .progress{height:10px;background:rgba(125,125,125,.18);border:1px solid var(--line);border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--brand),var(--teal));width:0%}
    .qr svg{display:block;width:88px;height:88px}.label-card{display:grid;grid-template-columns:96px 1fr;gap:12px;align-items:center;border:1px dashed var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.08);break-inside:avoid}.label-code{font:700 .72rem ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);overflow-wrap:anywhere}
    .empty{border:1px dashed var(--line);border-radius:18px;padding:24px;text-align:center;color:var(--muted)}
    .callout{border:1px solid var(--line);border-radius:18px;padding:16px;background:linear-gradient(135deg,rgba(180,83,9,.12),rgba(15,118,110,.10))}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}tr:last-child td{border-bottom:0}
    .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.8rem;background:rgba(125,125,125,.12);border:1px solid var(--line);border-radius:6px;padding:.12rem .35rem}
    .print-only{display:none!important}
    @media(max-width:1060px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid{grid-template-columns:1fr}.span-3,.span-4,.span-5,.span-6,.span-7,.span-8,.span-9,.span-12{grid-column:1}.topbar{position:relative}.filterbar,.formgrid,.step-grid{grid-template-columns:1fr}.main{padding:16px}}
    @media print{body{background:white;color:#111}.side,.topbar,.no-print{display:none!important}.app{display:block}.main{padding:0}.card{box-shadow:none;border:0}.print-only{display:block!important}.grid{display:block}.card-h{border-bottom:2px solid #111}.label-card{page-break-inside:avoid;color:#111}.stamp{color:#111}.step{page-break-inside:avoid}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side no-print">
    <div class="brand">
      <div class="mark">WF</div>
      <div>
        <h1>Work Forge</h1>
        <small>Field Instrument 064 · <span id="ver"></span></small>
      </div>
    </div>
    <p class="muted">Controlled procedures, shop travelers, work packets, labels, and QR sheets for real-world work.</p>
    <div class="nav" id="nav"></div>
    <div class="side-foot">
      <button class="soft" onclick="newJob()">New Traveler</button>
      <button class="ghost" onclick="setPage('settings')">Project Save / Import</button>
      <span class="muted small" id="schemaNote"></span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar no-print">
      <div>
        <h2 id="pageTitle">Dashboard</h2>
        <p class="muted" id="saveState">Autosaved locally</p>
      </div>
      <div class="actions">
        <button class="soft" onclick="loadSamples()">Load Sample Data</button>
        <button class="ghost" onclick="exportProject()">Export JSON</button>
        <button class="ghost" onclick="document.getElementById('importFile').click()">Import JSON</button>
        <button class="ghost" onclick="toggleTheme()" id="themeBtn">Dark Mode</button>
      </div>
    </div>
    <input id="importFile" type="file" accept="application/json,.json" style="display:none" onchange="importProject(event)">
    <section id="view"></section>
  </main>
</div>

<script>
(() => {
  const VERSION = 'v2.0 MVP';
  const SCHEMA = 2;
  const KEY = 'workforge.project.v2';
  const LEGACY_KEY = 'workforge.project.v1';
  const THEME = 'workforge.theme';
  const PAGES = {
    dashboard: 'Dashboard',
    jobs: 'Jobs / Travelers',
    procedures: 'Procedures',
    labels: 'Label Forge',
    assets: 'Assets',
    items: 'Parts & Tools',
    reports: 'Reports',
    archive: 'Archive',
    settings: 'Settings'
  };

  let page = 'dashboard';
  let selected = { job:null, procedure:null, label:null, asset:null, item:null };
  let filters = {
    jobs: { q:'', status:'All', type:'All', priority:'All' },
    procedures: { q:'', status:'All', type:'All' },
    labels: { q:'', type:'All', size:'All' },
    assets: { q:'' },
    items: { q:'', kind:'All' },
    archive: { q:'' }
  };
  let project = loadProject();

  document.documentElement.dataset.theme = localStorage.getItem(THEME) || 'light';
  document.getElementById('ver').textContent = VERSION;
  exposeActions();
  render();

  function exposeActions(){
    Object.assign(window, {
      setPage, selectItem, patch, patchStepRun, setFilter,
      toggleTheme, loadSamples, exportProject, importProject, clearStorage,
      newJob, duplicateJob, archiveJob, restoreJob, deleteSelected, deleteArchived,
      newProcedure, duplicateProcedure, addProcedureStep, removeProcedureStep, moveProcedureStep,
      composeProcedureFromRough, createTravelerFromProcedure, refreshJobSteps,
      newLabel, makeLabelsForJob, makeLabelForAsset, makeLabelForItem, makeLabelForProcedure,
      printTraveler, printJobPacket, printLabels, printReport,
      newAsset, newItem, createProjectBackupName
    });
  }

  function sampleProject(){
    const today = new Date().toISOString().slice(0,10);
    const nextWeek = new Date(Date.now()+7*86400000).toISOString().slice(0,10);
    return {
      app:'Work Forge', schema:SCHEMA, version:VERSION, updated:new Date().toISOString(),
      projectInfo:{ name:'Green Shoe Garage Work Forge Demo', owner:'M.B. Parks', location:'Cumberland, Maryland', notes:'Sample MVP project for procedures, travelers, labels, and QR-linked shop packets.' },
      procedures:[
        { id:'PROC-BEARING-001', title:'Replace Small Fan Bearing', type:'Repair', status:'Released', revision:'A', owner:'Facilities', estimatedMinutes:90,
          overview:'Controlled procedure for replacing a bearing on small belt-driven exhaust fans.', prereq:'Fan isolated. Lockout applied. Correct bearing verified.', tools:'Bearing puller; snap-ring pliers; soft-jaw vise; calipers; grease pencil', materials:'6204-2RS bearing; shop towels; light machine oil', warnings:'Confirm zero energy before removing guards. Do not strike the shaft directly.', rough:'Verify asset and bearing\nRemove guard and belt\nPull bearing\nInstall replacement\nReassemble and test',
          steps:[
            {id:uid('STP'), title:'Verify asset and bearing', instruction:'Confirm asset tag, bearing type, and replacement part before disassembly.', tools:'Traveler, replacement bearing, calipers', materials:'Replacement bearing', verification:'Part number matches traveler and bearing turns freely.', warning:'Do not proceed with an unknown bearing.', evidence:'Photo optional', holdPoint:false},
            {id:uid('STP'), title:'Remove guard and belt', instruction:'Remove belt guard, mark belt direction, and remove belt tension.', tools:'Nut driver, marker', materials:'Bag for fasteners', verification:'Guard and belt removed without damage.', warning:'Keep fasteners with the guard.', evidence:'Note condition', holdPoint:false},
            {id:uid('STP'), title:'Pull bearing', instruction:'Use bearing puller to remove bearing from shaft. Support shaft during removal.', tools:'Bearing puller, soft-jaw vise', materials:'Shop towel', verification:'Bearing removed and shaft shows no scoring.', warning:'Do not hammer shaft.', evidence:'Photo required', holdPoint:true},
            {id:uid('STP'), title:'Install replacement', instruction:'Press replacement bearing squarely onto shaft using the inner race support.', tools:'Press, support sleeve', materials:'6204-2RS bearing', verification:'Bearing seats fully and spins smoothly.', warning:'Do not load the outer race during pressing.', evidence:'Measurement required', holdPoint:false},
            {id:uid('STP'), title:'Reassemble and test', instruction:'Reinstall belt and guard. Run fan briefly and listen for abnormal noise.', tools:'Nut driver, vibration pen', materials:'Replacement fasteners if needed', verification:'No abnormal vibration, heat, or noise after test run.', warning:'Keep hands clear of belt path.', evidence:'Pass/fail note', holdPoint:true}
          ]
        },
        { id:'PROC-CABLE-002', title:'Build Sensor Test Cable', type:'Assembly', status:'Released', revision:'B', owner:'Shop', estimatedMinutes:45,
          overview:'Assembly packet for a labeled four-conductor sensor test cable.', prereq:'Confirm pinout and cable length.', tools:'Wire strippers; ferrule crimper; heat gun; continuity tester', materials:'4-conductor cable; ferrules; heat shrink; cable labels', warnings:'Verify pinout before applying heat shrink.', rough:'Cut and strip cable\nTerminate ends\nContinuity test\nPrint cable label',
          steps:[
            {id:uid('STP'), title:'Cut and strip cable', instruction:'Cut cable to length and strip jacket without nicking conductors.', tools:'Cable cutter, stripper', materials:'4-conductor cable', verification:'Conductors intact and jacket removed cleanly.', warning:'Damaged conductors require restart.', evidence:'Length measurement', holdPoint:false},
            {id:uid('STP'), title:'Terminate ends', instruction:'Crimp ferrules and land conductors according to pinout.', tools:'Ferrule crimper', materials:'Ferrules, heat shrink', verification:'Pull-test each ferrule.', warning:'Do not mix shield and signal common.', evidence:'Photo optional', holdPoint:false},
            {id:uid('STP'), title:'Continuity test', instruction:'Test every conductor end-to-end and verify no shorts.', tools:'Continuity tester', materials:'Test record label', verification:'Continuity matrix passes.', warning:'Do not release failed cable.', evidence:'Test readings', holdPoint:true},
            {id:uid('STP'), title:'Print cable label', instruction:'Print wrap-around cable label and apply at both ends.', tools:'Label printer', materials:'Cable label sheet', verification:'Label text is readable after wrap.', warning:'Keep label clear of strain relief.', evidence:'Photo optional', holdPoint:false}
          ]
        }
      ],
      assets:[
        {id:'AST-EF2', tag:'EF-2', name:'Roof Exhaust Fan EF-2', type:'Mechanical', location:'Cumberland Hall / Roof', owner:'Facilities', status:'Active', notes:'Belt-driven exhaust fan serving classroom wing.'},
        {id:'AST-BENCH1', tag:'BENCH-1', name:'Electronics Bench 1', type:'Workstation', location:'Green Shoe Garage', owner:'Shop', status:'Active', notes:'General test bench with bench supply and signal tools.'},
        {id:'AST-LASER1', tag:'LASER-1', name:'Desktop Laser Cutter', type:'Fabrication', location:'Maker Lab', owner:'Shop', status:'Active', notes:'Use traveler packets for filter and lens maintenance.'}
      ],
      items:[
        {id:'ITM-PULLER', name:'Bearing Puller Kit', kind:'Tool', sku:'TOOL-018', location:'Tool Wall A', quantity:1, unit:'kit', howTo:'https://mbparks.com', notes:'Use for small motor and fan bearings.'},
        {id:'ITM-6204', name:'6204-2RS Bearing', kind:'Part', sku:'BRG-6204-2RS', location:'Parts Bin B-04', quantity:8, unit:'ea', howTo:'', notes:'Common sealed bearing.'},
        {id:'ITM-LABEL', name:'Cable Label Sheet', kind:'Consumable', sku:'LBL-CABLE-001', location:'Printer Shelf', quantity:24, unit:'sheets', howTo:'', notes:'Print with label forge.'},
        {id:'ITM-CRIMPER', name:'Ferrule Crimper', kind:'Tool', sku:'TOOL-027', location:'Electronics Drawer 2', quantity:1, unit:'ea', howTo:'', notes:'Use with sensor cable travelers.'}
      ],
      jobs:[
        {id:'WF-2026-0001', title:'Replace bearing on EF-2', type:'Repair', status:'In Progress', priority:'Normal', assetId:'AST-EF2', procedureId:'PROC-BEARING-001', assigned:'M.B. Parks', due:today, started:today, completed:'', notes:'Noise reported after lunch. Use traveler labels on cover sheet and replacement bearing package.', exceptions:'Belt guard screws are mismatched. Replace during reassembly.', parts:['ITM-6204'], tools:['ITM-PULLER'], stepRuns:[]},
        {id:'WF-2026-0002', title:'Build sensor test cable set', type:'Assembly', status:'Ready', priority:'Low', assetId:'AST-BENCH1', procedureId:'PROC-CABLE-002', assigned:'Shop', due:nextWeek, started:'', completed:'', notes:'Make two labeled cables for bench testing.', exceptions:'', parts:['ITM-LABEL'], tools:['ITM-CRIMPER'], stepRuns:[]}
      ],
      labels:[
        {id:'LBL-JOB-0001', type:'Job Traveler', title:'WF-2026-0001', subtitle:'Replace bearing on EF-2', payload:'workforge://job/WF-2026-0001', targetType:'Job', targetId:'WF-2026-0001', size:'Medium', copies:1, notes:'Traveler cover label'},
        {id:'LBL-AST-EF2', type:'Asset Sticker', title:'EF-2', subtitle:'Cumberland Hall / Roof', payload:'workforge://asset/AST-EF2', targetType:'Asset', targetId:'AST-EF2', size:'Small', copies:1, notes:'Asset QR sticker'},
        {id:'LBL-CABLE-DEMO', type:'Cable Label', title:'SENSOR TEST CABLE', subtitle:'Source: Bench 1 · Destination: DUT', payload:'workforge://label/LBL-CABLE-DEMO', targetType:'Custom', targetId:'', size:'Cable', copies:2, notes:'Wrap-around cable label'}
      ],
      archive:[]
    };
  }

  function loadProject(){
    try{
      const raw = localStorage.getItem(KEY) || localStorage.getItem(LEGACY_KEY);
      if(raw) return normalize(JSON.parse(raw));
    }catch(err){ console.warn('Project load failed', err); }
    return normalize(sampleProject());
  }

  function normalize(p){
    p = p || sampleProject();
    p.app = p.app || 'Work Forge';
    p.schema = SCHEMA;
    p.version = VERSION;
    p.updated = p.updated || new Date().toISOString();
    p.projectInfo = p.projectInfo || { name:'Untitled Work Forge Project', owner:'', location:'', notes:'' };
    ['procedures','assets','items','jobs','labels','archive'].forEach(k => p[k] = Array.isArray(p[k]) ? p[k] : []);
    p.procedures.forEach(proc => {
      proc.steps = Array.isArray(proc.steps) ? proc.steps : [];
      proc.steps.forEach(step => {
        step.id = step.id || uid('STP');
        step.tools = step.tools || '';
        step.materials = step.materials || '';
        step.warning = step.warning || '';
        step.verification = step.verification || '';
        step.evidence = step.evidence || '';
        step.holdPoint = !!step.holdPoint;
      });
      proc.rough = proc.rough || '';
      proc.owner = proc.owner || '';
      proc.estimatedMinutes = proc.estimatedMinutes || '';
    });
    p.jobs.forEach(job => {
      job.parts = Array.isArray(job.parts) ? job.parts : [];
      job.tools = Array.isArray(job.tools) ? job.tools : [];
      job.stepRuns = Array.isArray(job.stepRuns) ? job.stepRuns : [];
      job.exceptions = job.exceptions || '';
      job.started = job.started || '';
      job.completed = job.completed || '';
      ensureJobSteps(job);
    });
    p.labels.forEach(l => { l.copies = Number(l.copies || 1); l.size = l.size || 'Medium'; l.targetType = l.targetType || 'Custom'; });
    return p;
  }

  function save(){
    project.updated = new Date().toISOString();
    project.version = VERSION;
    project.schema = SCHEMA;
    localStorage.setItem(KEY, JSON.stringify(project));
    localStorage.removeItem(LEGACY_KEY);
    const s = document.getElementById('saveState');
    if(s) s.textContent = 'Autosaved ' + new Date().toLocaleTimeString();
  }

  function render(){
    document.getElementById('themeBtn').textContent = document.documentElement.dataset.theme === 'dark' ? 'Light Mode' : 'Dark Mode';
    document.getElementById('schemaNote').textContent = 'Local schema ' + SCHEMA + ' · ' + project.projectInfo.name;
    document.getElementById('nav').innerHTML = Object.entries(PAGES).map(([key, name]) => `<button class="${page===key?'active':''}" onclick="setPage('${key}')">${name}</button>`).join('');
    document.getElementById('pageTitle').textContent = PAGES[page];
    document.getElementById('view').innerHTML = views[page]();
  }

  function setPage(p){ page = p; render(); }
  function selectItem(type,id){ selected[type] = id; render(); }
  function toggleTheme(){ const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'; document.documentElement.dataset.theme = next; localStorage.setItem(THEME,next); render(); }
  function loadSamples(){ if(confirm('Replace the current local Work Forge project with MVP sample data? Export first if you need a backup.')){ project = normalize(sampleProject()); save(); render(); } }

  const views = {
    dashboard(){
      const active = project.jobs.filter(j => !['Complete','Archived'].includes(j.status)).length;
      const ready = project.jobs.filter(j => j.status === 'Ready').length;
      const hold = project.jobs.filter(j => j.status === 'Hold').length;
      const dueSoon = project.jobs.filter(j => j.due && !['Complete','Archived'].includes(j.status) && daysUntil(j.due) <= 7).length;
      const nextJobs = filteredJobs().slice(0,5);
      return `
        <div class="grid">
          ${metric('Active Jobs', active, 'Travelers not archived')}
          ${metric('Ready', ready, 'Packets ready to issue')}
          ${metric('On Hold', hold, 'Needs review')}
          ${metric('Due ≤ 7d', dueSoon, 'Schedule pressure')}
          <div class="card span-8">
            <div class="card-h"><h3>Work Queue</h3><button class="soft" onclick="newJob()">New Traveler</button></div>
            <div class="card-b list">${nextJobs.map(jobRow).join('') || empty('No active work travelers yet.')}</div>
          </div>
          <div class="card span-4">

  function metric(name,value,caption){ return `<div class="card span-3"><div class="card-b"><div class="metric">${value}</div><div><b>${esc(name)}</b></div><div class="muted small">${esc(caption)}</div></div></div>`; }
  function empty(text){ return `<div class="empty">${esc(text)}</div>`; }

  function filterBar(kind, fields){
    const f = filters[kind];
    const q = `<input placeholder="Search ${kind}..." value="${esc(f.q||'')}" oninput="setFilter('${kind}','q',this.value)">`;
    const selects = fields.map(name => {
      const values = filterValues(kind, name);
      return `<select onchange="setFilter('${kind}','${name}',this.value)">${values.map(v => `<option value="${esc(v)}" ${f[name]===v?'selected':''}>${esc(v)}</option>`).join('')}</select>`;
    }).join('');
    return `<div class="filterbar">${q}${selects}</div>`;
  }
  function setFilter(kind,name,value){ filters[kind][name] = value; render(); }
  function filterValues(kind,name){
    const source = kind === 'jobs' ? project.jobs : kind === 'procedures' ? project.procedures : kind === 'labels' ? project.labels : kind === 'items' ? project.items : [];
    const vals = [...new Set(source.map(x => x[name]).filter(Boolean))].sort();
    return ['All', ...vals];
  }
  function matchesQ(obj,q){ if(!q) return true; return JSON.stringify(obj).toLowerCase().includes(q.toLowerCase()); }
  function filteredJobs(){ const f=filters.jobs; return project.jobs.filter(j => matchesQ(j,f.q) && (f.status==='All'||j.status===f.status) && (f.type==='All'||j.type===f.type) && (f.priority==='All'||j.priority===f.priority)).sort(sortJobs); }
  function filteredProcedures(){ const f=filters.procedures; return project.procedures.filter(p => matchesQ(p,f.q) && (f.status==='All'||p.status===f.status) && (f.type==='All'||p.type===f.type)).sort((a,b)=>a.title.localeCompare(b.title)); }
  function filteredLabels(){ const f=filters.labels; return project.labels.filter(l => matchesQ(l,f.q) && (f.type==='All'||l.type===f.type) && (f.size==='All'||l.size===f.size)); }
  function filteredAssets(){ const f=filters.assets; return project.assets.filter(a => matchesQ(a,f.q)).sort((a,b)=>(a.tag||a.name).localeCompare(b.tag||b.name)); }
  function filteredItems(){ const f=filters.items; return project.items.filter(i => matchesQ(i,f.q) && (f.kind==='All'||i.kind===f.kind)).sort((a,b)=>a.name.localeCompare(b.name)); }
  function filteredArchive(){ const f=filters.archive; return project.archive.filter(a => matchesQ(a,f.q)).sort((a,b)=>(b.archivedAt||'').localeCompare(a.archivedAt||'')); }
  function sortJobs(a,b){
    const rank = {Hold:0,'In Progress':1,Ready:2,Draft:3,Complete:4};
    return (rank[a.status]??9) - (rank[b.status]??9) || String(a.due||'9999').localeCompare(String(b.due||'9999')) || a.title.localeCompare(b.title);
  }

  function collectionView(kind,title,rows,allRows,rowFn,editorFn,addFn){

  function multiSelectChecklist(label,path,ids,options,type){

  window.toggleArray = function(type,path,id,checked){ const obj=current(type); const arr=getPath(obj,path) || []; const next=checked ? [...new Set([...arr,id])] : arr.filter(x=>x!==id); setPath(obj,path,next); save(); };

  function patch(type,path,value,rerender=false){
    const obj = current(type);
    if(!obj) return;
    if(type === 'label' && path === 'copies') value = Math.max(1, Number(value||1));
    setPath(obj,path,value);
    if(type === 'job' && path === 'procedureId') ensureJobSteps(obj, true);
    save();
    if(rerender) render();
  }
  function patchStepRun(jobId,index,path,value,rerender=false){ const job=jobById(jobId); if(!job) return; job.stepRuns[index][path]=value; if(path==='done' && value) job.stepRuns[index].completedAt = new Date().toISOString(); save(); if(rerender) render(); }
  function current(type){ const maps={job:project.jobs, procedure:project.procedures, label:project.labels, asset:project.assets, item:project.items}; if(type==='project') return project; return maps[type]?.find(x=>x.id===selected[type]); }
  function getPath(obj,path){ return path.split('.').reduce((o,k)=>o?.[k], obj); }
  function setPath(obj,path,value){ const parts=path.split('.'); let ref=obj; for(let i=0;i<parts.length-1;i++){ ref[parts[i]] ??= {}; ref=ref[parts[i]]; } ref[parts.at(-1)] = value; }

  function newJob(){ const id=nextId('WF'); const proc=project.procedures.find(p=>p.status==='Released') || project.procedures[0]; const job={id,title:'Untitled Work Traveler',type:proc?.type||'Repair',status:'Draft',priority:'Normal',assetId:project.assets[0]?.id||'',procedureId:proc?.id||'',assigned:'',due:new Date().toISOString().slice(0,10),started:'',completed:'',notes:'',exceptions:'',parts:[],tools:[],stepRuns:[]}; ensureJobSteps(job,true); project.jobs.unshift(job); selected.job=id; page='jobs'; save(); render(); }
  function duplicateJob(id){ const old=jobById(id); if(!old) return; const copy=structuredClone(old); copy.id=nextId('WF'); copy.title='Copy of '+old.title; copy.status='Draft'; copy.started=''; copy.completed=''; copy.stepRuns=copy.stepRuns.map(r=>({...r,done:false,result:'Not Checked',notes:'',evidence:'',initials:'',completedAt:''})); project.jobs.unshift(copy); selected.job=copy.id; save(); render(); }
  function archiveJob(id){ const job=jobById(id); if(!job) return; if(!confirm('Complete and archive '+job.id+'?')) return; job.status='Complete'; job.completed=job.completed || new Date().toISOString().slice(0,10); project.archive.unshift({...structuredClone(job), archivedAt:new Date().toISOString()}); project.jobs = project.jobs.filter(j=>j.id!==id); selected.job=project.jobs[0]?.id||null; save(); render(); }

  function duplicateProcedure(id){ const old=procedureById(id); if(!old) return; const copy=structuredClone(old); copy.id=nextId('PROC'); copy.title='Copy of '+old.title; copy.status='Draft'; copy.revision='A'; copy.steps=copy.steps.map(s=>({...s,id:uid('STP')})); project.procedures.unshift(copy); selected.procedure=copy.id; save(); render(); }

  function deleteSelected(type){ const lists={job:'jobs',procedure:'procedures',label:'labels',asset:'assets',item:'items'}; const list=project[lists[type]]; const id=selected[type]; if(!id || !list) return; if(!confirm('Delete '+id+'?')) return; const i=list.findIndex(x=>x.id===id); if(i>=0) list.splice(i,1); selected[type]=list[0]?.id||null; save(); render(); }

  function ensureJobSteps(job, force=false){
    const proc=procedureById(job.procedureId);
    if(!proc) { job.stepRuns=[]; return; }
    const existing = new Map((job.stepRuns||[]).map(r => [r.stepId, r]));
    if(!force && job.stepRuns?.length === proc.steps.length && proc.steps.every(s => existing.has(s.id))) return;
    job.stepRuns = proc.steps.map(s => ({
      stepId:s.id, title:s.title, done:existing.get(s.id)?.done || false,
      result:existing.get(s.id)?.result || 'Not Checked', notes:existing.get(s.id)?.notes || '', evidence:existing.get(s.id)?.evidence || '', initials:existing.get(s.id)?.initials || '', completedAt:existing.get(s.id)?.completedAt || ''
    }));
  }

      <h2>Procedure</h2><p><b>${esc(p?.title||'No procedure')}</b> ${p?`· ${esc(p.id)} Rev ${esc(p.revision||'A')}`:''}</p><p>${esc(p?.overview||'')}</p>

  function printCss(){ return `body{font-family:Arial,sans-serif;color:#111;margin:24px}.cover{display:grid;grid-template-columns:1fr 250px;gap:20px;border:2px solid #111;padding:18px;margin-bottom:20px}.stamp{border:2px solid #111;border-radius:6px;padding:4px 9px;font-weight:900;text-transform:uppercase}.label-card{display:grid;grid-template-columns:92px 1fr;gap:10px;align-items:center;border:1px dashed #777;border-radius:8px;padding:10px;break-inside:avoid}.label-code{font-family:monospace;font-size:10px;overflow-wrap:anywhere;color:#555}.sheet{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.step{border:1px solid #999;padding:10px;margin:10px 0;break-inside:avoid}table{width:100%;border-collapse:collapse;margin-bottom:16px}th,td{border:1px solid #999;text-align:left;padding:8px;vertical-align:top}.qr svg{width:88px;height:88px}.muted{color:#555}@media print{.step,.label-card{break-inside:avoid}}`; }

  function uid(prefix){ return prefix + '-' + Math.random().toString(36).slice(2,8).toUpperCase(); }
  function nextId(prefix){
    const year = new Date().getFullYear();
    const pools = [...project.jobs,...project.archive,...project.procedures,...project.labels,...project.assets,...project.items].map(x=>x.id||'');
    const n = pools.filter(id=>id.startsWith(prefix+'-')).length + 1;

  function statusClass(s){ return String(s||'Draft').replace(/\s+/g,''); }
  function titleCase(s){ return String(s).replace(/\w\S*/g, t=>t[0].toUpperCase()+t.slice(1)); }
  function esc(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  function qrSvg(text,size=88){
    try{
      const m=makeQrMatrix(String(text||'workforge'));
      const n=m.length,b=2,c=size/(n+b*2);
      let rs='';
      for(let y=0;y<n;y++) for(let x=0;x<n;x++) if(m[y][x]) rs += `<rect x="${((x+b)*c).toFixed(2)}" y="${((y+b)*c).toFixed(2)}" width="${c.toFixed(2)}" height="${c.toFixed(2)}"/>`;
      return `<svg viewBox="0 0 ${size} ${size}" role="img" aria-label="QR code" xmlns="http://www.w3.org/2000/svg"><rect width="${size}" height="${size}" fill="#fff"/><g fill="#111">${rs}</g></svg>`;
    }catch(err){
      return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><rect width="${size}" height="${size}" fill="#fff"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="#111" font-size="10">QR</text></svg>`;
    }
  }
  function makeQrMatrix(text){
    const enc=new TextEncoder(); let bytes=Array.from(enc.encode(text));
    const specs=[{v:1,data:19,ecc:7,align:[]},{v:2,data:34,ecc:10,align:[6,18]},{v:3,data:55,ecc:15,align:[6,22]},{v:4,data:80,ecc:20,align:[6,26]}];
    let spec=specs.find(s=>4+8+bytes.length*8+4<=s.data*8)||specs[3];
    if(bytes.length>spec.data-3) bytes=bytes.slice(0,spec.data-3);
    const bits=[]; pushBits(bits,4,4); pushBits(bits,bytes.length,8); bytes.forEach(b=>pushBits(bits,b,8));
    const cap=spec.data*8; pushBits(bits,0,Math.min(4,cap-bits.length)); while(bits.length%8) bits.push(0);
    const data=[]; for(let i=0;i<bits.length;i+=8) data.push(bits.slice(i,i+8).reduce((a,b)=>(a<<1)|b,0));
    for(let pad=0;data.length<spec.data;pad++) data.push(pad%2?0x11:0xec);
    const code=data.concat(rsCompute(data,spec.ecc)); const n=21+(spec.v-1)*4;
    const m=Array.from({length:n},()=>Array(n).fill(false)), r=Array.from({length:n},()=>Array(n).fill(false));
    const set=(x,y,v,res=true)=>{ if(x>=0&&y>=0&&x<n&&y<n){ m[y][x]=!!v; if(res) r[y][x]=true; } };
    const finder=(x,y)=>{ for(let dy=-1;dy<=7;dy++) for(let dx=-1;dx<=7;dx++){ const xx=x+dx,yy=y+dy; if(xx<0||yy<0||xx>=n||yy>=n) continue; const on=dx>=0&&dx<=6&&dy>=0&&dy<=6&&(dx===0||dx===6||dy===0||dy===6||(dx>=2&&dx<=4&&dy>=2&&dy<=4)); set(xx,yy,on,true); } };
    finder(0,0); finder(n-7,0); finder(0,n-7);
    for(let i=8;i<n-8;i++){ set(i,6,i%2===0,true); set(6,i,i%2===0,true); }
    for(const cy of spec.align) for(const cx of spec.align){ if(r[cy]?.[cx]) continue; for(let dy=-2;dy<=2;dy++) for(let dx=-2;dx<=2;dx++) set(cx+dx,cy+dy,Math.max(Math.abs(dx),Math.abs(dy))!==1,true); }
    set(8,4*spec.v+9,true,true); reserveFormat(r,n);
    const dataBits=[]; code.forEach(b=>pushBits(dataBits,b,8)); let bit=0, up=true;
    for(let x=n-1;x>=1;x-=2){ if(x===6) x--; for(let yy=0;yy<n;yy++){ const y=up?n-1-yy:yy; for(let dx=0;dx<2;dx++){ const xx=x-dx; if(!r[y][xx]) set(xx,y,bit<dataBits.length?dataBits[bit++]:false,false); } } up=!up; }
    for(let y=0;y<n;y++) for(let x=0;x<n;x++) if(!r[y][x]&&((x+y)%2===0)) m[y][x]=!m[y][x];
    drawFormat(m,r,n,0); return m;
  }
  function pushBits(a,v,l){ for(let i=l-1;i>=0;i--) a.push((v>>>i)&1); }
  function reserveFormat(r,n){ for(let i=0;i<9;i++){ if(i!==6){ r[8][i]=true; r[i][8]=true; } } for(let i=0;i<8;i++) r[8][n-1-i]=true; for(let i=0;i<7;i++) r[n-1-i][8]=true; }
  function drawFormat(m,r,n,mask){ const data=(1<<3)|mask; let rem=data<<10; for(let i=14;i>=10;i--) if((rem>>>i)&1) rem^=0x537<<(i-10); const bits=((data<<10)|rem)^0x5412; const bit=i=>((bits>>>i)&1)===1; const set=(x,y,i)=>{ m[y][x]=bit(i); r[y][x]=true; }; for(let i=0;i<=5;i++) set(8,i,i); set(8,7,6); set(8,8,7); set(7,8,8); for(let i=9;i<15;i++) set(14-i,8,i); for(let i=0;i<8;i++) set(n-1-i,8,i); for(let i=8;i<15;i++) set(8,n-15+i,i); }
  function rsCompute(data,degree){ initGf(); let gen=[1]; for(let i=0;i<degree;i++) gen=polyMul(gen,[1,GF_EXP[i]]); const rem=Array(degree).fill(0); for(const b of data){ const factor=b^rem.shift(); rem.push(0); for(let i=0;i<degree;i++) rem[i]^=gfMul(gen[i+1],factor); } return rem; }
  let GF_EXP=null,GF_LOG=null;
  function initGf(){ if(GF_EXP) return; GF_EXP=Array(512).fill(0); GF_LOG=Array(256).fill(0); let x=1; for(let i=0;i<255;i++){ GF_EXP[i]=x; GF_LOG[x]=i; x<<=1; if(x&0x100) x^=0x11d; } for(let i=255;i<512;i++) GF_EXP[i]=GF_EXP[i-255]; }
  function gfMul(a,b){ return a&&b ? GF_EXP[GF_LOG[a]+GF_LOG[b]] : 0; }
  function polyMul(p,q){ const out=Array(p.length+q.length-1).fill(0); for(let i=0;i<p.length;i++) for(let j=0;j<q.length;j++) out[i+j]^=gfMul(p[i],q[j]); return out; }
})();
</script>
