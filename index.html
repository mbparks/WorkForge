<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Work Forge</title><style>
:root{--bg:#f6f1e6;--panel:#fffaf0;--ink:#1f2937;--muted:#667085;--line:#dfd3bd;--brand:#b45309;--teal:#0f766e;--bad:#b91c1c;--ok:#15803d;--warn:#b7791f;--shadow:0 16px 40px rgba(80,50,20,.12)}:root.dark{--bg:#0f172a;--panel:#1f2937;--ink:#f8fafc;--muted:#cbd5e1;--line:#334155;--brand:#f59e0b;--teal:#5eead4;--bad:#f87171;--ok:#86efac;--warn:#fbbf24;--shadow:0 16px 44px rgba(0,0,0,.34)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(245,158,11,.18),transparent 32rem),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{border:0;border-radius:999px;background:var(--ink);color:var(--panel);font-weight:850;padding:.65rem .9rem;cursor:pointer}button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}button.soft{background:rgba(180,83,9,.14);color:var(--brand);border:1px solid rgba(180,83,9,.22)}button.danger{background:var(--bad);color:white}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{padding:22px;border-right:1px solid var(--line);background:rgba(255,255,255,.22);position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center}.mark{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--teal));display:grid;place-items:center;color:white;font-weight:1000}h1,h2,h3,h4{margin:0}.muted{color:var(--muted)}.nav{display:grid;gap:8px;margin:18px 0}.nav button{text-align:left;border-radius:14px;background:transparent;color:var(--ink);border:1px solid transparent}.nav button.active{background:var(--panel);border-color:var(--line);box-shadow:var(--shadow)}.main{padding:22px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.actions,.tools{display:flex;gap:8px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:15px 17px;border-bottom:1px solid var(--line)}.body{padding:17px}.span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}.metric{font-size:2rem;font-weight:1000}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.08);cursor:pointer}.row.active{outline:2px solid var(--brand)}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:.22rem .52rem;font-size:.76rem;font-weight:900;color:var(--muted)}.stamp{display:inline-block;border:2px solid currentColor;border-radius:8px;padding:.22rem .52rem;font-size:.74rem;font-weight:1000;text-transform:uppercase;letter-spacing:.06em}.Ready{color:#2563eb}.InProgress{color:var(--warn)}.Hold{color:var(--bad)}.Complete,.Released{color:var(--ok)}.Draft,.Archived,.Superseded{color:var(--muted)}label{display:grid;gap:6px;color:var(--muted);font-size:.84rem;font-weight:900}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:.7rem;background:rgba(255,255,255,.55);color:var(--ink)}.dark input,.dark select,.dark textarea{background:#0f172a}textarea{min-height:88px;resize:vertical}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.wide{grid-column:1/-1}.filters{display:grid;grid-template-columns:1.4fr repeat(3,1fr);gap:8px;margin-bottom:12px}.step{border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:10px}.progress{height:10px;border:1px solid var(--line);border-radius:999px;background:rgba(125,125,125,.16);overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--brand),var(--teal))}.label{display:grid;grid-template-columns:92px 1fr;gap:12px;align-items:center;border:1px dashed var(--line);border-radius:14px;padding:10px;break-inside:avoid}.code{font:700 .72rem ui-monospace,monospace;color:var(--muted);overflow-wrap:anywhere}.empty{border:1px dashed var(--line);border-radius:16px;padding:22px;text-align:center;color:var(--muted)}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}th{color:var(--muted);font-size:.78rem;text-transform:uppercase}.hide{display:none}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid,.form,.filters{grid-template-columns:1fr}.span3,.span4,.span5,.span6,.span7,.span8,.span12{grid-column:1}}@media print{.side,.top,.noprint{display:none!important}.app{display:block}.main{padding:0}.card{box-shadow:none;border:0}.label,.step{break-inside:avoid}}
</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="mark">WF</div><div><h1>Work Forge</h1><div class="muted">Field Instrument 064 · <b id="ver"></b></div></div></div><p class="muted">Procedures, travelers, labels, QR sheets, and work packets.</p><div class="nav" id="nav"></div><button class="soft" onclick="newJob()">New Traveler</button><p class="muted" id="schema"></p></aside><main class="main"><div class="top noprint"><div><h2 id="title">Dashboard</h2><p class="muted" id="save">Autosaved locally</p></div><div class="actions"><button class="soft" onclick="loadSamples()">Load Sample Data</button><button class="ghost" onclick="exportProject()">Export JSON</button><button class="ghost" onclick="byId('importFile').click()">Import JSON</button><button class="ghost" onclick="toggleTheme()" id="themeBtn">Dark Mode</button></div></div><input id="importFile" class="hide" type="file" accept="application/json,.json" onchange="importProject(event)"><section id="view"></section></main></div><script>
const VERSION='v2.0.1 MVP',KEY='workforge.project.v2',PAGES={dashboard:'Dashboard',jobs:'Jobs / Travelers',procedures:'Procedures',labels:'Label Forge',assets:'Assets',items:'Parts & Tools',reports:'Reports',archive:'Archive',settings:'Settings'};let page='dashboard',sel={job:null,procedure:null,label:null,asset:null,item:null},filters={jobs:{q:'',status:'All',type:'All'},procedures:{q:'',status:'All',type:'All'},labels:{q:'',type:'All'},assets:{q:''},items:{q:'',kind:'All'},archive:{q:''}},project;
function byId(id){return document.getElementById(id)}function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function uid(p){return p+'-'+Math.random().toString(36).slice(2,7).toUpperCase()}function next(prefix){let all=[...project.jobs,...project.archive,...project.procedures,...project.labels,...project.assets,...project.items].map(x=>x.id||'');let n=all.filter(id=>id.startsWith(prefix+'-')).length+1;return prefix==='WF'?`WF-${new Date().getFullYear()}-${String(n).padStart(4,'0')}`:`${prefix}-${String(n).padStart(4,'0')}`}
function sample(){let d=new Date().toISOString().slice(0,10);return{app:'Work Forge',schema:2,version:VERSION,updated:new Date().toISOString(),projectInfo:{name:'Green Shoe Garage Work Forge Demo',owner:'M.B. Parks',location:'Cumberland, Maryland',notes:'Sample MVP project.'},procedures:[{id:'PROC-BEARING-001',title:'Replace Small Fan Bearing',type:'Repair',status:'Released',revision:'A',overview:'Replace a bearing on a small belt-driven exhaust fan.',prereq:'Fan isolated. Lockout applied. Correct bearing verified.',tools:'Bearing puller; snap-ring pliers; calipers',materials:'6204-2RS bearing; shop towels',warnings:'Confirm zero energy before removing guards.',rough:'Verify asset and bearing\nRemove guard and belt\nPull bearing\nInstall replacement\nReassemble and test',steps:[step('Verify asset and bearing','Confirm asset tag, bearing type, and replacement part.','Part number matches traveler.','Do not proceed with an unknown bearing.',false),step('Remove guard and belt','Remove belt guard, mark belt direction, and remove belt tension.','Guard and belt removed without damage.','Keep fasteners with the guard.',false),step('Pull bearing','Use bearing puller to remove bearing from shaft.','Shaft shows no scoring.','Do not hammer shaft.',true),step('Install replacement','Press replacement bearing squarely onto shaft.','Bearing seats fully and spins smoothly.','Do not load outer race.',false),step('Reassemble and test','Reinstall belt and guard. Run fan briefly.','No abnormal vibration, heat, or noise.','Keep hands clear of belt path.',true)]},{id:'PROC-CABLE-002',title:'Build Sensor Test Cable',type:'Assembly',status:'Released',revision:'B',overview:'Build and label a four-conductor sensor test cable.',prereq:'Confirm pinout and cable length.',tools:'Wire strippers; ferrule crimper; continuity tester',materials:'4-conductor cable; ferrules; heat shrink; cable labels',warnings:'Verify pinout before heat shrink.',rough:'Cut and strip cable\nTerminate ends\nContinuity test\nPrint cable label',steps:[step('Cut and strip cable','Cut cable to length and strip jacket without nicking conductors.','Conductors intact.','Damaged conductors require restart.',false),step('Terminate ends','Crimp ferrules and land conductors according to pinout.','Pull-test each ferrule.','Do not mix shield and common.',false),step('Continuity test','Test every conductor end-to-end and verify no shorts.','Continuity matrix passes.','Do not release failed cable.',true)]}],assets:[{id:'AST-EF2',tag:'EF-2',name:'Roof Exhaust Fan EF-2',type:'Mechanical',location:'Cumberland Hall / Roof',owner:'Facilities',status:'Active',notes:'Belt-driven exhaust fan.'},{id:'AST-BENCH1',tag:'BENCH-1',name:'Electronics Bench 1',type:'Workstation',location:'Green Shoe Garage',owner:'Shop',status:'Active',notes:'General test bench.'}],items:[{id:'ITM-PULLER',name:'Bearing Puller Kit',kind:'Tool',sku:'TOOL-018',location:'Tool Wall A',quantity:1,unit:'kit',howTo:'https://mbparks.com',notes:'Small bearings.'},{id:'ITM-6204',name:'6204-2RS Bearing',kind:'Part',sku:'BRG-6204',location:'Parts Bin B-04',quantity:8,unit:'ea',howTo:'',notes:'Common bearing.'},{id:'ITM-LABEL',name:'Cable Label Sheet',kind:'Consumable',sku:'LBL-CABLE',location:'Printer Shelf',quantity:24,unit:'sheets',howTo:'',notes:'For Label Forge.'}],jobs:[{id:'WF-2026-0001',title:'Replace bearing on EF-2',type:'Repair',status:'In Progress',priority:'Normal',assetId:'AST-EF2',procedureId:'PROC-BEARING-001',assigned:'M.B. Parks',due:d,started:d,completed:'',notes:'Noise reported after lunch.',exceptions:'Belt guard screws are mismatched.',parts:['ITM-6204'],tools:['ITM-PULLER'],stepRuns:[]},{id:'WF-2026-0002',title:'Build sensor test cable set',type:'Assembly',status:'Ready',priority:'Low',assetId:'AST-BENCH1',procedureId:'PROC-CABLE-002',assigned:'Shop',due:d,started:'',completed:'',notes:'Make two labeled cables.',exceptions:'',parts:['ITM-LABEL'],tools:[],stepRuns:[]}],labels:[{id:'LBL-JOB-0001',type:'Job Traveler',title:'WF-2026-0001',subtitle:'Replace bearing on EF-2',payload:'workforge://job/WF-2026-0001',targetType:'Job',targetId:'WF-2026-0001',size:'Medium',copies:1,notes:'Traveler label'}],archive:[]}}
function step(title,instruction,verification,warning,holdPoint){return{id:uid('STP'),title,instruction,tools:'',materials:'',warning,verification,evidence:'Record initials, notes, photo reference, or measurement.',holdPoint}}
function normalize(p){p=p||sample();['procedures','jobs','assets','items','labels','archive'].forEach(k=>p[k]=Array.isArray(p[k])?p[k]:[]);p.projectInfo=p.projectInfo||{name:'Untitled Work Forge Project'};p.procedures.forEach(pr=>{pr.steps=Array.isArray(pr.steps)?pr.steps:[];pr.steps.forEach(s=>{s.id=s.id||uid('STP');s.evidence=s.evidence||'';s.holdPoint=!!s.holdPoint})});p.jobs.forEach(j=>{j.parts=Array.isArray(j.parts)?j.parts:[];j.tools=Array.isArray(j.tools)?j.tools:[];j.stepRuns=Array.isArray(j.stepRuns)?j.stepRuns:[];ensureSteps(j,p)});p.labels.forEach(l=>l.copies=Number(l.copies||1));p.version=VERSION;p.schema=2;return p}
function load(){try{let raw=localStorage.getItem(KEY)||localStorage.getItem('workforge.project.v1');if(raw)return normalize(JSON.parse(raw))}catch(e){console.warn(e)}return normalize(sample())}function save(){project.updated=new Date().toISOString();project.version=VERSION;try{localStorage.setItem(KEY,JSON.stringify(project));localStorage.removeItem('workforge.project.v1')}catch(e){console.warn(e)}byId('save').textContent='Autosaved '+new Date().toLocaleTimeString()}function init(){try{if(localStorage.getItem('workforge.theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}project=load();byId('ver').textContent=VERSION;render()}
function render(){byId('themeBtn').textContent=document.documentElement.classList.contains('dark')?'Light Mode':'Dark Mode';byId('schema').textContent='Schema 2 · '+project.projectInfo.name;byId('title').textContent=PAGES[page];byId('nav').innerHTML=Object.entries(PAGES).map(([k,v])=>`<button class="${page===k?'active':''}" onclick="setPage('${k}')">${v}</button>`).join('');byId('view').innerHTML=views[page]()}function setPage(p){page=p;render()}function select(type,id){sel[type]=id;render()}function setFilter(k,n,v){filters[k][n]=v;render()}function toggleTheme(){document.documentElement.classList.toggle('dark');try{localStorage.setItem('workforge.theme',document.documentElement.classList.contains('dark')?'dark':'light')}catch(e){}render()}function loadSamples(){if(confirm('Replace current project with sample data?')){project=normalize(sample());save();render()}}
const views={dashboard(){let active=project.jobs.length,ready=project.jobs.filter(j=>j.status==='Ready').length,hold=project.jobs.filter(j=>j.status==='Hold').length;return`<div class="grid">${metric('Active Jobs',active)}${metric('Ready',ready)}${metric('On Hold',hold)}${metric('Labels',project.labels.length)}<div class="card span8"><div class="head"><h3>Work Queue</h3><button class="soft" onclick="newJob()">New Traveler</button></div><div class="body list">${project.jobs.map(jobRow).join('')||empty('No travelers yet.')}</div></div><div class="card span4"><div class="head"><h3>MVP Workflow</h3></div><div class="body"><p><b>Procedure → Traveler → Label → Archive</b></p><p class="muted">Compose reusable procedures, issue job packets, generate labels, and archive completed work.</p><div class="tools"><button class="ghost" onclick="setPage('procedures')">Procedures</button><button class="ghost" onclick="setPage('labels')">Labels</button></div></div></div></div>`},jobs(){let rows=filterRows(project.jobs,filters.jobs,['status','type']);let j=project.jobs.find(x=>x.id===sel.job)||rows[0]||project.jobs[0];if(j)sel.job=j.id;return`<div class="grid"><div class="card span5"><div class="head"><h3>Travelers</h3><button class="soft" onclick="newJob()">New</button></div><div class="body">${filterBar('jobs',['status','type'])}<div class="list">${rows.map(jobRow).join('')||empty('No matches.')}</div></div></div><div class="card span7"><div class="head"><h3>${j?esc(j.title):'No Traveler'}</h3>${j?stamp(j.status):''}</div><div class="body">${j?jobEditor(j):empty('Create a traveler.')}</div></div></div>`},procedures(){let rows=filterRows(project.procedures,filters.procedures,['status','type']);let p=project.procedures.find(x=>x.id===sel.procedure)||rows[0]||project.procedures[0];if(p)sel.procedure=p.id;return`<div class="grid"><div class="card span5"><div class="head"><h3>Procedure Library</h3><button class="soft" onclick="newProcedure()">New</button></div><div class="body">${filterBar('procedures',['status','type'])}<div class="list">${rows.map(procRow).join('')||empty('No matches.')}</div></div></div><div class="card span7"><div class="head"><h3>${p?esc(p.title):'No Procedure'}</h3>${p?`<button class="soft" onclick="travelerFromProcedure('${p.id}')">Create Traveler</button>`:''}</div><div class="body">${p?procEditor(p):empty('Create a procedure.')}</div></div></div>`},labels(){let rows=filterRows(project.labels,filters.labels,['type']);let l=project.labels.find(x=>x.id===sel.label)||rows[0]||project.labels[0];if(l)sel.label=l.id;return`<div class="grid"><div class="card span5"><div class="head"><h3>Print Queue</h3><div class="tools"><button class="soft" onclick="newLabel()">New</button><button class="ghost" onclick="printLabels()">Print</button></div></div><div class="body">${filterBar('labels',['type'])}<div class="list">${rows.map(labelRow).join('')||empty('No labels.')}</div></div></div><div class="card span7"><div class="head"><h3>Label Designer</h3></div><div class="body">${l?labelEditor(l):empty('Create or generate a label.')}</div></div><div class="card span12"><div class="head"><h3>Quick Generate</h3></div><div class="body tools">${project.jobs.map(j=>`<button class="ghost" onclick="labelsForJob('${j.id}')">${j.id} Packet</button>`).join('')}${project.assets.map(a=>`<button class="ghost" onclick="labelForAsset('${a.id}')">${a.tag}</button>`).join('')}</div></div></div>`},assets(){return collection('asset','Assets',filterRows(project.assets,filters.assets,[]),project.assets,assetRow,assetEditor,'newAsset')},items(){return collection('item','Parts & Tools',filterRows(project.items,filters.items,['kind']),project.items,itemRow,itemEditor,'newItem')},reports(){return`<div class="grid"><div class="card span12"><div class="head"><h3>Traveler Status Report</h3><button class="ghost" onclick="printReport()">Print</button></div><div class="body">${statusTable()}</div></div><div class="card span12"><div class="head"><h3>Asset Work History</h3></div><div class="body">${assetHistory()}</div></div></div>`},archive(){let rows=filterRows(project.archive,filters.archive,[]);return`<div class="card"><div class="head"><h3>Archive</h3><span class="pill">${project.archive.length} records</span></div><div class="body">${filterBar('archive',[])}<div class="list">${rows.map(a=>`<div class="row"><div><b>${esc(a.title)}</b><div class="muted">${a.id} · archived ${a.archivedAt?new Date(a.archivedAt).toLocaleString():'unknown'}</div></div><button class="ghost" onclick="restoreJob('${a.id}')">Restore</button></div>`).join('')||empty('Completed travelers will appear here.')}</div></div></div>`},settings(){return`<div class="grid"><div class="card span6"><div class="head"><h3>Project</h3><span class="pill">${VERSION}</span></div><div class="body form">${field('Project Name','projectInfo.name',project.projectInfo.name,'project')}${field('Owner','projectInfo.owner',project.projectInfo.owner,'project')}${field('Location','projectInfo.location',project.projectInfo.location,'project')}<label class="wide">Notes<textarea oninput="patch('project','projectInfo.notes',this.value)">${esc(project.projectInfo.notes||'')}</textarea></label></div></div><div class="card span6"><div class="head"><h3>Save / Import</h3></div><div class="body"><p>Local autosave is enabled. Export JSON for backup.</p><div class="tools"><button onclick="exportProject()">Export JSON</button><button class="ghost" onclick="byId('importFile').click()">Import JSON</button><button class="danger" onclick="clearStorage()">Clear Local Storage</button></div></div></div></div>`}};
function metric(t,v){return`<div class="card span3"><div class="body"><div class="metric">${v}</div><b>${t}</b></div></div>`}function empty(t){return`<div class="empty">${t}</div>`}function stamp(s){return`<span class="stamp ${String(s).replace(/\s/g,'')}">${esc(s)}</span>`}function rowSub(s){return`<div class="muted" style="font-size:.86rem;margin-top:3px">${s}</div>`}function pct(j){ensureSteps(j);return j.stepRuns.length?Math.round(j.stepRuns.filter(r=>r.done).length*100/j.stepRuns.length):0}function jobRow(j){let p=pct(j);return`<div class="row ${sel.job===j.id?'active':''}" onclick="select('job','${j.id}')"><div style="flex:1"><b>${esc(j.title)}</b>${rowSub(`${j.id} · ${j.type} · ${assetName(j.assetId)} · due ${j.due||'none'}`)}<div class="progress"><div class="bar" style="width:${p}%"></div></div></div><div>${stamp(j.status)}<br><span class="pill">${p}%</span></div></div>`}function procRow(p){return`<div class="row ${sel.procedure===p.id?'active':''}" onclick="select('procedure','${p.id}')"><div><b>${esc(p.title)}</b>${rowSub(`${p.id} · ${p.type} · Rev ${p.revision||'A'} · ${p.steps.length} steps`)}</div>${stamp(p.status)}</div>`}function labelRow(l){return`<div class="row ${sel.label===l.id?'active':''}" onclick="select('label','${l.id}')"><div><b>${esc(l.title)}</b>${rowSub(`${l.type} · ${l.size||'Medium'} · ${l.copies||1} copies`)}</div>${qr(l.payload,54)}</div>`}function assetRow(a){return`<div class="row ${sel.asset===a.id?'active':''}" onclick="select('asset','${a.id}')"><div><b>${esc(a.tag)} · ${esc(a.name)}</b>${rowSub(`${a.type||'Asset'} · ${a.location||'No location'}`)}</div><span class="pill">${esc(a.status||'Active')}</span></div>`}function itemRow(i){return`<div class="row ${sel.item===i.id?'active':''}" onclick="select('item','${i.id}')"><div><b>${esc(i.name)}</b>${rowSub(`${i.kind} · ${i.sku||'No SKU'} · ${i.location||'No location'}`)}</div><span class="pill">${i.quantity||0} ${i.unit||'ea'}</span></div>`}
function filterBar(k,fields){let f=filters[k];return`<div class="filters"><input placeholder="Search..." value="${esc(f.q||'')}" oninput="setFilter('${k}','q',this.value)">${fields.map(n=>`<select onchange="setFilter('${k}','${n}',this.value)">${['All',...[...new Set((k==='jobs'?project.jobs:k==='procedures'?project.procedures:k==='labels'?project.labels:project.items).map(x=>x[n]).filter(Boolean))].sort()].map(v=>`<option ${f[n]===v?'selected':''}>${esc(v)}</option>`).join('')}</select>`).join('')}</div>`}function filterRows(arr,f,fields){return arr.filter(x=>(!f.q||JSON.stringify(x).toLowerCase().includes(f.q.toLowerCase()))&&fields.every(n=>f[n]==='All'||x[n]===f[n]))}
function field(label,path,val,type,input='text'){return`<label>${label}<input type="${input}" value="${esc(val??'')}" oninput="patch('${type}','${path}',this.value)"></label>`}function selectField(label,path,val,opts,type){return`<label>${label}<select onchange="patch('${type}','${path}',this.value,true)">${opts.map(o=>`<option value="${esc(Array.isArray(o)?o[0]:o)}" ${String(Array.isArray(o)?o[0]:o)===String(val)?'selected':''}>${esc(Array.isArray(o)?o[1]:o)}</option>`).join('')}</select></label>`}function patch(type,path,val,rerender=false){let obj=type==='project'?project:project[type+'s'].find(x=>x.id===sel[type]);if(!obj)return;let parts=path.split('.'),r=obj;for(let i=0;i<parts.length-1;i++){r[parts[i]]??={};r=r[parts[i]]}r[parts.at(-1)]=val;if(type==='job'&&path==='procedureId')ensureSteps(obj,project,true);save();if(rerender)render()}function patchRun(jobId,i,path,val){let j=job(jobId);j.stepRuns[i][path]=val;save()}
function jobEditor(j){ensureSteps(j);let proc=procedure(j.procedureId);return`<div class="tools" style="margin-bottom:12px"><button class="ghost" onclick="labelsForJob('${j.id}')">Generate Labels</button><button onclick="printTraveler('${j.id}')">Print Traveler</button><button class="soft" onclick="archiveJob('${j.id}')">Complete + Archive</button><button class="danger" onclick="deleteCurrent('job')">Delete</button></div><div class="form">${field('Title','title',j.title,'job')}${field('Job ID','id',j.id,'job')}${selectField('Type','type',j.type,['Repair','Fabrication','Assembly','Inspection','Calibration'],'job')}${selectField('Status','status',j.status,['Draft','Ready','In Progress','Hold','Complete'],'job')}${field('Assigned To','assigned',j.assigned,'job')}${field('Due','due',j.due,'job','date')}${selectField('Asset','assetId',j.assetId,project.assets.map(a=>[a.id,`${a.tag} — ${a.name}`]),'job')}${selectField('Procedure','procedureId',j.procedureId,project.procedures.map(p=>[p.id,p.title]),'job')}<label class="wide">Notes<textarea oninput="patch('job','notes',this.value)">${esc(j.notes||'')}</textarea></label><label class="wide">Exceptions<textarea oninput="patch('job','exceptions',this.value)">${esc(j.exceptions||'')}</textarea></label></div><h3 style="margin:16px 0 10px">Traveler Steps</h3>${proc?j.stepRuns.map((r,i)=>runEditor(j,r,i)).join(''):empty('Select a procedure.')}`}
function runEditor(j,r,i){let s=procedure(j.procedureId)?.steps.find(x=>x.id===r.stepId)||{};return`<div class="step"><h4>${i+1}. ${esc(r.title||s.title)} ${s.holdPoint?'<span class="pill">Hold Point</span>':''}</h4><p>${esc(s.instruction||'')}</p><p><b>Verify:</b> ${esc(s.verification||'')}</p>${s.warning?`<p><b>Warning:</b> ${esc(s.warning)}</p>`:''}<div class="form"><label><span><input style="width:auto" type="checkbox" ${r.done?'checked':''} onchange="patchRun('${j.id}',${i},'done',this.checked)"> Done</span></label><label>Result<select onchange="patchRun('${j.id}',${i},'result',this.value)">${['Not Checked','Pass','Fail','N/A'].map(v=>`<option ${r.result===v?'selected':''}>${v}</option>`).join('')}</select></label><label>Initials<input value="${esc(r.initials||'')}" oninput="patchRun('${j.id}',${i},'initials',this.value)"></label><label>Evidence<input value="${esc(r.evidence||'')}" oninput="patchRun('${j.id}',${i},'evidence',this.value)"></label><label class="wide">Actual Notes<textarea oninput="patchRun('${j.id}',${i},'notes',this.value)">${esc(r.notes||'')}</textarea></label></div></div>`}
function procEditor(p){return`<div class="tools" style="margin-bottom:12px"><button class="soft" onclick="compose('${p.id}')">Compose From Rough Steps</button><button class="ghost" onclick="addStep('${p.id}')">Add Step</button><button class="ghost" onclick="labelForProcedure('${p.id}')">Make QR</button><button class="danger" onclick="deleteCurrent('procedure')">Delete</button></div><div class="form">${field('Title','title',p.title,'procedure')}${field('Procedure ID','id',p.id,'procedure')}${selectField('Type','type',p.type,['Repair','Fabrication','Assembly','Inspection','Calibration'],'procedure')}${selectField('Status','status',p.status,['Draft','Released','Superseded'],'procedure')}${field('Revision','revision',p.revision,'procedure')}<label class="wide">Overview<textarea oninput="patch('procedure','overview',this.value)">${esc(p.overview||'')}</textarea></label><label>Prerequisites<textarea oninput="patch('procedure','prereq',this.value)">${esc(p.prereq||'')}</textarea></label><label>Tools<textarea oninput="patch('procedure','tools',this.value)">${esc(p.tools||'')}</textarea></label><label>Materials<textarea oninput="patch('procedure','materials',this.value)">${esc(p.materials||'')}</textarea></label><label>Warnings<textarea oninput="patch('procedure','warnings',this.value)">${esc(p.warnings||'')}</textarea></label><label class="wide">Rough Steps<textarea oninput="patch('procedure','rough',this.value)">${esc(p.rough||'')}</textarea></label></div><h3 style="margin:16px 0 10px">Controlled Steps</h3>${p.steps.map((s,i)=>`<div class="step"><div class="form">${field('Title',`steps.${i}.title`,s.title,'procedure')}<label><span><input style="width:auto" type="checkbox" ${s.holdPoint?'checked':''} onchange="patch('procedure','steps.${i}.holdPoint',this.checked,true)"> Hold Point</span></label><label class="wide">Instruction<textarea oninput="patch('procedure','steps.${i}.instruction',this.value)">${esc(s.instruction||'')}</textarea></label><label>Warning<textarea oninput="patch('procedure','steps.${i}.warning',this.value)">${esc(s.warning||'')}</textarea></label><label>Verification<textarea oninput="patch('procedure','steps.${i}.verification',this.value)">${esc(s.verification||'')}</textarea></label><label class="wide">Evidence<textarea oninput="patch('procedure','steps.${i}.evidence',this.value)">${esc(s.evidence||'')}</textarea></label></div></div>`).join('')}`}
function labelEditor(l){return`<div class="form">${field('Title','title',l.title,'label')}${field('Label ID','id',l.id,'label')}${selectField('Type','type',l.type,['Job Traveler','Procedure QR','Asset Sticker','Tool Tag','Cable Label','Part Bin Label','Custom'],'label')}${field('Copies','copies',l.copies,'label','number')}${field('Subtitle','subtitle',l.subtitle,'label')}<label class="wide">Payload<input value="${esc(l.payload||'')}" oninput="patch('label','payload',this.value)"></label><label class="wide">Notes<textarea oninput="patch('label','notes',this.value)">${esc(l.notes||'')}</textarea></label></div><h3 style="margin:16px 0 10px">Preview</h3>${labelCard(l)}<div class="tools" style="margin-top:12px"><button onclick="printLabels()">Print Sheet</button><button class="danger" onclick="deleteCurrent('label')">Delete</button></div>`}
function collection(type,title,rows,all,rowFn,editor,addFn){let id=sel[type]||rows[0]?.id||all[0]?.id;sel[type]=id;let obj=all.find(x=>x.id===id);return`<div class="grid"><div class="card span5"><div class="head"><h3>${title}</h3><button class="soft" onclick="${addFn}()">New</button></div><div class="body">${filterBar(type+'s',type==='item'?['kind']:[])}<div class="list">${rows.map(rowFn).join('')||empty('No records.')}</div></div></div><div class="card span7"><div class="head"><h3>${obj?esc(obj.name||obj.tag):'No Selection'}</h3>${obj?`<button class="ghost" onclick="${type==='asset'?'labelForAsset':'labelForItem'}('${obj.id}')">Make Label</button>`:''}</div><div class="body">${obj?editor(obj):empty('Create a record.')}</div></div></div>`}function assetEditor(a){return`<div class="form">${field('Tag','tag',a.tag,'asset')}${field('Name','name',a.name,'asset')}${field('Type','type',a.type,'asset')}${field('Location','location',a.location,'asset')}${field('Owner','owner',a.owner,'asset')}${field('Status','status',a.status,'asset')}<label class="wide">Notes<textarea oninput="patch('asset','notes',this.value)">${esc(a.notes||'')}</textarea></label></div>${labelCard(assetLabel(a))}<button class="danger" onclick="deleteCurrent('asset')">Delete</button>`}function itemEditor(i){return`<div class="form">${field('Name','name',i.name,'item')}${field('Item ID','id',i.id,'item')}${selectField('Kind','kind',i.kind,['Tool','Part','Consumable','Fixture','Test Equipment'],'item')}${field('SKU','sku',i.sku,'item')}${field('Location','location',i.location,'item')}${field('Quantity','quantity',i.quantity,'item','number')}${field('Unit','unit',i.unit,'item')}${field('How To URL','howTo',i.howTo,'item')}<label class="wide">Notes<textarea oninput="patch('item','notes',this.value)">${esc(i.notes||'')}</textarea></label></div>${labelCard(itemLabel(i))}<button class="danger" onclick="deleteCurrent('item')">Delete Item</button>`}
function newJob(){let p=project.procedures[0],id=next('WF'),j={id,title:'Untitled Work Traveler',type:p?.type||'Repair',status:'Draft',priority:'Normal',assetId:project.assets[0]?.id||'',procedureId:p?.id||'',assigned:'',due:new Date().toISOString().slice(0,10),started:'',completed:'',notes:'',exceptions:'',parts:[],tools:[],stepRuns:[]};ensureSteps(j,project,true);project.jobs.unshift(j);sel.job=id;page='jobs';save();render()}function travelerFromProcedure(id){let p=procedure(id);newJob();let j=project.jobs[0];j.title=p.title;j.type=p.type;j.procedureId=p.id;ensureSteps(j,project,true);save();render()}function newProcedure(){let id=next('PROC');project.procedures.unshift({id,title:'New Procedure',type:'Assembly',status:'Draft',revision:'A',overview:'',prereq:'',tools:'',materials:'',warnings:'',rough:'',steps:[step('New step','Describe the work.','Describe verification.','',false)]});sel.procedure=id;page='procedures';save();render()}function newLabel(){let id=next('LBL');project.labels.unshift({id,type:'Custom',title:'New Label',subtitle:'',payload:'workforge://label/'+id,targetType:'Custom',targetId:'',size:'Medium',copies:1,notes:''});sel.label=id;page='labels';save();render()}function newAsset(){let id=next('AST');project.assets.unshift({id,tag:id,name:'New Asset',type:'Other',location:'',owner:'',status:'Active',notes:''});sel.asset=id;page='assets';save();render()}function newItem(){let id=next('ITM');project.items.unshift({id,name:'New Item',kind:'Tool',sku:'',location:'',quantity:1,unit:'ea',howTo:'',notes:''});sel.item=id;page='items';save();render()}function addStep(id){procedure(id).steps.push(step('New step','Describe the work.','Describe verification.','',false));save();render()}function compose(id){let p=procedure(id),lines=(p.rough||'').split(/\n+/).map(x=>x.trim()).filter(Boolean);if(!lines.length)return alert('Paste rough steps first.');p.steps=lines.map(x=>step(x,x,'Confirm this step is complete and acceptable.',p.warnings||'',/inspect|verify|test|hold/i.test(x)));save();render()}function deleteCurrent(type){let map={job:'jobs',procedure:'procedures',label:'labels',asset:'assets',item:'items'},id=sel[type];if(!id||!confirm('Delete '+id+'?'))return;project[map[type]]=project[map[type]].filter(x=>x.id!==id);sel[type]=project[map[type]][0]?.id||null;save();render()}function archiveJob(id){let j=job(id);if(!j||!confirm('Complete and archive '+id+'?'))return;j.status='Complete';j.completed=new Date().toISOString().slice(0,10);project.archive.unshift({...j,archivedAt:new Date().toISOString()});project.jobs=project.jobs.filter(x=>x.id!==id);save();render()}function restoreJob(id){let i=project.archive.findIndex(x=>x.id===id);if(i<0)return;let j=project.archive.splice(i,1)[0];delete j.archivedAt;j.status='Ready';project.jobs.unshift(j);sel.job=j.id;page='jobs';save();render()}
function labelsForJob(id){let j=job(id),labs=[jobLabel(j)],a=asset(j.assetId);if(a)labs.push(assetLabel(a));j.parts.map(item).filter(Boolean).forEach(i=>labs.push(itemLabel(i)));j.tools.map(item).filter(Boolean).forEach(i=>labs.push(itemLabel(i)));project.labels.unshift(...labs);sel.label=labs[0].id;page='labels';save();render()}function labelForAsset(id){let l=assetLabel(asset(id));project.labels.unshift(l);sel.label=l.id;page='labels';save();render()}function labelForItem(id){let l=itemLabel(item(id));project.labels.unshift(l);sel.label=l.id;page='labels';save();render()}function labelForProcedure(id){let p=procedure(id),l={id:next('LBL'),type:'Procedure QR',title:p.id,subtitle:p.title,payload:'workforge://procedure/'+p.id,targetType:'Procedure',targetId:p.id,size:'Medium',copies:1,notes:''};project.labels.unshift(l);sel.label=l.id;page='labels';save();render()}function jobLabel(j){return{id:next('LBL'),type:'Job Traveler',title:j.id,subtitle:j.title,payload:'workforge://job/'+j.id,targetType:'Job',targetId:j.id,size:'Medium',copies:1,notes:''}}function assetLabel(a){return{id:next('LBL'),type:'Asset Sticker',title:a?.tag||'',subtitle:a?.location||'',payload:'workforge://asset/'+(a?.id||''),targetType:'Asset',targetId:a?.id||'',size:'Small',copies:1,notes:''}}function itemLabel(i){return{id:next('LBL'),type:i?.kind==='Part'?'Part Bin Label':'Tool Tag',title:i?.name||'',subtitle:[i?.sku,i?.location].filter(Boolean).join(' · '),payload:i?.howTo||('workforge://item/'+(i?.id||'')),targetType:'Item',targetId:i?.id||'',size:'Small',copies:1,notes:''}}
function ensureSteps(j,root=project,force=false){let p=(root.procedures||[]).find(x=>x.id===j.procedureId);if(!p){j.stepRuns=[];return}let old=new Map((j.stepRuns||[]).map(r=>[r.stepId,r]));if(!force&&j.stepRuns?.length===p.steps.length&&p.steps.every(s=>old.has(s.id)))return;j.stepRuns=p.steps.map(s=>({stepId:s.id,title:s.title,done:old.get(s.id)?.done||false,result:old.get(s.id)?.result||'Not Checked',notes:old.get(s.id)?.notes||'',evidence:old.get(s.id)?.evidence||'',initials:old.get(s.id)?.initials||''}))}function job(id){return project.jobs.find(x=>x.id===id)||project.archive.find(x=>x.id===id)}function procedure(id){return project.procedures.find(x=>x.id===id)}function asset(id){return project.assets.find(x=>x.id===id)}function item(id){return project.items.find(x=>x.id===id)}function assetName(id){let a=asset(id);return a?esc(a.tag||a.name):'No asset'}
function labelCard(l){return`<div class="label"><div>${qr(l.payload,88)}</div><div><h4>${esc(l.title||'Untitled')}</h4><p class="muted">${esc(l.subtitle||l.type||'')}</p><div class="code">${esc(l.payload||l.id)}</div></div></div>`}function qr(text,size){let h=0,s=String(text||'WF');for(let c of s)h=(h*31+c.charCodeAt(0))>>>0;let n=21,b=2,cell=size/(n+b*2),r='';for(let y=0;y<n;y++)for(let x=0;x<n;x++){let finder=(x<7&&y<7)||(x>13&&y<7)||(x<7&&y>13),on=finder?(x%6===0||y%6===0||(x>1&&x<5&&y>1&&y<5)||(x>15&&x<19&&y>1&&y<5)||(x>1&&x<5&&y>15&&y<19)):(((x*17+y*31+h)>>>2)&1);if(on)r+=`<rect x="${(x+b)*cell}" y="${(y+b)*cell}" width="${cell}" height="${cell}"/>`}return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><rect width="${size}" height="${size}" fill="#fff"/><g fill="#111">${r}</g></svg>`}
function printTraveler(id){let j=job(id),p=procedure(j.procedureId);printWin('Traveler '+id,`<h1>${esc(j.title)}</h1><p>${j.id} · ${j.type} · ${assetName(j.assetId)}</p>${labelCard(jobLabel(j))}<h2>Procedure</h2><p>${esc(p?.title||'')}</p><table><tr><th>Prerequisites</th><td>${esc(p?.prereq||'')}</td></tr><tr><th>Tools</th><td>${esc(p?.tools||'')}</td></tr><tr><th>Materials</th><td>${esc(p?.materials||'')}</td></tr><tr><th>Warnings</th><td>${esc(p?.warnings||'')}</td></tr></table>${j.stepRuns.map((r,i)=>`<div class="step"><h3>${i+1}. ${esc(r.title)} ${r.done?'☑':'☐'}</h3><p>${esc(p?.steps.find(s=>s.id===r.stepId)?.instruction||'')}</p><p><b>Result:</b> ${esc(r.result)}</p><p><b>Notes:</b> ${esc(r.notes)}</p></div>`).join('')}`)}function printLabels(){printWin('Labels',`<h1>Work Forge Label Sheet</h1><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">${project.labels.flatMap(l=>Array.from({length:Number(l.copies||1)},()=>labelCard(l))).join('')}</div>`)}function printReport(){printWin('Report',`<h1>Work Forge Status Report</h1>${statusTable()}${assetHistory()}`)}function printWin(title,html){let w=open('','_blank');if(!w)return alert('Allow pop-ups to print.');w.document.write(`<!doctype html><html><head><title>${esc(title)}</title><style>body{font-family:Arial,sans-serif;color:#111;margin:24px}.label{display:grid;grid-template-columns:92px 1fr;gap:10px;border:1px dashed #777;padding:10px;break-inside:avoid}.code{font-family:monospace;font-size:10px}.step{border:1px solid #999;padding:10px;margin:10px 0;break-inside:avoid}table{width:100%;border-collapse:collapse}th,td{border:1px solid #999;padding:8px;text-align:left}.muted{color:#555}</style></head><body>${html}<script>print()<\/script></body></html>`);w.document.close()}function statusTable(){return`<table><thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Asset</th><th>Due</th><th>Complete</th></tr></thead><tbody>${[...project.jobs,...project.archive].map(j=>`<tr><td>${j.id}</td><td>${esc(j.title)}</td><td>${j.status}</td><td>${assetName(j.assetId)}</td><td>${j.due||''}</td><td>${pct(j)}%</td></tr>`).join('')}</tbody></table>`}function assetHistory(){return`<table><thead><tr><th>Asset</th><th>Name</th><th>Jobs</th></tr></thead><tbody>${project.assets.map(a=>`<tr><td>${esc(a.tag)}</td><td>${esc(a.name)}</td><td>${[...project.jobs,...project.archive].filter(j=>j.assetId===a.id).map(j=>j.id).join(', ')||'—'}</td></tr>`).join('')}</tbody></table>`}
function exportProject(){let a=document.createElement('a'),safe=(project.projectInfo.name||'workforge').toLowerCase().replace(/[^a-z0-9]+/g,'-');a.href=URL.createObjectURL(new Blob([JSON.stringify(project,null,2)],{type:'application/json'}));a.download=safe+'-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}function importProject(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{project=normalize(JSON.parse(r.result));save();render()}catch(e){alert('Could not import JSON: '+e.message)}};r.readAsText(f);ev.target.value=''}function clearStorage(){if(confirm('Clear local storage?')){try{localStorage.removeItem(KEY)}catch(e){}project=normalize(sample());save();render()}}
init();
</script></body></html>
