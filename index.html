<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Work Forge</title><style>body{margin:0;font:15px system-ui;background:#f6f1e6;color:#1f2937}.dark{background:#0f172a;color:#f8fafc}button,input,textarea,select{font:inherit}button{border:0;border-radius:99px;padding:.55rem .8rem;background:#1f2937;color:#fff;font-weight:800;cursor:pointer}.ghost{background:transparent;color:inherit;border:1px solid #aaa}.soft{background:#f59e0b33;color:#92400e}.bad{background:#b91c1c}.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}aside{padding:18px;border-right:1px solid #cdbb9f}main{padding:18px}.nav{display:grid;gap:7px}.nav button{text-align:left;background:transparent;color:inherit}.nav button.on{outline:2px solid #b45309;background:#fff6}.top,.row,.tools{display:flex;gap:8px;align-items:center;justify-content:space-between}.tools{justify-content:flex-start;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card,.row,.step{background:#fff8;border:1px solid #cdbb9f;border-radius:14px;padding:12px;margin:0 0 10px}.metric{font-size:2rem;font-weight:1000}.muted{opacity:.7}.pill{border:1px solid #999;border-radius:99px;padding:.12rem .45rem;font-weight:800;font-size:.78rem}.need{color:#b91c1c}.ok{color:#15803d}input,textarea,select{width:100%;box-sizing:border-box;margin:.2rem 0 .55rem;padding:.5rem;border:1px solid #aaa;border-radius:10px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #ccc;padding:7px;text-align:left}.hide{display:none}@media(max-width:800px){.app,.grid{display:block}}</style><div class=app><aside><h2>Work Forge</h2><b id=ver></b><p class=muted>FI 064 data integrity and recovered shop workflow.</p><div id=nav class=nav></div><button class=soft onclick=newJob()>New Traveler</button></aside><main><div class=top><div><h1 id=title></h1><p id=save class=muted>Autosaved locally</p></div><div class=tools><button class=soft onclick=loadSample()>Load Sample Data</button><button class=ghost onclick=exportJSON()>Export JSON</button><button class=ghost onclick=imp.click()>Import JSON</button><button class=ghost onclick=document.body.classList.toggle('dark')>Dark Mode</button></div></div><input id=imp class=hide type=file accept=.json onchange=importJSON(event)><div id=view></div></main></div><script>
const VER='v2.9.1 Navigation Hotfix',KEY='workforge.project.v2',SCHEMA=29;
const P=['Dashboard','Integrity','Operations Board','Shop Control','Quality Review','Corrective Actions','Signoffs','Daily Plan','Jobs','Procedures','Labels','Assets','Parts & Tools','Reports','Archive','Settings'];
let page='Dashboard',sel=0,db;let D=()=>new Date().toISOString().slice(0,10),$=x=>document.getElementById(x),E=x=>String(x??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
function sample(){let d=D();return{schema:SCHEMA,project:{name:'Green Shoe Garage Demo'},counters:{job:2,proc:2,label:2,asset:2,item:3,action:2,signoff:2},jobs:[{id:'WF-2026-0001',title:'Replace bearing on EF-2',status:'In Progress',due:d,assigned:'M.B. Parks',asset:'EF-2',proc:'PROC-001',exceptions:'Belt guard screws mismatched.',closeout:'',steps:[{t:'Verify asset',done:false,result:'Not Checked',initials:''},{t:'Pull bearing',done:false,result:'Not Checked',initials:''},{t:'Test run',done:false,result:'Not Checked',initials:''}]}],procedures:[{id:'PROC-001',title:'Replace Small Fan Bearing',status:'Released',steps:['Verify asset','Pull bearing','Test run']}],assets:[{id:'AST-EF2',tag:'EF-2',name:'Roof Exhaust Fan EF-2',loc:'Cumberland Hall / Roof'}],items:[{id:'ITM-6204',name:'6204-2RS Bearing',kind:'Part',qty:8},{id:'ITM-PULLER',name:'Bearing Puller Kit',kind:'Tool',qty:1}],labels:[{id:'LBL-001',title:'WF-2026-0001',type:'Job',payload:'workforge://job/WF-2026-0001'}],actions:[{id:'CA-001',source:'WF-2026-0001',title:'Replace mismatched belt guard screws',owner:'M.B. Parks',due:d,status:'Open'}],signoffs:[{id:'SO-001',source:'WF-2026-0001',role:'Work Review',reviewer:'Lead Tech',status:'Pending',date:''}],archive:[],log:[{at:new Date().toISOString(),event:'Sample loaded',ref:'DEMO'}]}}
function norm(x){x=x||sample();['jobs','procedures','assets','items','labels','actions','signoffs','archive','log'].forEach(k=>x[k]=Array.isArray(x[k])?x[k]:[]);x.project=x.project||{name:'Untitled'};x.counters=x.counters||{};x.jobs.forEach(j=>{j.steps=Array.isArray(j.steps)?j.steps:[];j.exceptions=j.exceptions||'';j.closeout=j.closeout||'';j.status=j.status||'Draft';j.due=j.due||D()});x.schema=SCHEMA;syncCounters(x);return x}
function syncCounters(x=db){let map={job:['jobs','WF-'+new Date().getFullYear()+'-'],proc:['procedures','PROC-'],label:['labels','LBL-'],asset:['assets','AST-'],item:['items','ITM-'],action:['actions','CA-'],signoff:['signoffs','SO-']};Object.entries(map).forEach(([k,[arr,p]])=>{let m=0;x[arr].forEach(o=>{let n=parseInt(String(o.id||'').split('-').pop(),10);if(!isNaN(n))m=Math.max(m,n)});x.counters[k]=Math.max(x.counters[k]||1,m+1)})}
function nid(k){let p={job:'WF-'+new Date().getFullYear()+'-',proc:'PROC-',label:'LBL-',asset:'AST-',item:'ITM-',action:'CA-',signoff:'SO-'}[k],n=db.counters[k]||1;db.counters[k]=n+1;return p+String(n).padStart(k=='job'?4:3,'0')}
function load(){try{return norm(JSON.parse(localStorage.getItem(KEY))||sample())}catch{return norm(sample())}}function save(){db.version=VER;db.schema=SCHEMA;localStorage.setItem(KEY,JSON.stringify(db));$('save').textContent='Autosaved '+new Date().toLocaleTimeString()}function log(a,r=''){db.log.unshift({at:new Date().toISOString(),event:a,ref:r});db.log=db.log.slice(0,100)}
function pct(j){return j.steps.length?Math.round(j.steps.filter(s=>s.done).length*100/j.steps.length):0}function fail(j){return j.steps.filter(s=>s.result=='Fail').length}function act(j){return db.actions.filter(a=>a.source==j.id&&a.status!='Closed').length}function sig(j){return db.signoffs.filter(s=>s.source==j.id&&s.status!='Signed').length}function due(j){let n=Math.ceil((new Date((j.due||'2999-01-01')+'T23:59:59')-new Date())/86400000);return n<0?'Overdue':n==0?'Today':n==1?'Tomorrow':n+'d'}function gate(j){return pct(j)==100&&!fail(j)}function closeout(j){if(fail(j))return'Blocked: Failed Step';if(act(j))return'Corrective Action Open';if(sig(j))return'Signoff Required';if(!gate(j))return'Gate Open';if(!j.closeout)return'Closeout Note Needed';return'Ready to Archive'}function risk(j){return fail(j)?'Failed Step':act(j)?'Action Open':sig(j)?'Signoff Required':j.status=='Hold'?'Hold':!gate(j)?'Gate Open':'Normal'}
function issues(){let out=[],seen={};['jobs','procedures','assets','items','labels','actions','signoffs'].forEach(k=>db[k].forEach(o=>{if(!o.id)out.push(['Error',k,'Missing ID']);else if(seen[o.id])out.push(['Error',k,'Duplicate ID '+o.id]);else seen[o.id]=1}));db.jobs.forEach(j=>{if(!j.title)out.push(['Error',j.id,'Missing title']);if(!j.steps.length)out.push(['Warn',j.id,'No steps']);if(!j.due)out.push(['Warn',j.id,'Missing due date']);if(j.proc&&!db.procedures.some(p=>p.id==j.proc))out.push(['Warn',j.id,'Procedure reference missing']);if(j.asset&&!db.assets.some(a=>a.tag==j.asset||a.id==j.asset))out.push(['Warn',j.id,'Asset reference missing'])});db.actions.forEach(a=>{if(a.source!='Manual'&&!db.jobs.concat(db.archive).some(j=>j.id==a.source))out.push(['Warn',a.id,'Orphan action source']);if(a.status!='Closed'&&!a.owner)out.push(['Warn',a.id,'Open action missing owner']);if(a.status!='Closed'&&!a.due)out.push(['Warn',a.id,'Open action missing due date'])});db.signoffs.forEach(s=>{if(s.source!='Manual'&&!db.jobs.concat(db.archive).some(j=>j.id==s.source))out.push(['Warn',s.id,'Orphan signoff source']);if(s.status!='Signed'&&!s.reviewer)out.push(['Warn',s.id,'Pending signoff missing reviewer'])});let payloads={};db.labels.forEach(l=>{if(l.payload){if(payloads[l.payload])out.push(['Warn',l.id,'Duplicate label payload']);payloads[l.payload]=1}});return out}
function m(t,v){return`<div class=card><div class=metric>${v}</div><b>${t}</b></div>`}function tbl(h,r){return`<table><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr>${r.map(a=>`<tr>${a.map(x=>`<td>${E(x)}</td>`).join('')}</tr>`).join('')}</table>`}function card(t,b,x){return`<div class=card><div class=top><h3>${t}</h3><div class=tools>${b}</div></div>${x}</div>`}function row(j,i){return`<div class=row onclick='sel=${i};go("Jobs")'><div><b>${E(j.title)}</b><div class=muted>${j.id} · ${j.status} · ${closeout(j)}</div></div><span class=pill>${pct(j)}%</span></div>`}function go(p){page=p;draw()}function draw(){$('ver').textContent=VER;$('title').textContent=page;$('nav').innerHTML=P.map(p=>`<button class="${page==p?'on':''}" data-page="${E(p)}">${E(p)}</button>`).join('');document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.page));$('view').innerHTML=views[page]()}
let views={Dashboard:()=>`<div class=grid>${m('Active Jobs',db.jobs.length)}${m('Integrity Issues',issues().length)}${m('Open Actions',db.actions.filter(a=>a.status!='Closed').length)}${m('Pending Signoffs',db.signoffs.filter(s=>s.status!='Signed').length)}</div>${db.jobs.map(row).join('')}`,Integrity:()=>card('Data Integrity',`<button class=soft onclick=repair()>Repair Safe Issues</button><button class=ghost onclick=csvIssues()>Issues CSV</button><button class=ghost onclick='exportJSON()'>Backup JSON</button>`,integrity()),'Operations Board':()=>['Draft','Ready','In Progress','Hold'].map(s=>card(s,'',db.jobs.filter(j=>j.status==s).map(row).join('')||'<p class=muted>No work</p>')).join(''),'Shop Control':()=>card('Shop Control',`<button class=soft onclick=startDue()>Start Due Today</button><button class=ghost onclick=holdFailed()>Hold Failed</button><button class=ghost onclick=csvControl()>CSV</button>`,tbl(['Risk','ID','Title','Status','Gate','Actions','Signoffs'],db.jobs.map(j=>[risk(j),j.id,j.title,j.status,gate(j)?'OK':'Open',act(j),sig(j)]))),'Quality Review':()=>card('Quality Review',`<button class=soft onclick=actionsFromFailures()>Actions From Failures</button><button class=ghost onclick=csvQuality()>CSV</button>`,tbl(['Closeout','ID','Exception'],db.jobs.map(j=>[closeout(j),j.id,j.exceptions]))),'Corrective Actions':()=>card('Corrective Actions',`<button class=soft onclick=newAction()>New Action</button><button class=ghost onclick=csvActions()>CSV</button>`,actions()),Signoffs:()=>card('Signoffs',`<button class=soft onclick=newSignoff()>New Signoff</button><button class=ghost onclick=csvSignoffs()>CSV</button>`,signoffs()),'Daily Plan':()=>card('Daily Plan','',tbl(['Due','ID','Title','Assigned','Status','Closeout'],db.jobs.map(j=>[due(j),j.id,j.title,j.assigned,j.status,closeout(j)]))),Jobs:()=>jobView(db.jobs[sel]||db.jobs[0]),Procedures:()=>card('Procedures',`<button class=soft onclick=newProc()>New Procedure</button>`,db.procedures.map((p,i)=>`<div class=step><b>${E(p.title)}</b><br>${E(p.id)} · ${E(p.status)}<div class=tools><button class=ghost onclick='travelerFromProc(${i})'>Create Traveler</button></div></div>`).join('')),Labels:()=>card('Labels',`<button class=soft onclick=newLabel()>New Label</button><button class=ghost onclick=batchLabels()>Batch Labels</button>`,db.labels.map(l=>`<div class=step><b>${E(l.title)}</b><br><span class=muted>${E(l.payload)}</span></div>`).join('')),Assets:()=>card('Assets',`<button class=soft onclick=newAsset()>New Asset</button>`,db.assets.map((a,i)=>`<div class=step><b>${E(a.tag)}</b><br>${E(a.name)}<br><span class=muted>${E(a.loc)}</span><div><button class=ghost onclick='assetLabel(${i})'>Label</button></div></div>`).join('')),'Parts & Tools':()=>card('Parts & Tools',`<button class=soft onclick=newItem()>New Item</button>`,db.items.map((it,i)=>`<div class=step><b>${E(it.name)}</b><br>${E(it.kind)} · Qty ${E(it.qty)}<div><button class=ghost onclick='itemLabel(${i})'>Label</button></div></div>`).join('')),Reports:()=>card('Reports',`<button class=ghost onclick=csvStatus()>Status CSV</button><button class=ghost onclick=csvActions()>Actions CSV</button><button class=ghost onclick=csvSignoffs()>Signoffs CSV</button><button class=ghost onclick=csvIssues()>Issues CSV</button>`,tbl(['ID','Title','Status','Complete','Closeout'],db.jobs.concat(db.archive).map(j=>[j.id,j.title,j.status,pct(j)+'%',closeout(j)]))+tbl(['Time','Event','Ref'],db.log.map(x=>[x.at,x.event,x.ref]))),Archive:()=>card('Archive','',db.archive.map((j,i)=>`<div class=row><b>${E(j.id)} ${E(j.title)}</b><button class=ghost onclick=restore(${i})>Restore</button></div>`).join('')||'<p class=muted>No archived records.</p>'),Settings:()=>card('Settings',`<button onclick=exportJSON()>Export JSON</button><button class=ghost onclick=imp.click()>Import JSON</button><button class=ghost onclick=diag()>Run Diagnostics</button><button class=bad onclick=clearStore()>Clear Local Storage</button>`,`<p><b>${VER}</b></p><p>Schema ${SCHEMA}</p><p id=diag class=muted>Diagnostics not run.</p>`)};
function integrity(){let xs=issues();return`<div class=grid>${m('Schema',db.schema)}${m('Issues',xs.length)}${m('Records',db.jobs.length+db.actions.length+db.signoffs.length+db.labels.length)}${m('Backups','JSON')}</div>${xs.length?tbl(['Level','Record','Issue'],xs):'<p class=ok><b>No integrity issues detected.</b></p>'}<p class=muted>Safe repair updates schema, counters, blank titles, and missing arrays. It will not delete records.</p>`}
function jobView(j){return card(j.title,`<button onclick=status('Ready')>Ready</button><button onclick=status('In Progress')>Start</button><button onclick=status('Hold')>Hold</button><button class=soft onclick=archiveJob()>Archive</button><button class=ghost onclick=actionForJob()>Add Action</button><button class=ghost onclick=signoffForJob()>Add Signoff</button><button class=ghost onclick=labelForJob()>Label</button>`,`<p><span class='pill ${closeout(j)=='Ready to Archive'?'ok':'need'}'>${closeout(j)}</span></p><label>Title<input value='${E(j.title)}' oninput='j.title=this.value;save()'></label><label>Exception<textarea oninput='j.exceptions=this.value;save()'>${E(j.exceptions)}</textarea></label><label>Closeout Notes<textarea oninput='j.closeout=this.value;save()'>${E(j.closeout)}</textarea></label>${j.steps.map((s,i)=>`<div class=step><b>${i+1}. ${E(s.t)}</b><label><input type=checkbox ${s.done?'checked':''} onchange='s.done=this.checked;save();draw()'> Done</label><select onchange='s.result=this.value;save();draw()'>${['Not Checked','Pass','Fail','N/A'].map(x=>`<option ${s.result==x?'selected':''}>${x}</option>`).join('')}</select><input placeholder=Initials value='${E(s.initials)}' oninput='s.initials=this.value;save()'></div>`).join('')}`)}
function actions(){return tbl(['Status','ID','Source','Title','Owner','Due'],db.actions.map(a=>[a.status,a.id,a.source,a.title,a.owner,a.due]))+db.actions.map((a,i)=>`<button class=ghost onclick='closeAction(${i})'>Close ${E(a.id)}</button>`).join(' ')}function signoffs(){return tbl(['Status','ID','Source','Role','Reviewer','Date'],db.signoffs.map(s=>[s.status,s.id,s.source,s.role,s.reviewer,s.date]))+db.signoffs.map((s,i)=>`<button class=ghost onclick='signOff(${i})'>Sign ${E(s.id)}</button>`).join(' ')}
function status(s){db.jobs[sel].status=s;log('Status changed',db.jobs[sel].id);save();draw()}function startDue(){db.jobs.forEach(j=>{if(j.due==D()&&j.status=='Ready')j.status='In Progress'});save();draw()}function holdFailed(){db.jobs.forEach(j=>{if(fail(j))j.status='Hold'});save();draw()}function archiveJob(){let j=db.jobs[sel];if(closeout(j)!='Ready to Archive'&&!confirm('Closeout gate open. Archive anyway?'))return;j.status='Complete';db.archive.unshift(j);db.jobs.splice(sel,1);sel=0;save();draw()}function restore(i){db.jobs.unshift(db.archive.splice(i,1)[0]);go('Jobs');save();draw()}function newJob(){db.jobs.unshift({id:nid('job'),title:'Untitled Work Traveler',status:'Draft',due:D(),assigned:'',exceptions:'',closeout:'',steps:[{t:'New step',done:false,result:'Not Checked',initials:''}]});sel=0;go('Jobs');save();draw()}function newProc(){db.procedures.unshift({id:nid('proc'),title:'New Procedure',status:'Draft',steps:['New step']});save();draw()}function travelerFromProc(i){let p=db.procedures[i];newJob();db.jobs[0].title=p.title;db.jobs[0].proc=p.id;db.jobs[0].steps=(p.steps||[]).map(t=>({t,done:false,result:'Not Checked',initials:''}));save();draw()}function newLabel(){db.labels.unshift({id:nid('label'),title:'New Label',type:'Custom',payload:'workforge://label'});save();draw()}function labelForJob(){let j=db.jobs[sel];db.labels.unshift({id:nid('label'),title:j.id,type:'Job',payload:'workforge://job/'+j.id});go('Labels');save();draw()}function batchLabels(){db.assets.forEach(a=>db.labels.unshift({id:nid('label'),title:a.tag,type:'Asset',payload:'workforge://asset/'+a.id}));db.items.forEach(i=>db.labels.unshift({id:nid('label'),title:i.name,type:'Item',payload:'workforge://item/'+i.id}));save();draw()}function newAsset(){db.assets.unshift({id:nid('asset'),tag:'NEW',name:'New Asset',loc:''});save();draw()}function newItem(){db.items.unshift({id:nid('item'),name:'New Item',kind:'Tool',qty:1});save();draw()}function assetLabel(i){let a=db.assets[i];db.labels.unshift({id:nid('label'),title:a.tag,type:'Asset',payload:'workforge://asset/'+a.id});go('Labels');save();draw()}function itemLabel(i){let it=db.items[i];db.labels.unshift({id:nid('label'),title:it.name,type:'Item',payload:'workforge://item/'+it.id});go('Labels');save();draw()}function newAction(){db.actions.unshift({id:nid('action'),source:'Manual',title:'New corrective action',owner:'',due:D(),status:'Open'});save();draw()}function actionForJob(){let j=db.jobs[sel];db.actions.unshift({id:nid('action'),source:j.id,title:'Follow up: '+j.title,owner:j.assigned||'',due:D(),status:'Open'});go('Corrective Actions');save();draw()}function actionsFromFailures(){db.jobs.forEach(j=>j.steps.filter(s=>s.result=='Fail').forEach(s=>{if(!db.actions.some(a=>a.source==j.id&&a.title.includes(s.t)))db.actions.unshift({id:nid('action'),source:j.id,title:'Correct failed step: '+s.t,owner:j.assigned||'',due:D(),status:'Open'})}));go('Corrective Actions');save();draw()}function closeAction(i){db.actions[i].status='Closed';log('Action closed',db.actions[i].id);save();draw()}function newSignoff(){db.signoffs.unshift({id:nid('signoff'),source:'Manual',role:'Review',reviewer:'',status:'Pending',date:''});save();draw()}function signoffForJob(){let j=db.jobs[sel];db.signoffs.unshift({id:nid('signoff'),source:j.id,role:'Work Review',reviewer:j.assigned||'',status:'Pending',date:''});go('Signoffs');save();draw()}function signOff(i){db.signoffs[i].status='Signed';db.signoffs[i].date=D();log('Signoff signed',db.signoffs[i].id);save();draw()}function repair(){db=norm(db);db.jobs.forEach(j=>{j.title=j.title||'Untitled Work Traveler'});syncCounters();log('Safe integrity repair run','SCHEMA '+SCHEMA);save();draw()}function csv(n,r){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([r.map(x=>x.join(',')).join('\n')],{type:'text/csv'}));a.download=n;a.click()}function csvStatus(){csv('workforge-status.csv',[['ID','Title','Status','Closeout'],...db.jobs.map(j=>[j.id,j.title,j.status,closeout(j)])])}function csvControl(){csv('workforge-control.csv',[['Risk','ID','Status','Gate','Actions','Signoffs'],...db.jobs.map(j=>[risk(j),j.id,j.status,gate(j)?'OK':'Open',act(j),sig(j)])])}function csvQuality(){csv('workforge-quality.csv',[['Closeout','ID','Exception'],...db.jobs.map(j=>[closeout(j),j.id,j.exceptions])])}function csvActions(){csv('workforge-actions.csv',[['Status','ID','Source','Title','Owner','Due'],...db.actions.map(a=>[a.status,a.id,a.source,a.title,a.owner,a.due])])}function csvSignoffs(){csv('workforge-signoffs.csv',[['Status','ID','Source','Role','Reviewer','Date'],...db.signoffs.map(s=>[s.status,s.id,s.source,s.role,s.reviewer,s.date])])}function csvIssues(){csv('workforge-integrity-issues.csv',[['Level','Record','Issue'],...issues()])}function exportJSON(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='workforge-backup-'+D()+'.json';a.click()}function importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{db=norm(JSON.parse(r.result));log('JSON imported','schema '+SCHEMA);save();draw()};r.readAsText(f)}function loadSample(){if(confirm('Replace current local data?')){db=norm(sample());save();draw()}}function clearStore(){if(confirm('Clear local storage?')){localStorage.removeItem(KEY);db=norm(sample());save();draw()}}function diag(){$('diag').innerHTML='<span class=pill>PASS</span> '+P.length+' views, '+issues().length+' integrity issues, schema '+db.schema+'.'}db=load();draw();
</script>
