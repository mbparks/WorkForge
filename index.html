<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Work Forge</title><style>
:root{--bg:#f6f1e6;--card:#fffaf0;--ink:#1f2937;--muted:#667085;--line:#decfb5;--brand:#b45309;--ok:#15803d;--bad:#b91c1c;--warn:#b7791f}.dark{--bg:#0f172a;--card:#1f2937;--ink:#f8fafc;--muted:#cbd5e1;--line:#334155;--brand:#f59e0b;--ok:#86efac;--bad:#f87171;--warn:#fbbf24}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px system-ui,Segoe UI,sans-serif}button,input,select,textarea{font:inherit}button{border:0;border-radius:999px;padding:.6rem .85rem;background:var(--ink);color:var(--card);font-weight:800;cursor:pointer}.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}.soft{background:#f59e0b22;color:var(--brand);border:1px solid #f59e0b55}.danger{background:var(--bad);color:white}.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{padding:20px;border-right:1px solid var(--line);position:sticky;top:0;height:100vh}.mark{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--brand),#0f766e);display:grid;place-items:center;color:white;font-weight:1000}.brand{display:flex;gap:10px;align-items:center}.muted{color:var(--muted)}.nav{display:grid;gap:8px;margin:18px 0}.nav button{text-align:left;border-radius:12px;background:transparent;color:var(--ink);border:1px solid transparent}.nav .on{background:var(--card);border-color:var(--line)}main{padding:20px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:16px}.tools{display:flex;gap:8px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}.head{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}.body{padding:16px}.s3{grid-column:span 3}.s4{grid-column:span 4}.s5{grid-column:span 5}.s6{grid-column:span 6}.s7{grid-column:span 7}.s8{grid-column:span 8}.s12{grid-column:span 12}.metric{font-size:2rem;font-weight:1000}.list{display:grid;gap:9px}.row,.step{border:1px solid var(--line);border-radius:13px;padding:10px;background:#ffffff10}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;cursor:pointer}.sel{outline:2px solid var(--brand)}.pill,.stamp{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:.2rem .5rem;font-size:.75rem;font-weight:900}.stamp{border-width:2px;text-transform:uppercase}.Ready{color:#2563eb}.InProgress{color:var(--warn)}.Hold,.Fail{color:var(--bad)}.Complete,.Released,.Pass{color:var(--ok)}label{display:grid;gap:5px;color:var(--muted);font-size:.84rem;font-weight:800}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:.6rem;background:#ffffff55;color:var(--ink)}.dark input,.dark select,.dark textarea{background:#0f172a}textarea{min-height:76px}.form,.filters{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.wide{grid-column:1/-1}.bar{height:9px;border-radius:99px;background:linear-gradient(90deg,var(--brand),#0f766e)}.empty{border:1px dashed var(--line);border-radius:13px;padding:18px;text-align:center;color:var(--muted)}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left}.qr{width:74px;height:74px;background:repeating-linear-gradient(45deg,#111 0 4px,#fff 4px 8px);border:8px solid #fff}.hide{display:none}@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid,.form,.filters{grid-template-columns:1fr}.s3,.s4,.s5,.s6,.s7,.s8,.s12{grid-column:1}}@media print{.side,.top{display:none}.app{display:block}main{padding:0}.card{border:0}.step{break-inside:avoid}}
</style><div class="app"><aside class="side"><div class="brand"><div class="mark">WF</div><div><h2>Work Forge</h2><div class="muted">FI 064 · <b id="ver"></b></div></div></div><p class="muted">Procedures, travelers, labels, QR sheets, and work packets.</p><div id="nav" class="nav"></div><button class="soft" onclick="newJob()">New Traveler</button></aside><main><div class="top"><div><h1 id="title"></h1><p class="muted" id="save">Autosaved locally</p></div><div class="tools"><button class="soft" onclick="loadSamples()">Load Sample Data</button><button class="ghost" onclick="exportProject()">Export JSON</button><button class="ghost" onclick="imp.click()">Import JSON</button><button class="ghost" onclick="theme()" id="theme">Dark Mode</button></div></div><input id="imp" class="hide" type="file" accept=".json,application/json" onchange="importProject(event)"><section id="view"></section></main></div><script>
const V='v2.4 Shop Control',K='workforge.project.v2',P={dashboard:'Dashboard',board:'Operations Board',control:'Shop Control',plan:'Daily Plan',jobs:'Jobs / Travelers',procedures:'Procedures',labels:'Label Forge',assets:'Assets',items:'Parts & Tools',reports:'Reports',archive:'Archive',settings:'Settings'};let page='dashboard',sel={},F={q:'',status:'All',type:'All',priority:'All'},db;function $(id){return document.getElementById(id)}function e(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function id(p){return p+'-'+Math.random().toString(36).slice(2,7).toUpperCase()}function st(t,i,v,w,h){return{id:id('STP'),title:t,instruction:i,verification:v,warning:w,evidence:'Record notes, readings, initials, or photo reference.',holdPoint:!!h}}function sample(){let d=new Date().toISOString().slice(0,10);return{app:'Work Forge',version:V,project:{name:'Green Shoe Garage Demo',owner:'M.B. Parks'},procedures:[{id:'PROC-001',title:'Replace Small Fan Bearing',type:'Repair',status:'Released',revision:'A',rough:'Verify asset\nRemove guard\nPull bearing\nInstall replacement\nTest run',steps:[st('Verify asset','Confirm tag and part.','Part matches traveler.','Stop if part is unknown.'),st('Pull bearing','Use bearing puller and support shaft.','Shaft is clean.','Do not hammer shaft.',true),st('Test run','Run briefly and listen.','No noise or vibration.','Keep clear.',true)]},{id:'PROC-002',title:'Build Sensor Test Cable',type:'Assembly',status:'Released',revision:'B',rough:'Cut cable\nTerminate ends\nContinuity test',steps:[st('Cut cable','Cut to length and strip.','Conductors intact.',''),st('Continuity test','Test all conductors.','Matrix passes.','Do not release failed cable.',true)]}],assets:[{id:'AST-EF2',tag:'EF-2',name:'Roof Exhaust Fan EF-2',type:'Mechanical',location:'Cumberland Hall / Roof',status:'Active'},{id:'AST-BENCH1',tag:'BENCH-1',name:'Electronics Bench 1',type:'Workstation',location:'Green Shoe Garage',status:'Active'}],items:[{id:'ITM-PULLER',name:'Bearing Puller Kit',kind:'Tool',sku:'TOOL-018',location:'Tool Wall A',quantity:1},{id:'ITM-6204',name:'6204-2RS Bearing',kind:'Part',sku:'BRG-6204',location:'Bin B-04',quantity:8}],jobs:[{id:'WF-2026-0001',title:'Replace bearing on EF-2',type:'Repair',status:'In Progress',priority:'Normal',assetId:'AST-EF2',procedureId:'PROC-001',assigned:'M.B. Parks',due:d,notes:'Noise reported after lunch.',parts:['ITM-6204'],tools:['ITM-PULLER'],stepRuns:[]},{id:'WF-2026-0002',title:'Build sensor test cable set',type:'Assembly',status:'Ready',priority:'Low',assetId:'AST-BENCH1',procedureId:'PROC-002',assigned:'Shop',due:d,notes:'Make two labeled cables.',parts:[],tools:[],stepRuns:[]}],labels:[{id:'LBL-001',type:'Job Traveler',title:'WF-2026-0001',subtitle:'Replace bearing on EF-2',payload:'workforge://job/WF-2026-0001',copies:1}],archive:[],log:[{at:new Date().toISOString(),event:'Sample project loaded',ref:'DEMO'}]}}
function norm(x){x=x||sample();['procedures','jobs','assets','items','labels','archive','log'].forEach(k=>x[k]=Array.isArray(x[k])?x[k]:[]);x.project=x.project||{name:'Untitled'};x.jobs.forEach(j=>{j.parts=Array.isArray(j.parts)?j.parts:[];j.tools=Array.isArray(j.tools)?j.tools:[];j.stepRuns=Array.isArray(j.stepRuns)?j.stepRuns:[];ensure(j,x)});return x}function load(){try{return norm(JSON.parse(localStorage.getItem(K)||''))}catch{return norm(sample())}}function save(){db.version=V;localStorage.setItem(K,JSON.stringify(db));$('save').textContent='Autosaved '+new Date().toLocaleTimeString()}function log(ev,ref=''){db.log.unshift({at:new Date().toISOString(),event:ev,ref});db.log=db.log.slice(0,60)}function init(){if(localStorage.getItem('wf.theme')==='dark')document.documentElement.classList.add('dark');db=load();$('ver').textContent=V;render()}function render(){$('theme').textContent=document.documentElement.classList.contains('dark')?'Light Mode':'Dark Mode';$('title').textContent=P[page];$('nav').innerHTML=Object.entries(P).map(([k,v])=>`<button class="${page==k?'on':''}" onclick="go('${k}')">${v}</button>`).join('');$('view').innerHTML=VIEWS[page]()}function go(p){page=p;render()}function theme(){document.documentElement.classList.toggle('dark');localStorage.setItem('wf.theme',document.documentElement.classList.contains('dark')?'dark':'light');render()}function loadSamples(){if(confirm('Replace current project with sample data?')){db=norm(sample());save();render()}}
const VIEWS={dashboard(){let fail=db.jobs.reduce((a,j)=>a+j.stepRuns.filter(r=>r.result==='Fail').length,0);return`<div class="grid">${metric('Active Jobs',db.jobs.length)}${metric('Due Soon',db.jobs.filter(j=>days(j.due)<=7).length)}${metric('Failed Steps',fail)}${metric('Labels',db.labels.length)}<div class="card s8"><div class="head"><h3>Work Queue</h3><button class="soft" onclick="newJob()">New Traveler</button></div><div class="body list">${db.jobs.map(jobRow).join('')}</div></div><div class="card s4"><div class="head"><h3>Phase 2.4</h3></div><div class="body"><p><b>Shop Control</b></p><p class="muted">Control board, readiness risk, kitting status, daily plan, and CSV exports for shop-floor execution.</p><div class="tools"><button class="ghost" onclick="go('control')">Shop Control</button><button class="ghost" onclick="go('plan')">Daily Plan</button><button class="ghost" onclick="go('control')">Shop Control</button></div></div></div></div>`},board(){let L=['Draft','Ready','In Progress','Hold'];return`<div class="card"><div class="head"><h3>Operations Board</h3><div class="tools"><button class="soft" onclick="newJob()">New Traveler</button><button class="ghost" onclick="go('plan')">Daily Plan</button></div></div><div class="body" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">${L.map(s=>`<div><h3>${s}</h3><div class="list">${db.jobs.filter(j=>j.status==s).map(boardCard).join('')||empty('No work.')}</div></div>`).join('')}</div></div>`},control(){return`<div class="grid"><div class="card s12"><div class="head"><h3>Shop Control</h3><div class="tools"><button class="soft" onclick="startDueToday()">Start Due Today</button><button class="ghost" onclick="holdFailedJobs()">Hold Failed Work</button><button class="ghost" onclick="exportControlCSV()">Export CSV</button><button class="ghost" onclick="printControl()">Print</button></div></div><div class="body">${shopSummary()}${controlTable()}</div></div><div class="card s6"><div class="head"><h3>Risk Queue</h3></div><div class="body list">${db.jobs.filter(j=>jobRisk(j)!='Normal').map(boardCard).join('')||empty('No elevated work risk detected.')}</div></div><div class="card s6"><div class="head"><h3>Kitting Review</h3></div><div class="body">${kitTable()}</div></div></div>`},plan(){return`<div class="grid"><div class="card s12"><div class="head"><h3>Daily Plan</h3><div class="tools"><button class="soft" onclick="newJob()">New Traveler</button><button class="ghost" onclick="printPlan()">Print Plan</button><button class="ghost" onclick="exportStatusCSV()">Export CSV</button></div></div><div class="body">${planSummary()}${planTable()}</div></div><div class="card s6"><div class="head"><h3>Overdue / Due Today</h3></div><div class="body list">${db.jobs.filter(j=>days(j.due)<=0).map(boardCard).join('')||empty('Nothing overdue or due today.')}</div></div><div class="card s6"><div class="head"><h3>Next 7 Days</h3></div><div class="body list">${db.jobs.filter(j=>days(j.due)>0&&days(j.due)<=7).map(boardCard).join('')||empty('No due-soon travelers.')}</div></div></div>`},jobs(){let rows=rowsOf(db.jobs),j=db.jobs.find(x=>x.id==sel.job)||rows[0]||db.jobs[0];if(j)sel.job=j.id;return split('Travelers',filter()+rows.map(jobRow).join(''),j?jobEdit(j):empty('No traveler.'))},procedures(){let p=db.procedures.find(x=>x.id==sel.procedure)||db.procedures[0];if(p)sel.procedure=p.id;return split('Procedures',db.procedures.map(procRow).join(''),p?procEdit(p):empty('No procedure.'))},labels(){let l=db.labels.find(x=>x.id==sel.label)||db.labels[0];if(l)sel.label=l.id;return split('Labels',`<div class="tools"><button class="soft" onclick="newLabel()">New Label</button><button class="ghost" onclick="labelsForAllAssets()">All Asset Labels</button><button class="ghost" onclick="labelsForAllItems()">All Item Labels</button></div>`+db.labels.map(labelRow).join(''),l?labelEdit(l):empty('No label.'))},assets(){return coll('asset','Assets',db.assets,assetRow,assetEdit,'newAsset')},items(){return coll('item','Parts & Tools',db.items,itemRow,itemEdit,'newItem')},reports(){return`<div class="grid"><div class="card s12"><div class="head"><h3>Status Report</h3><div class="tools"><button class="ghost" onclick="printReport()">Print</button><button class="ghost" onclick="exportStatusCSV()">Status CSV</button><button class="ghost" onclick="exportLogCSV()">Log CSV</button><button class="ghost" onclick="exportControlCSV()">Control CSV</button></div></div><div class="body">${statusTable()}</div></div><div class="card s12"><div class="head"><h3>Operations Log</h3></div><div class="body">${logTable()}</div></div></div>`},archive(){return`<div class="card"><div class="head"><h3>Archive</h3></div><div class="body list">${db.archive.map(a=>`<div class="row"><div><b>${e(a.title)}</b><div class="muted">${a.id}</div></div><button class="ghost" onclick="restore('${a.id}')">Restore</button></div>`).join('')||empty('No archived work.')}</div></div>`},settings(){return`<div class="grid"><div class="card s6"><div class="head"><h3>Project</h3><span class="pill">${V}</span></div><div class="body form">${field('Project Name','project.name',db.project.name,'project')}${field('Owner','project.owner',db.project.owner,'project')}</div></div><div class="card s6"><div class="head"><h3>Save</h3></div><div class="body tools"><button onclick="exportProject()">Export JSON</button><button class="ghost" onclick="exportStatusCSV()">Status CSV</button><button class="ghost" onclick="exportLogCSV()">Log CSV</button><button class="ghost" onclick="imp.click()">Import JSON</button><button class="danger" onclick="clearStorage()">Clear Local Storage</button></div></div><div class="card s12"><div class="head"><h3>Diagnostics</h3><button class="soft" onclick="diag()">Run Checks</button></div><div class="body" id="diag">Ready.</div></div></div>`}};
function metric(t,v){return`<div class="card s3"><div class="body"><div class="metric">${v}</div><b>${t}</b></div></div>`}function split(title,left,right){return`<div class="grid"><div class="card s5"><div class="head"><h3>${title}</h3></div><div class="body list">${left}</div></div><div class="card s7"><div class="body">${right}</div></div></div>`}function empty(t){return`<div class="empty">${t}</div>`}function stamp(s){return`<span class="stamp ${String(s).replace(/\s/g,'')}">${e(s)}</span>`}function pct(j){ensure(j);return j.stepRuns.length?Math.round(j.stepRuns.filter(r=>r.done).length*100/j.stepRuns.length):0}function gate(j){let p=proc(j.procedureId),fails=j.stepRuns.filter(r=>r.result==='Fail').length,holds=(p?.steps||[]).filter(s=>s.holdPoint),done=holds.filter(s=>j.stepRuns.find(r=>r.stepId==s.id)?.done).length;return{ok:!!p&&!!asset(j.assetId)&&!fails&&done==holds.length,fails,done,total:holds.length}}function days(d){return Math.ceil((new Date(d+'T23:59:59')-new Date())/86400000)}function jobRow(j){let g=gate(j),p=pct(j);return`<div class="row ${sel.job==j.id?'sel':''}" onclick="sel.job='${j.id}';render()"><div><b>${e(j.title)}</b><div class="muted">${j.id} · ${j.type} · ${j.priority||'Normal'} · ${assetName(j.assetId)}</div><div class="bar" style="width:${p}%"></div></div><div>${stamp(j.status)}<br><span class="pill ${g.ok?'ok':'bad'}">${g.ok?'Gate OK':'Gate Open'}</span></div></div>`}function boardCard(j){return`<div class="step"><b>${e(j.title)}</b><div class="muted">${j.id} · ${j.priority||'Normal'} · ${pct(j)}%</div><div class="tools"><button class="ghost" onclick="sel.job='${j.id}';go('jobs')">Open</button><button class="ghost" onclick="setStatus('${j.id}','Ready')">Ready</button><button class="ghost" onclick="setStatus('${j.id}','In Progress')">Start</button><button class="ghost" onclick="setStatus('${j.id}','Hold')">Hold</button></div></div>`}function procRow(p){return`<div class="row ${sel.procedure==p.id?'sel':''}" onclick="sel.procedure='${p.id}';render()"><div><b>${e(p.title)}</b><div class="muted">${p.id} · ${p.type} · ${p.steps.length} steps</div></div>${stamp(p.status)}</div>`}function labelRow(l){return`<div class="row ${sel.label==l.id?'sel':''}" onclick="sel.label='${l.id}';render()"><div><b>${e(l.title)}</b><div class="muted">${l.type} · ${l.copies||1} copies</div></div><div class="qr"></div></div>`}function assetRow(a){return`<div class="row ${sel.asset==a.id?'sel':''}" onclick="sel.asset='${a.id}';render()"><div><b>${e(a.tag)} · ${e(a.name)}</b><div class="muted">${e(a.location)}</div></div></div>`}function itemRow(i){return`<div class="row ${sel.item==i.id?'sel':''}" onclick="sel.item='${i.id}';render()"><div><b>${e(i.name)}</b><div class="muted">${i.kind} · ${i.sku}</div></div><span class="pill">${i.quantity||0}</span></div>`}
function filter(){return`<div class="filters"><input placeholder="Search" value="${e(F.q)}" oninput="F.q=this.value;render()">${['status','type','priority'].map(n=>`<select onchange="F.${n}=this.value;render()">${['All',...[...new Set(db.jobs.map(j=>j[n]).filter(Boolean))]].map(v=>`<option ${F[n]==v?'selected':''}>${e(v)}</option>`).join('')}</select>`).join('')}</div>`}function rowsOf(a){return a.filter(j=>(!F.q||JSON.stringify(j).toLowerCase().includes(F.q.toLowerCase()))&&['status','type','priority'].every(n=>F[n]=='All'||j[n]==F[n]))}function field(l,path,v,type){return`<label>${l}<input value="${e(v||'')}" oninput="patch('${type}','${path}',this.value)"></label>`}function select(l,path,v,opts,type){return`<label>${l}<select onchange="patch('${type}','${path}',this.value,true)">${opts.map(o=>`<option ${String(o)==String(v)?'selected':''}>${e(o)}</option>`).join('')}</select></label>`}function patch(type,path,val,r=false){let o=type=='project'?db:db[type+'s'].find(x=>x.id==sel[type]);let parts=path.split('.'),x=o;for(let i=0;i<parts.length-1;i++){x[parts[i]]??={};x=x[parts[i]]}x[parts.at(-1)]=val;if(type=='job'&&path=='procedureId')ensure(o,db,true);save();if(r)render()}function jobEdit(j){let g=gate(j);return`<div class="step"><b>Readiness Gate:</b> <span class="pill ${g.ok?'ok':'bad'}">${g.ok?'OK':'Needs attention'}</span> Hold points ${g.done}/${g.total}. Failed ${g.fails}.</div><div class="tools"><button class="ghost" onclick="setStatus('${j.id}','Ready')">Ready</button><button class="ghost" onclick="setStatus('${j.id}','In Progress')">Start</button><button class="ghost" onclick="setStatus('${j.id}','Hold')">Hold</button><button class="ghost" onclick="dupJob('${j.id}')">Duplicate</button><button class="ghost" onclick="labelsForJob('${j.id}')">Generate Labels</button><button onclick="printTraveler('${j.id}')">Print</button><button class="soft" onclick="archive('${j.id}')">Archive</button><button class="danger" onclick="del('job')">Delete</button></div><div class="form">${field('Title','title',j.title,'job')}${field('Job ID','id',j.id,'job')}${select('Status','status',j.status,['Draft','Ready','In Progress','Hold','Complete'],'job')}${select('Priority','priority',j.priority||'Normal',['Low','Normal','Urgent','Outage'],'job')}${field('Assigned','assigned',j.assigned,'job')}${field('Due','due',j.due,'job')}${field('Notes','notes',j.notes,'job')}</div><h3>Steps</h3>${j.stepRuns.map((r,i)=>run(j,r,i)).join('')}` }function run(j,r,i){let s=proc(j.procedureId)?.steps.find(x=>x.id==r.stepId)||{};return`<div class="step"><b>${i+1}. ${e(r.title)}</b> ${s.holdPoint?'<span class="pill">Hold</span>':''}<p>${e(s.instruction)}</p><div class="form"><label><span><input style="width:auto" type="checkbox" ${r.done?'checked':''} onchange="rset('${j.id}',${i},'done',this.checked)"> Done</span></label><label>Result<select onchange="rset('${j.id}',${i},'result',this.value)">${['Not Checked','Pass','Fail','N/A'].map(v=>`<option ${r.result==v?'selected':''}>${v}</option>`).join('')}</select></label><label>Initials<input value="${e(r.initials||'')}" oninput="rset('${j.id}',${i},'initials',this.value)"></label><label>Evidence<input value="${e(r.evidence||'')}" oninput="rset('${j.id}',${i},'evidence',this.value)"></label></div></div>`}function procEdit(p){return`<div class="tools"><button class="soft" onclick="compose('${p.id}')">Compose Rough Steps</button><button class="ghost" onclick="travelerFrom('${p.id}')">Create Traveler</button><button class="danger" onclick="del('procedure')">Delete</button></div><div class="form">${field('Title','title',p.title,'procedure')}${select('Status','status',p.status,['Draft','Released','Superseded'],'procedure')}<label class="wide">Rough Steps<textarea oninput="patch('procedure','rough',this.value)">${e(p.rough||'')}</textarea></label></div><h3>Controlled Steps</h3>${p.steps.map((s,i)=>`<div class="step">${field('Title',`steps.${i}.title`,s.title,'procedure')}<label><span><input style="width:auto" type="checkbox" ${s.holdPoint?'checked':''} onchange="patch('procedure','steps.${i}.holdPoint',this.checked,true)"> Hold Point</span></label><label>Instruction<textarea oninput="patch('procedure','steps.${i}.instruction',this.value)">${e(s.instruction)}</textarea></label></div>`).join('')}`}function labelEdit(l){return`<div class="form">${field('Title','title',l.title,'label')}${field('Payload','payload',l.payload,'label')}${field('Copies','copies',l.copies,'label')}</div>${labelCard(l)}<button onclick="printLabels()">Print Sheet</button>`}function assetEdit(a){return`<div class="form">${field('Tag','tag',a.tag,'asset')}${field('Name','name',a.name,'asset')}${field('Location','location',a.location,'asset')}</div><button class="ghost" onclick="labelForAsset('${a.id}')">Make Label</button>`}function itemEdit(i){return`<div class="form">${field('Name','name',i.name,'item')}${field('Kind','kind',i.kind,'item')}${field('SKU','sku',i.sku,'item')}${field('Quantity','quantity',i.quantity,'item')}</div><button class="ghost" onclick="labelForItem('${i.id}')">Make Label</button>`}
function coll(type,title,arr,row,edit,add){let o=arr.find(x=>x.id==sel[type])||arr[0];if(o)sel[type]=o.id;return split(title,`<button class="soft" onclick="${add}()">New</button>`+arr.map(row).join(''),o?edit(o):empty('No record.'))}function newId(p){return p+'-'+String([...db.jobs,...db.archive,...db.procedures,...db.labels,...db.assets,...db.items].filter(x=>(x.id||'').startsWith(p+'-')).length+1).padStart(3,'0')}function ensure(j,root=db,force=false){let p=(root.procedures||[]).find(x=>x.id==j.procedureId);if(!p){j.stepRuns=[];return}let old=new Map((j.stepRuns||[]).map(r=>[r.stepId,r]));if(!force&&j.stepRuns.length==p.steps.length&&p.steps.every(s=>old.has(s.id)))return;j.stepRuns=p.steps.map(s=>({stepId:s.id,title:s.title,done:old.get(s.id)?.done||false,result:old.get(s.id)?.result||'Not Checked',initials:old.get(s.id)?.initials||'',evidence:old.get(s.id)?.evidence||''}))}function job(id){return db.jobs.find(x=>x.id==id)||db.archive.find(x=>x.id==id)}function proc(id){return db.procedures.find(x=>x.id==id)}function asset(id){return db.assets.find(x=>x.id==id)}function item(id){return db.items.find(x=>x.id==id)}function assetName(id){let a=asset(id);return a?e(a.tag):'No asset'}function rset(id,i,k,v){job(id).stepRuns[i][k]=v;save()}function setStatus(id,s){let j=job(id);j.status=s;if(s=='In Progress'&&!j.started)j.started=new Date().toISOString().slice(0,10);log('Traveler status changed to '+s,id);save();render()}function dupJob(id){let c=JSON.parse(JSON.stringify(job(id)));c.id=newId('WF');c.title='Copy of '+c.title;c.status='Draft';c.stepRuns=c.stepRuns.map(r=>({...r,done:false,result:'Not Checked'}));db.jobs.unshift(c);sel.job=c.id;log('Traveler duplicated from '+id,c.id);save();render()}function newJob(){let p=db.procedures[0],j={id:newId('WF'),title:'Untitled Work Traveler',type:p?.type||'Repair',status:'Draft',priority:'Normal',assetId:db.assets[0]?.id||'',procedureId:p?.id||'',assigned:'',due:new Date().toISOString().slice(0,10),notes:'',stepRuns:[]};ensure(j,db,true);db.jobs.unshift(j);sel.job=j.id;page='jobs';log('Traveler created',j.id);save();render()}function travelerFrom(id){newJob();let j=db.jobs[0],p=proc(id);j.title=p.title;j.type=p.type;j.procedureId=p.id;ensure(j,db,true);save();render()}function newProcedure(){let p={id:newId('PROC'),title:'New Procedure',type:'Assembly',status:'Draft',rough:'New step',steps:[st('New step','Describe the work.','Verify it.','')]};db.procedures.unshift(p);sel.procedure=p.id;page='procedures';log('Procedure created',p.id);save();render()}function newLabel(){let l={id:newId('LBL'),type:'Custom',title:'New Label',payload:'workforge://label',copies:1};db.labels.unshift(l);sel.label=l.id;page='labels';log('Label created',l.id);save();render()}function newAsset(){let a={id:newId('AST'),tag:'NEW',name:'New Asset',location:'',status:'Active'};db.assets.unshift(a);sel.asset=a.id;page='assets';save();render()}function newItem(){let i={id:newId('ITM'),name:'New Item',kind:'Tool',sku:'',quantity:1};db.items.unshift(i);sel.item=i.id;page='items';save();render()}function compose(id){let p=proc(id),lines=(p.rough||'').split(/\n+/).map(x=>x.trim()).filter(Boolean);p.steps=lines.map(x=>st(x,x,'Confirm complete.','',/verify|test|hold|inspect/i.test(x)));save();render()}function del(type){let key=type+'s';if(!confirm('Delete selected '+type+'?'))return;db[key]=db[key].filter(x=>x.id!=sel[type]);sel[type]=null;save();render()}function archive(id){let j=job(id),g=gate(j);if(!g.ok&&!confirm('Readiness gate is open. Archive anyway?'))return;j.status='Complete';db.archive.unshift({...j,archivedAt:new Date().toISOString()});db.jobs=db.jobs.filter(x=>x.id!=id);log('Traveler archived',id);save();render()}function restore(id){let i=db.archive.findIndex(x=>x.id==id),j=db.archive.splice(i,1)[0];j.status='Ready';db.jobs.unshift(j);sel.job=j.id;page='jobs';save();render()}
function labelsForJob(id){let j=job(id);db.labels.unshift({id:newId('LBL'),type:'Job Traveler',title:j.id,subtitle:j.title,payload:'workforge://job/'+j.id,copies:1});sel.label=db.labels[0].id;page='labels';log('Packet labels generated',id);save();render()}function labelForAsset(id){let a=asset(id);db.labels.unshift({id:newId('LBL'),type:'Asset Sticker',title:a.tag,subtitle:a.location,payload:'workforge://asset/'+a.id,copies:1});sel.label=db.labels[0].id;page='labels';save();render()}function labelForItem(id){let i=item(id);db.labels.unshift({id:newId('LBL'),type:'Tool Tag',title:i.name,subtitle:i.sku,payload:'workforge://item/'+i.id,copies:1});sel.label=db.labels[0].id;page='labels';save();render()}function labelsForAllAssets(){db.assets.forEach(a=>db.labels.unshift({id:newId('LBL'),type:'Asset Sticker',title:a.tag,subtitle:a.location,payload:'workforge://asset/'+a.id,copies:1}));log('Batch asset labels generated','LABELS');page='labels';save();render()}
function labelsForAllItems(){db.items.forEach(i=>db.labels.unshift({id:newId('LBL'),type:i.kind=='Part'?'Part Bin Label':'Tool Tag',title:i.name,subtitle:i.sku,payload:'workforge://item/'+i.id,copies:1}));log('Batch item labels generated','LABELS');page='labels';save();render()}function labelCard(l){return`<div class="labelcard"><div class="qr"></div><div><h4>${e(l.title)}</h4><p class="muted">${e(l.subtitle||l.type)}</p><div class="code">${e(l.payload)}</div></div></div>`}function statusTable(){return`<table><tr><th>ID</th><th>Title</th><th>Status</th><th>Priority</th><th>Complete</th><th>Gate</th></tr>${[...db.jobs,...db.archive].map(j=>`<tr><td>${j.id}</td><td>${e(j.title)}</td><td>${j.status}</td><td>${j.priority||'Normal'}</td><td>${pct(j)}%</td><td>${gate(j).ok?'OK':'Open'}</td></tr>`).join('')}</table>`}

function jobRisk(j){let g=gate(j);if(j.stepRuns.some(r=>r.result==='Fail'))return'Failed Step';if(days(j.due)<0)return'Overdue';if(j.status==='Hold')return'On Hold';if(!g.ok)return'Gate Open';if(days(j.due)==0)return'Due Today';return'Normal'}
function kitStatus(j){let ids=[...(j.parts||[]),...(j.tools||[])];if(!ids.length)return'No Kit List';let missing=ids.map(item).filter(x=>!x||Number(x.quantity||0)<=0);return missing.length?'Kit Review':'Kit OK'}
function shopSummary(){let risk=db.jobs.filter(j=>jobRisk(j)!='Normal').length,kit=db.jobs.filter(j=>kitStatus(j)=='Kit Review').length,openGates=db.jobs.filter(j=>!gate(j).ok).length,ready=db.jobs.filter(j=>j.status==='Ready').length;return`<div class="grid" style="margin-bottom:12px">${metric('Risk Queue',risk)}${metric('Kit Review',kit)}${metric('Gate Open',openGates)}${metric('Ready',ready)}</div>`}
function controlTable(){return`<table><tr><th>Risk</th><th>ID</th><th>Traveler</th><th>Status</th><th>Kit</th><th>Gate</th><th>Due</th><th>Actions</th></tr>${db.jobs.slice().sort((a,b)=>jobRisk(a).localeCompare(jobRisk(b))||String(a.due||'9999').localeCompare(String(b.due||'9999'))).map(j=>`<tr><td>${jobRisk(j)}</td><td>${j.id}</td><td>${e(j.title)}</td><td>${j.status}</td><td>${kitStatus(j)}</td><td>${gate(j).ok?'OK':'Open'}</td><td>${dueText(j.due)}</td><td><button class="ghost" onclick="sel.job='${j.id}';go('jobs')">Open</button></td></tr>`).join('')}</table>`}
function kitTable(){return`<table><tr><th>Traveler</th><th>Required</th><th>Status</th></tr>${db.jobs.map(j=>{let ids=[...(j.parts||[]),...(j.tools||[])],names=ids.map(item).filter(Boolean).map(i=>i.name+' ('+(i.quantity??0)+')').join(', ')||'No kit list';return`<tr><td>${j.id}</td><td>${e(names)}</td><td>${kitStatus(j)}</td></tr>`}).join('')}</table>`}
function startDueToday(){let n=0;db.jobs.forEach(j=>{if(days(j.due)<=0&&j.status==='Ready'){j.status='In Progress';j.started=new Date().toISOString().slice(0,10);n++}});log('Started due-today ready travelers',String(n));save();render()}
function holdFailedJobs(){let n=0;db.jobs.forEach(j=>{if(j.stepRuns.some(r=>r.result==='Fail')&&j.status!=='Hold'){j.status='Hold';n++}});log('Held travelers with failed steps',String(n));save();render()}
function exportControlCSV(){downloadCSV('workforge-shop-control-'+new Date().toISOString().slice(0,10)+'.csv',[['Risk','ID','Title','Status','Priority','Kit','Gate','Due','Assigned'],...db.jobs.map(j=>[jobRisk(j),j.id,j.title,j.status,j.priority||'Normal',kitStatus(j),gate(j).ok?'OK':'Open',j.due||'',j.assigned||''])]);log('Shop control CSV exported','CONTROL');save();render()}
function printControl(){printWin('Shop Control',`<h1>Work Forge Shop Control</h1>${shopSummary()}${controlTable()}${kitTable()}`)}
function planSummary(){let over=db.jobs.filter(j=>days(j.due)<0).length,today=db.jobs.filter(j=>days(j.due)==0).length,soon=db.jobs.filter(j=>days(j.due)>0&&days(j.due)<=7).length,hold=db.jobs.filter(j=>j.status=='Hold').length;return`<div class="grid" style="margin-bottom:12px">${metric('Overdue',over)}${metric('Due Today',today)}${metric('Next 7 Days',soon)}${metric('On Hold',hold)}</div>`}
function planTable(){return`<table><tr><th>When</th><th>ID</th><th>Traveler</th><th>Status</th><th>Priority</th><th>Assigned</th><th>Gate</th></tr>${db.jobs.slice().sort((a,b)=>String(a.due||'9999').localeCompare(String(b.due||'9999'))).map(j=>`<tr><td>${dueText(j.due)}</td><td>${j.id}</td><td>${e(j.title)}</td><td>${j.status}</td><td>${j.priority||'Normal'}</td><td>${e(j.assigned||'')}</td><td>${gate(j).ok?'OK':'Open'}</td></tr>`).join('')}</table>`}
function dueText(d){let n=days(d);return n<0?`Overdue ${Math.abs(n)}d`:n==0?'Today':n==1?'Tomorrow':`${n}d`}
function csvCell(v){return '"'+String(v??'').replaceAll('"','""')+'"'}
function downloadCSV(name,rows){let csv=rows.map(r=>r.map(csvCell).join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
function exportStatusCSV(){downloadCSV('workforge-status-'+new Date().toISOString().slice(0,10)+'.csv',[['ID','Title','Status','Priority','Asset','Due','Assigned','Complete','Gate'],...[...db.jobs,...db.archive].map(j=>[j.id,j.title,j.status,j.priority||'Normal',assetName(j.assetId),j.due||'',j.assigned||'',pct(j)+'%',gate(j).ok?'OK':'Open'])]);log('Status CSV exported','REPORT');save();render()}
function exportLogCSV(){downloadCSV('workforge-log-'+new Date().toISOString().slice(0,10)+'.csv',[['Time','Event','Ref'],...db.log.map(x=>[x.at,x.event,x.ref])]);log('Operations log CSV exported','REPORT');save();render()}
function printPlan(){printWin('Daily Plan',`<h1>Work Forge Daily Plan</h1>${planTable()}`)}function logTable(){return`<table><tr><th>Time</th><th>Event</th><th>Ref</th></tr>${db.log.slice(0,30).map(x=>`<tr><td>${new Date(x.at).toLocaleString()}</td><td>${e(x.event)}</td><td>${e(x.ref)}</td></tr>`).join('')}</table>`}function printWin(t,h){let w=open('','_blank');if(!w)return alert('Allow pop-ups to print.');w.document.write('<title>'+e(t)+'</title><style>body{font-family:Arial;margin:24px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #999;padding:8px}.step{border:1px solid #999;padding:8px;margin:8px 0}.labelcard{border:1px dashed #777;padding:8px;margin:8px;break-inside:avoid}</style>'+h+'<script>print()<\/script>');w.document.close()}function printTraveler(id){let j=job(id),p=proc(j.procedureId);printWin(j.id,`<h1>${e(j.title)}</h1>${labelCard({title:j.id,subtitle:j.title,payload:'workforge://job/'+j.id})}${j.stepRuns.map((r,i)=>`<div class="step"><b>${i+1}. ${e(r.title)}</b> ${r.done?'☑':'☐'}<p>${e(p?.steps.find(s=>s.id==r.stepId)?.instruction)}</p><p>${e(r.result)}</p></div>`).join('')}`)}function printLabels(){printWin('Labels',db.labels.map(labelCard).join(''))}function printReport(){printWin('Report',statusTable()+logTable())}function exportProject(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='workforge-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}function importProject(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{db=norm(JSON.parse(r.result));save();render()}catch(e){alert(e.message)}};r.readAsText(f);ev.target.value=''}function clearStorage(){if(confirm('Clear local storage?')){localStorage.removeItem(K);db=norm(sample());save();render()}}function diag(){let ok=['procedures','jobs','assets','items','labels','archive','log'].every(k=>Array.isArray(db[k]))&&Object.keys(P).every(k=>VIEWS[k]);$('diag').innerHTML=ok?'<span class="pill ok">PASS</span> Core app checks passed.':'<span class="pill bad">FAIL</span> Check console.'}
init();
</script>
