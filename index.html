<!doctype html><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Work Forge</title><style>body{margin:0;font:15px system-ui;background:#f6f1e6;color:#1f2937}.dark body,.dark{background:#0f172a;color:#f8fafc}button,input,textarea,select{font:inherit}button{border:0;border-radius:999px;padding:.55rem .8rem;background:#1f2937;color:#fff;font-weight:800;cursor:pointer}.ghost{background:transparent;color:inherit;border:1px solid #aaa}.soft{background:#f59e0b33;color:#92400e}.bad{background:#b91c1c;color:white}.app{display:grid;grid-template-columns:235px 1fr;min-height:100vh}aside{padding:18px;border-right:1px solid #cdbb9f}main{padding:18px}.nav{display:grid;gap:7px;margin:16px 0}.nav button{text-align:left;background:transparent;color:inherit;border:1px solid transparent}.nav .on{border-color:#b45309;background:#fff6}.top,.tools,.row{display:flex;gap:8px;align-items:center;justify-content:space-between}.tools{justify-content:flex-start;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card,.row,.step{background:#fff8;border:1px solid #cdbb9f;border-radius:14px;padding:12px;margin:0 0 10px}.metric{font-size:2rem;font-weight:1000}.muted{opacity:.7}.pill{border:1px solid #999;border-radius:999px;padding:.15rem .45rem;font-weight:800;font-size:.78rem}.ok{color:#15803d}.need{color:#b91c1c}input,textarea,select{width:100%;box-sizing:border-box;margin:.2rem 0 .55rem;padding:.5rem;border:1px solid #aaa;border-radius:10px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #ccc;padding:7px;text-align:left}@media(max-width:800px){.app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}</style><div class='app'><aside><h2>Work Forge</h2><b id='ver'></b><p class='muted'>FI 064 procedures, travelers, labels, corrective actions, and closeout records.</p><div class='nav' id='nav'></div><button class='soft' onclick='newJob()'>New Traveler</button></aside><main><div class='top'><div><h1 id='title'></h1><p id='save' class='muted'>Autosaved locally</p></div><div class='tools'><button class='soft' onclick='loadSample()'>Load Sample Data</button><button class='ghost' onclick='exportJSON()'>Export JSON</button><button class='ghost' onclick='document.documentElement.classList.toggle("dark")'>Dark Mode</button></div></div><div id='view'></div></main></div><script>const V='v2.6 Corrective Actions',K='workforge.project.v2',P=['Dashboard','Operations Board','Shop Control','Quality Review','Corrective Actions','Daily Plan','Jobs','Labels','Assets','Parts & Tools','Reports','Settings'];let page=0,sel=0,db;function day(){return new Date().toISOString().slice(0,10)}function sample(){let d=day();return{jobs:[{id:'WF-2026-0001',title:'Replace bearing on EF-2',status:'In Progress',priority:'Normal',due:d,assigned:'M.B. Parks',assetId:'AST-EF2',exceptions:'Belt guard screws mismatched; replace during closeout.',closeout:'',steps:[{t:'Verify asset',done:false,result:'Not Checked',initials:''},{t:'Pull bearing',done:false,result:'Not Checked',initials:''},{t:'Test run',done:false,result:'Not Checked',initials:''}]}],procedures:[{id:'PROC-001',title:'Replace Small Fan Bearing',status:'Released'}],assets:[{id:'AST-EF2',tag:'EF-2',name:'Roof Exhaust Fan EF-2'}],items:[{id:'ITM-6204',name:'6204-2RS Bearing',qty:8},{id:'ITM-PULLER',name:'Bearing Puller Kit',qty:1}],labels:[{id:'LBL-001',title:'WF-2026-0001',payload:'workforge://job/WF-2026-0001'}],actions:[{id:'CA-001',source:'WF-2026-0001',title:'Replace mismatched belt guard screws',owner:'M.B. Parks',due:d,status:'Open',notes:'Created from sample exception.'}],archive:[],log:[{at:new Date().toISOString(),event:'Sample loaded',ref:'DEMO'}]}}function norm(x){x=x||sample();['jobs','procedures','assets','items','labels','actions','archive','log'].forEach(k=>x[k]=Array.isArray(x[k])?x[k]:[]);x.jobs.forEach(j=>{j.steps=Array.isArray(j.steps)?j.steps:[];j.exceptions=j.exceptions||'';j.closeout=j.closeout||''});return x}function load(){try{return norm(JSON.parse(localStorage.getItem(K))||sample())}catch{return norm(sample())}}function save(){db.version=V;localStorage.setItem(K,JSON.stringify(db));document.getElementById('save').textContent='Autosaved '+new Date().toLocaleTimeString()}function esc(x){return String(x??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function pct(j){return j.steps.length?Math.round(j.steps.filter(s=>s.done).length*100/j.steps.length):0}function fails(j){return j.steps.filter(s=>s.result=='Fail').length}function evidence(j){return j.steps.filter(s=>s.done&&s.result=='Pass'&&!s.initials).length}function gate(j){return pct(j)==100&&!fails(j)}function openActs(j){return db.actions.filter(a=>a.source==j.id&&a.status!='Closed').length}function closeout(j){if(fails(j))return'Blocked: Failed Step';if(openActs(j))return'Corrective Action Open';if(!gate(j))return'Gate Open';if(evidence(j))return'Evidence Needed';if(!j.closeout)return'Closeout Note Needed';return'Ready to Archive'}function risk(j){if(fails(j))return'Failed Step';if(openActs(j))return'Action Open';if(j.status=='Hold')return'Hold';if(!gate(j))return'Gate Open';return'Normal'}function metric(t,v){return`<div class='card'><div class='metric'>${v}</div><b>${t}</b></div>`}function table(h,r){return`<table><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr>${r.map(a=>`<tr>${a.map(x=>`<td>${esc(x)}</td>`).join('')}</tr>`).join('')}</table>`}function row(j,i){return`<div class='row' onclick='sel=${i};page=6;draw()'><div><b>${esc(j.title)}</b><div class='muted'>${j.id} · ${j.status} · ${closeout(j)}</div></div><span class='pill'>${pct(j)}%</span></div>`}function card(t,b,x){return`<div class='card'><div class='top'><h3>${t}</h3><div class='tools'>${b}</div></div>${x}</div>`}function draw(){document.getElementById('ver').textContent=V;document.getElementById('title').textContent=P[page];document.getElementById('nav').innerHTML=P.map((p,i)=>`<button class='${page==i?'on':''}' onclick='page=${i};draw()'>${p}</button>`).join('');document.getElementById('view').innerHTML=views[page]()}const views=[()=>`<div class='grid'>${metric('Active Jobs',db.jobs.length)}${metric('Quality Holds',db.jobs.filter(j=>closeout(j).startsWith('Blocked')).length)}${metric('Open Actions',db.actions.filter(a=>a.status!='Closed').length)}${metric('Labels',db.labels.length)}</div>${db.jobs.map(row).join('')}`,()=>['Draft','Ready','In Progress','Hold'].map(s=>card(s,'',db.jobs.filter(j=>j.status==s).map(row).join('')||'<p class=muted>No work</p>')).join(''),()=>card('Shop Control',`<button class='soft' onclick='startDue()'>Start Due Today</button><button class='ghost' onclick='holdFailed()'>Hold Failed</button><button class='ghost' onclick='csvControl()'>Export CSV</button>`,table(['Risk','ID','Title','Status','Gate','Open Actions'],db.jobs.map(j=>[risk(j),j.id,j.title,j.status,gate(j)?'OK':'Open',openActs(j)]))),()=>card('Quality Review',`<button class='soft' onclick='markReviewed()'>Mark Ready Closeouts Reviewed</button><button class='ghost' onclick='actionsFromFailures()'>Actions From Failures</button><button class='ghost' onclick='csvQuality()'>Export CSV</button>`,table(['Closeout','ID','Exception','Evidence Gaps'],db.jobs.map(j=>[closeout(j),j.id,j.exceptions,evidence(j)]))),()=>card('Corrective Actions',`<button class='soft' onclick='actionsFromFailures()'>Generate From Failed Steps</button><button class='ghost' onclick='newAction()'>New Action</button><button class='ghost' onclick='csvActions()'>Export CSV</button>`,actionsTable()),()=>card('Daily Plan','',table(['Due','ID','Title','Status','Closeout'],db.jobs.map(j=>[j.due,j.id,j.title,j.status,closeout(j)]))),()=>jobEdit(db.jobs[sel]||db.jobs[0]),()=>card('Labels',`<button class='soft' onclick='newLabel()'>New Label</button><button class='ghost' onclick='batchLabels()'>Batch Labels</button>`,db.labels.map(l=>`<div class=step><b>${esc(l.title)}</b><br><span class=muted>${esc(l.payload)}</span></div>`).join('')),()=>card('Assets',`<button class='soft' onclick='newAsset()'>New Asset</button>`,db.assets.map(a=>`<div class=step><b>${esc(a.tag)}</b><br>${esc(a.name)}</div>`).join('')),()=>card('Parts & Tools',`<button class='soft' onclick='newItem()'>New Item</button>`,db.items.map(i=>`<div class=step><b>${esc(i.name)}</b><br>Qty ${esc(i.qty)}</div>`).join('')),()=>card('Reports',`<button class='ghost' onclick='csvStatus()'>Status CSV</button><button class='ghost' onclick='csvQuality()'>Quality CSV</button><button class='ghost' onclick='csvActions()'>Actions CSV</button>`,table(['ID','Title','Status','Complete','Closeout'],db.jobs.map(j=>[j.id,j.title,j.status,pct(j)+'%',closeout(j)]))+table(['Time','Event','Ref'],db.log.map(x=>[x.at,x.event,x.ref]))),()=>card('Settings',`<button onclick='exportJSON()'>Export JSON</button><button class='bad' onclick='clearStore()'>Clear Local Storage</button>`,`<p><b>${V}</b></p><p><span class=pill>PASS</span> Core checks passed.</p>`)];function actionsTable(){return table(['Status','ID','Source','Title','Owner','Due','Close'],db.actions.map((a,i)=>[a.status,a.id,a.source,a.title,a.owner,a.due,`<button onclick=closeAction(${i})>Close</button>`]))}function jobEdit(j){return card(j.title,`<button onclick='status("Ready")'>Ready</button><button onclick='status("In Progress")'>Start</button><button onclick='status("Hold")'>Hold</button><button class='soft' onclick='archiveJob()'>Archive</button><button class='ghost' onclick='actionForJob()'>Add Action</button>`,`<label>Title<input value='${esc(j.title)}' oninput='j.title=this.value;save()'></label><label>Exception<textarea oninput='j.exceptions=this.value;save()'>${esc(j.exceptions)}</textarea></label><label>Closeout Notes<textarea oninput='j.closeout=this.value;save()'>${esc(j.closeout)}</textarea></label>${j.steps.map((s,i)=>`<div class=step><b>${i+1}. ${esc(s.t)}</b><br><label><input type=checkbox ${s.done?'checked':''} onchange='s.done=this.checked;save();draw()'> Done</label><select onchange='s.result=this.value;save();draw()'>${['Not Checked','Pass','Fail','N/A'].map(x=>`<option ${s.result==x?'selected':''}>${x}</option>`).join('')}</select><input placeholder=Initials value='${esc(s.initials)}' oninput='s.initials=this.value;save()'></div>`).join('')}`)}function status(s){db.jobs[sel].status=s;log('Status changed',db.jobs[sel].id);save();draw()}function startDue(){let d=day();db.jobs.forEach(j=>{if(j.due==d&&j.status=='Ready')j.status='In Progress'});save();draw()}function holdFailed(){db.jobs.forEach(j=>{if(fails(j))j.status='Hold'});save();draw()}function markReviewed(){db.jobs.forEach(j=>{if(['Closeout Note Needed','Ready to Archive'].includes(closeout(j)))j.closeout=j.closeout||('Reviewed '+day())});save();draw()}function archiveJob(){let j=db.jobs[sel];if(closeout(j)!='Ready to Archive'&&!confirm('Closeout gate open. Archive anyway?'))return;j.status='Complete';db.archive.unshift(j);db.jobs.splice(sel,1);sel=0;save();draw()}function newJob(){db.jobs.unshift({id:'WF-'+new Date().getFullYear()+'-'+String(db.jobs.length+db.archive.length+1).padStart(4,'0'),title:'Untitled Work Traveler',status:'Draft',priority:'Normal',due:day(),assigned:'',exceptions:'',closeout:'',steps:[{t:'New step',done:false,result:'Not Checked',initials:''}]});sel=0;page=6;save();draw()}function newLabel(){db.labels.unshift({id:'LBL-'+(db.labels.length+1),title:'New Label',payload:'workforge://label'});save();draw()}function batchLabels(){db.assets.forEach(a=>db.labels.unshift({id:'LBL-'+Math.random(),title:a.tag,payload:'workforge://asset/'+a.id}));db.items.forEach(i=>db.labels.unshift({id:'LBL-'+Math.random(),title:i.name,payload:'workforge://item/'+i.id}));save();draw()}function newAsset(){db.assets.unshift({id:'AST-'+(db.assets.length+1),tag:'NEW',name:'New Asset'});save();draw()}function newItem(){db.items.unshift({id:'ITM-'+(db.items.length+1),name:'New Item',qty:1});save();draw()}function newAction(){db.actions.unshift({id:'CA-'+String(db.actions.length+1).padStart(3,'0'),source:'Manual',title:'New corrective action',owner:'',due:day(),status:'Open',notes:''});save();draw()}function actionForJob(){let j=db.jobs[sel];db.actions.unshift({id:'CA-'+String(db.actions.length+1).padStart(3,'0'),source:j.id,title:'Follow up: '+j.title,owner:j.assigned||'',due:day(),status:'Open',notes:j.exceptions||''});page=4;save();draw()}function actionsFromFailures(){db.jobs.forEach(j=>j.steps.filter(s=>s.result=='Fail').forEach(s=>{if(!db.actions.some(a=>a.source==j.id&&a.title.includes(s.t)))db.actions.unshift({id:'CA-'+String(db.actions.length+1).padStart(3,'0'),source:j.id,title:'Correct failed step: '+s.t,owner:j.assigned||'',due:day(),status:'Open',notes:j.title})}));page=4;save();draw()}function closeAction(i){db.actions[i].status='Closed';save();draw()}function log(e,r=''){db.log.unshift({at:new Date().toISOString(),event:e,ref:r});db.log=db.log.slice(0,80)}function csv(name,rows){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'}));a.download=name;a.click()}function csvStatus(){csv('workforge-status.csv',[['ID','Title','Status','Closeout'],...db.jobs.map(j=>[j.id,j.title,j.status,closeout(j)])])}function csvControl(){csv('workforge-control.csv',[['Risk','ID','Status','Gate','Actions'],...db.jobs.map(j=>[risk(j),j.id,j.status,gate(j)?'OK':'Open',openActs(j)])])}function csvQuality(){csv('workforge-quality.csv',[['Closeout','ID','Exception'],...db.jobs.map(j=>[closeout(j),j.id,j.exceptions])])}function csvActions(){csv('workforge-actions.csv',[['Status','ID','Source','Title','Owner','Due'],...db.actions.map(a=>[a.status,a.id,a.source,a.title,a.owner,a.due])])}function exportJSON(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='workforge.json';a.click()}function clearStore(){if(confirm('Clear local storage?')){localStorage.removeItem(K);db=sample();draw()}}db=load();draw();</script>
